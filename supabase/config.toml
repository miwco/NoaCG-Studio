# Supabase project config for the OPEN, self-hostable app (Era 5). A self-hoster runs
#   supabase db push    # or `supabase start` for a local stack
# to stand up a working instance from this file + the migrations in ./migrations.
#
# Only the OPEN features are declared here (auth, db, storage). The private repo's edge functions
# (billing, metered AI gateway, social ingestion) are intentionally NOT declared — they are wired
# in at deploy time on the hosted instance only. Secrets are referenced via env(NAME); no literal
# secret ever lives in this file. See docs/ERA5_PLAN.md.

project_id = "noacg-studio"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
# Fonts/images sync to a private bucket (see migrations/0001). 50 MiB is ample for a single asset.
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5174"
additional_redirect_urls = ["http://localhost:5174"]
jwt_expiry = 3600

# Signup is OPEN (Era 5.6, migration 0006): the Before-User-Created hook below now allows every
# sign-up. The hook stays wired so re-closing to the invite allowlist is a one-function migration
# (restore the 0002 body of enforce_allowlist) — no auth reconfiguration needed either way.
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = true

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"

# Before-User-Created hook: the signup switch (permissive since 0006; allowlist gate in 0002).
# Postgres-function form so the check never leaves the instance and a self-hoster needs no
# extra service.
[auth.hook.before_user_created]
enabled = true
uri = "pg-functions://postgres/public/enforce_allowlist"

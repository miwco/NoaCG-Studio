<!doctype html>
<!-- "Rule & Panel" - documentary lower-third stinger, 1920x1080 @ 30fps, 4.00s, transparent.
     Concept: the amber rule draws first (pencil-underline), then leads the graphite panel
     out from the left edge; name+role ride the panel; exit reverses lead order: text first,
     then rule+panel retract together. One paused GSAP timeline, all seconds absolute. -->
<html lang="en" data-composition-variables='[
  {"id":"name","type":"string","label":"Guest name","default":"ELENA MARKOVA"},
  {"id":"role","type":"string","label":"Role / institution","default":"Senior Field Biologist · Arctic Research Institute"},
  {"id":"accent","type":"color","label":"Accent (rule/sheen)","default":"#c8933f"}
]'>
<head>
<meta charset="UTF-8" />
<title>Rule &amp; Panel Lower Third</title>
<style>
  /* Transparent stage - only the strap elements paint. */
  html, body { margin: 0; background: transparent; }
  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Inter', Arial, sans-serif;
  }
  .clip { position: absolute; inset: 0; }

  /* ── Strap group: anchored lower-left, everything positioned from this box ── */
  #strap {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
  }

  /* Graphite panel: same-hue warm-amber sheen wash, darker toward the bottom,
     lifted off the frame with a 1px lighter top edge + soft drop shadow. */
  #panel {
    position: absolute;
    left: 6%;
    top: 70%;
    width: 42%;
    height: 16%;
    border-radius: 3px;
    background-color: #23201d;
    background-image:
      linear-gradient(180deg,
        rgba(200,147,63,0.16) 0%,
        rgba(200,147,63,0.05) 32%,
        rgba(18,16,14,0.0) 55%,
        rgba(10,9,8,0.30) 100%);
    background-size: 130% 100%;
    background-position: 0% 0%;
    box-shadow:
      inset 0 1px 0 rgba(255,244,226,0.14),
      0 18px 40px rgba(0,0,0,0.45);
    transform-origin: left center;
    will-change: transform, background-position;
  }

  /* Amber keyline rule - sits ON the panel's top edge, sole colour accent. */
  #rule {
    position: absolute;
    left: 8%;
    top: 75.5%;
    width: 340px;
    height: 4px;
    background: linear-gradient(90deg, var(--accent, #c8933f) 0%, #e0ae5f 55%, var(--accent, #c8933f) 100%);
    box-shadow: 0 0 10px rgba(200,147,63,0.55);
    transform-origin: left center;
    transform: scaleX(0);
  }

  /* Text block - always painted above the panel. */
  #text-block {
    position: absolute;
    left: 8%;
    top: 78%;
    transform: translateY(-100%);
    display: flex;
    flex-direction: column;
  }

  #name-line {
    margin: 0;
    padding: 0;
    color: #f2ede4;
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 700;
    letter-spacing: -0.01em;
    white-space: nowrap;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
  }

  #role-line {
    margin-top: calc(1080px * 0.045);
    font-family: 'Inter', Arial, sans-serif;
    font-weight: 600;
    font-variant: small-caps;
    letter-spacing: 0.08em;
    font-size: calc(1080px * 0.028);
    color: rgba(242,237,228,0.8);
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4">

  <!-- Single clip spans the whole duration; entrance/hold/exit are all motion. -->
  <section id="strap-layer" class="clip" data-start="0" data-duration="4" data-track-index="1">
    <div id="strap">
      <!-- Panel painted first (back), then rule, then text - stacking per contract. -->
      <div id="panel"></div>
      <div id="rule"></div>
      <div id="text-block">
        <h1 id="name-line" data-var-text="name">ELENA MARKOVA</h1>
        <div id="role-line" data-var-text="role">Senior Field Biologist · Arctic Research Institute</div>
      </div>
    </div>
  </section>

</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing constants (composition seconds) ─────────────────────────────────
  const RULE_START   = 0.00;   // rule begins drawing at t=0
  const RULE_DUR     = 14/30;  // 14 frames to draw
  const PANEL_START  = 0.10;   // 3 frames after rule starts
  const PANEL_DUR    = 0.60;   // spring settle
  const NAME_START   = 0.50;   // 7fr after panel start (approx per plan)
  const NAME_DUR     = 0.23;
  const ROLE_START   = 0.60;   // 6fr after name start
  const ROLE_DUR     = 0.23;

  const BREATH_START = 1.0;
  const BREATH_DUR   = 2.0;    // ambient sheen drift, slow linear loop

  const SETTLE_END   = 3.27;   // pre-exit stillness ends here
  const NAME_OUT     = 3.27;
  const ROLE_OUT     = 3.37;   // 3fr after name out
  const RETRACT_START= 3.45;
  const RETRACT_DUR  = 13/30;  // 13 frames retract

  // ── Sizing: name sized from its own string (Georgia ~0.58 em cap width est.) ─
  // "ELENA MARKOVA" = 13 chars incl space; target ~50% of 1920 = 960px line width.
  const NAME_STR = document.getElementById('name-line').textContent.trim();
  const CAP_ADVANCE = 0.58; // approx serif Georgia bold uppercase advance
  const CHARS = Math.max(NAME_STR.length, 1);
  const TARGET_WIDTH = 1920 * 0.50;
  let fontSize = TARGET_WIDTH / (CHARS * CAP_ADVANCE);
  // clamp so short/long names stay in the 45-55% band without absurd sizes
  fontSize = Math.max(48, Math.min(fontSize, 120));
  document.getElementById('name-line').style.fontSize = fontSize + 'px';

  // ── Phase 1: rule draws left-to-right, clamped power3-out, no overshoot ────
  tl.fromTo('#rule', { scaleX: 0 }, {
    scaleX: 1, duration: RULE_DUR, ease: 'power3.out'
  }, RULE_START);

  // ── Phase 1: panel slides in from off-frame left with a soft spring ────────
  tl.fromTo('#panel',
    { xPercent: 0, x: () => -1920 * 0.51 },       // approx -45% frame offset from resting x
    { x: 0, duration: PANEL_DUR, ease: 'elastic.out(1, 0.62)' },
    PANEL_START
  );

  // ── Phase 2: name + role ride in with rise + fade, staggered ───────────────
  tl.from('#name-line', {
    autoAlpha: 0, y: 4, duration: NAME_DUR, ease: 'power2.out'
  }, NAME_START);
  tl.from('#role-line', {
    autoAlpha: 0, y: 4, duration: ROLE_DUR, ease: 'power2.out'
  }, ROLE_START);

  // ── Hero hold: ambient breath - sheen drifts ~1.5% on a slow linear loop ───
  // 2s hold / 2s loop period => one full drift cycle, continuous linear motion.
  tl.fromTo('#panel',
    { backgroundPosition: '0% 0%' },
    { backgroundPosition: '1.5% 0%', duration: BREATH_DUR, ease: 'linear', repeat: 0 },
    BREATH_START
  );

  // (Rule and text remain rock-still through the hold - no tweens placed there.)

  // ── Phase 3: pre-exit settle is implicit stillness until SETTLE_END ────────

  // ── Phase 4: exit - text first (fade+rise further), then panel+rule retract ─
  tl.to('#name-line', {
    autoAlpha: 0, y: -6, duration: 0.18, ease: 'power2.in'
  }, NAME_OUT);
  tl.to('#role-line', {
    autoAlpha: 0, y: -6, duration: 0.18, ease: 'power2.in'
  }, ROLE_OUT);

  // Panel retracts left off-frame; rule collapses back to origin - simultaneous.
  tl.to('#panel', {
    x: () => -1920 * 0.51, duration: RETRACT_DUR, ease: 'power2.in'
  }, RETRACT_START);
  tl.to('#rule', {
    scaleX: 0, duration: RETRACT_DUR, ease: 'power2.in'
  }, RETRACT_START);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

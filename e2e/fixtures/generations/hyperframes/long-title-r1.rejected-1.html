<!doctype html>
<!-- "The Long Road" - a 4s public-affairs title card: a road-rule draws across a graphite
     horizon, a kicker rises, and the two-line serif title lands word by word like
     milestones reached, then a fast decisive exit clears the frame. 1920x1080 @ 4s / 30fps. -->
<html lang="en" data-composition-variables='[
  {"id":"line1","type":"string","label":"Title line 1","default":"THE LONG ROAD TO"},
  {"id":"line2","type":"string","label":"Title line 2","default":"WESTMINSTER BRIDGE"},
  {"id":"kicker","type":"string","label":"Kicker","default":"A DOCUMENTARY"},
  {"id":"accent","type":"color","label":"Accent (amber)","default":"#c9a15f"}
]'>
<head>
<meta charset="UTF-8" />
<title>The Long Road to Westminster Bridge</title>
<style>
  html, body { margin: 0; padding: 0; }

  /* ── Stage: graphite-charcoal world, warm undertone, never cold blue-black ── */
  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      /* horizontal lightened band just above centre, where the title sits */
      radial-gradient(ellipse 1400px 420px at 50% 46%, #1f2226 0%, #181b1f 55%, #15181c 100%),
      linear-gradient(180deg, #121417 0%, #15181c 40%, #15181c 60%, #121417 100%);
    font-family: Georgia, 'Times New Roman', serif;
  }

  .clip { position: absolute; inset: 0; }

  /* ── Faint drifting vertical architectural line texture (railings / tracery) ── */
  #texture-layer {
    position: absolute;
    top: -10%;
    left: -5%;
    width: 110%;
    height: 120%;
    opacity: 0.06;
    background-image: repeating-linear-gradient(
      90deg,
      rgba(240,230,210,0.9) 0px,
      rgba(240,230,210,0.9) 1.5px,
      transparent 1.5px,
      transparent 46px
    );
    mix-blend-mode: screen;
  }

  /* ── The road-rule: horizon line the title lands on ── */
  #rule-wrap {
    position: absolute;
    top: 61.5%;
    left: 50%;
    width: 1344px; /* 70% of 1920 */
    height: 4px;
    margin-left: -672px;
    transform: translateY(-50%);
  }
  #rule {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg,
      rgba(201,161,95,0) 0%,
      rgba(201,161,95,0.9) 8%,
      var(--accent, #c9a15f) 50%,
      rgba(201,161,95,0.9) 92%,
      rgba(201,161,95,0) 100%);
    box-shadow: 0 0 18px 2px rgba(201,161,95,0.45), 0 0 3px rgba(201,161,95,0.8);
    transform-origin: center center;
  }

  /* ── Text block: kicker + two-line hero title, painted last ── */
  #text-block {
    position: absolute;
    left: 50%;
    top: 61.5%;
    width: 1800px;
    transform: translate(-50%, -100%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #kicker {
    margin: 0 0 40px 0;
    font-family: 'Space Grotesk', Arial, sans-serif;
    font-size: 32px; /* ~0.03 * 1080 */
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent, #c9a15f);
  }

  #title-block {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .title-line {
    margin: 0;
    padding: 0;
    font-weight: 400;
    font-size: 128px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: #f2ede4;
    text-shadow: 0 2px 22px rgba(0,0,0,0.55);
    white-space: nowrap;
  }
  #title-line-2 {
    margin-top: 24px; /* ~0.02 * 1080 */
  }

  /* Per-word spans for the assembly effect; words separated by a fixed gap */
  .word {
    display: inline-block;
    will-change: transform, opacity;
  }
  .word + .word { margin-left: 0.28em; }

  /* Hairline beneath the block - amber, hand-crafted supporting element */
  #hairline {
    margin-top: 46px;
    width: 220px;
    height: 2px;
    background: var(--accent, #c9a15f);
    opacity: 0.7;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4">

  <!-- Track 0: background field (static gradient, painted once, always present) -->
  <section id="bg-layer" class="clip" data-start="0" data-duration="4" data-track-index="0">
    <div id="texture-layer"></div>
  </section>

  <!-- Track 1: the road-rule, drawn beneath where the title will sit -->
  <section id="rule-layer" class="clip" data-start="0" data-duration="4" data-track-index="1">
    <div id="rule-wrap"><div id="rule"></div></div>
  </section>

  <!-- Track 2: hero title + kicker, painted last, on top of the rule -->
  <section id="text-layer" class="clip" data-start="0" data-duration="4" data-track-index="2">
    <div id="text-block">
      <div id="kicker" data-var-text="kicker">A DOCUMENTARY</div>
      <div id="title-block">
        <h1 id="title-line-1" class="title-line">
          <span class="word" id="w1">THE</span><span class="word" id="w2">LONG</span><span class="word" id="w3">ROAD</span><span class="word" id="w4">TO</span>
        </h1>
        <h1 id="title-line-2" class="title-line">
          <span class="word" id="w5">WESTMINSTER</span><span class="word" id="w6">BRIDGE</span>
        </h1>
      </div>
      <div id="hairline"></div>
    </div>
  </section>
</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing constants (composition seconds) ─────────────────────────────────
  const RULE_DRAW_START   = 0.60;
  const RULE_DRAW_DUR     = 0.60;   // road laid down, power2.out
  const KICKER_START      = 1.00;
  const KICKER_DUR         = 0.40;  // power1.out rise
  const WORDS_START       = 1.20;
  const WORD_STAGGER      = 0.115; // ~3.5 frames @30fps between words
  const WORD_SPRING_DUR   = 0.42;
  const HOLD_START        = 2.60;
  const HOLD_END          = 3.35;
  const EXIT_START        = 3.35;
  const EXIT_TEXT_DUR     = 0.25;  // fast power3.in
  const EXIT_RULE_START   = EXIT_START + 0.18;
  const EXIT_RULE_DUR     = 0.12;

  // ── Initial states ──────────────────────────────────────────────────────────
  gsap.set('#rule', { scaleX: 0.02, transformOrigin: 'left center', autoAlpha: 0 });
  gsap.set('#kicker', { autoAlpha: 0, y: 12 });
  gsap.set('#hairline', { autoAlpha: 0 });
  gsap.set(['#w1','#w2','#w3','#w4','#w5','#w6'], { autoAlpha: 0, y: 46, scale: 0.9 });

  // ── Phase 0 (0.00-0.60s): Establish - empty road, static graphite ──────────
  // background/texture are visible from frame 0 by default; a very slow drift
  // begins here and continues through the whole piece (barely perceptible).
  tl.fromTo('#texture-layer',
    { xPercent: 0 },
    { xPercent: 4, duration: 4.0, ease: 'sine.inOut' },
  0.0);

  // ── Phase 1 (0.60-1.20s): Road-rule draw, left to right, power2.out ────────
  tl.to('#rule', { autoAlpha: 1, duration: 0.05 }, RULE_DRAW_START);
  tl.fromTo('#rule',
    { scaleX: 0.02 },
    { scaleX: 1, duration: RULE_DRAW_DUR, ease: 'power2.out' },
  RULE_DRAW_START);

  // ── Phase 2 (1.00-1.40s): Kicker fades up, overlapping rule tail ───────────
  tl.to('#kicker', { autoAlpha: 1, y: 0, duration: KICKER_DUR, ease: 'power1.out' }, KICKER_START);

  // ── Phase 3 (1.20-2.60s): Words land in reading order with quick springs ──
  const words = ['#w1', '#w2', '#w3', '#w4', '#w5', '#w6'];
  words.forEach((sel, i) => {
    const t = WORDS_START + i * WORD_STAGGER;
    tl.to(sel, {
      autoAlpha: 1,
      y: 0,
      scale: 1,
      duration: WORD_SPRING_DUR,
      ease: 'back.out(2.4)' // spring-like: fast start, soft overshoot landing
    }, t);
  });

  // Rule brightens slightly as the final word lands - road reaching destination
  tl.to('#rule', {
    boxShadow: '0 0 28px 4px rgba(201,161,95,0.7), 0 0 6px rgba(201,161,95,1)',
    duration: 0.3,
    ease: 'power1.out'
  }, WORDS_START + 5 * WORD_STAGGER);

  // Hairline settles just after the last word lands
  tl.to('#hairline', { autoAlpha: 1, duration: 0.3, ease: 'power1.out' }, WORDS_START + 5 * WORD_STAGGER + 0.15);

  // Letter-spacing opens slightly once settled (tight -> a touch open)
  tl.to(['#title-line-1', '#title-line-2'], {
    letterSpacing: '0.01em',
    duration: 0.4,
    ease: 'power1.out'
  }, HOLD_START - 0.3);

  // ── Phase 4 (2.60-3.35s): Hero hold - ambient breathing, no bounce ─────────
  tl.to('#title-block', {
    scale: 1.015,
    duration: (HOLD_END - HOLD_START) / 2,
    ease: 'sine.inOut',
    repeat: 1,
    yoyo: true,
    transformOrigin: 'center center'
  }, HOLD_START);
  tl.to('#rule', {
    scale: 1.015,
    duration: (HOLD_END - HOLD_START) / 2,
    ease: 'sine.inOut',
    repeat: 1,
    yoyo: true,
    transformOrigin: 'center center'
  }, HOLD_START);

  // ── Phase 5 (3.35-4.00s): Decisive exit - text leads, rule follows, then rest ─
  // Title + kicker scale to 97% and fade, fast power3.in
  tl.to(['#title-block', '#kicker', '#hairline'], {
    scale: 0.97,
    autoAlpha: 0,
    duration: EXIT_TEXT_DUR,
    ease: 'power3.in'
  }, EXIT_START);

  // Rule contracts from both ends back to a single centre point
  tl.to('#rule', {
    scaleX: 0.02,
    transformOrigin: 'center center',
    autoAlpha: 0,
    duration: EXIT_RULE_DUR,
    ease: 'power3.in'
  }, EXIT_RULE_START);

  // Final 2-3 frames: plain graphite background alone (texture keeps its slow pan,
  // nothing else animates) - a clean, complete rest by frame 120.

  window.__timelines['main'] = tl;
</script>
</body>
</html>

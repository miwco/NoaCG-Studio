<!doctype html>
<!-- "Sunday Kitchen" title card - the wordmark arrives like morning light through a
     kitchen window. KITCHEN settles as a warm lit serif slab, a hand-drawn steam curl
     traces itself up from a small skillet mark above SUNDAY, and a hairline rule draws
     beneath. Layered cream/toast background, single terracotta accent. 1920x1080 @ 4s. -->
<html lang="en" data-composition-variables='[
  {"id":"kicker","type":"string","label":"Kicker","default":"SUNDAY"},
  {"id":"title","type":"string","label":"Title","default":"KITCHEN"},
  {"id":"accent","type":"color","label":"Accent (steam / skillet)","default":"#B5652E"}
]'>
<head>
<meta charset="UTF-8" />
<title>Sunday Kitchen</title>
<style>
  html, body { margin: 0; padding: 0; }

  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: radial-gradient(circle at 50% 48%, #F6ECDD 0%, #ECDCC0 55%, #E4CFAE 100%);
    font-family: Georgia, 'Times New Roman', serif;
  }

  .clip { position: absolute; inset: 0; }

  /* ── Background layers ─────────────────────────────────────────────────── */
  /* Faint large-scale linen/paper grain - built from repeating soft dots via SVG. */
  #grain {
    position: absolute; inset: -10%;
    width: 120%; height: 120%;
    opacity: 0.05;
    background-image:
      repeating-linear-gradient(0deg, rgba(91,58,36,0.35) 0 1px, transparent 1px 4px),
      repeating-linear-gradient(90deg, rgba(91,58,36,0.25) 0 1px, transparent 1px 5px);
    mix-blend-mode: multiply;
  }

  /* Warm amber window-light glow, upper-left third. */
  #glow {
    position: absolute;
    top: -20%;
    left: -18%;
    width: 68%;
    height: 68%;
    background: radial-gradient(circle, rgba(232,168,92,0.32) 0%, rgba(232,168,92,0.14) 45%, rgba(232,168,92,0) 75%);
    opacity: 0.55;
    filter: blur(2px);
  }

  /* Same-hue vignette holding the edges. */
  #vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(201,155,99,0) 55%, rgba(160,110,60,0.28) 100%);
  }

  /* ── Lockup ─────────────────────────────────────────────────────────────── */
  #lockup-layer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  #lockup {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Drawn accent: skillet mark + steam curl, sits above the kicker line. */
  #accent-svg {
    position: absolute;
    top: -108px;
    width: 220px;
    height: 130px;
    overflow: visible;
  }
  #accent-svg path {
    fill: none;
    stroke: var(--accent, #B5652E);
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  #skillet-path { stroke-width: 4px; }
  #steam-path { stroke-width: 3.5px; }

  #kicker {
    margin: 0;
    font-size: 48.6px; /* frame-height * 0.045 */
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #7A5636;
  }

  #title-wrap { margin-top: 14px; }

  #title {
    margin: 0;
    font-size: 274px;
    font-weight: 700;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    line-height: 1;
    background-image: linear-gradient(180deg, #7A5636 0%, #5B3A24 60%, #5B3A24 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* Hairline rule beneath hero, drawn left-to-right. */
  #rule-svg {
    display: block;
    margin-top: 26px;
    width: 640px;
    height: 4px;
    overflow: visible;
  }
  #rule-svg line {
    stroke: var(--accent, #B5652E);
    stroke-width: 2px;
    opacity: 0.75;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4">

  <!-- Background sits on its own track, full duration, calm ambient life only. -->
  <section id="bg" class="clip" data-start="0" data-duration="4" data-track-index="1">
    <div id="grain"></div>
    <div id="glow"></div>
    <div id="vignette"></div>
  </section>

  <!-- Lockup: kicker, drawn accent, hero, rule - all on one centered block. -->
  <section id="lockup-section" class="clip" data-start="0" data-duration="4" data-track-index="2">
    <div id="lockup-layer">
      <div id="lockup">
        <!-- Hand-drawn skillet + steam curl accent, above the kicker line -->
        <svg id="accent-svg" viewBox="0 0 220 130">
          <!-- small skillet: shallow arc + short handle -->
          <path id="skillet-path" d="M 70 108 Q 100 122 130 108 M 130 108 L 158 100" />
          <!-- steam curl: three soft waves rising from the skillet bowl -->
          <path id="steam-path" d="M 96 100 C 84 82, 108 74, 98 56 C 88 38, 112 30, 102 12" />
        </svg>

        <div id="kicker" data-var-text="kicker">SUNDAY</div>

        <div id="title-wrap">
          <h1 id="title" data-var-text="title">KITCHEN</h1>
        </div>

        <!-- Hairline rule beneath hero, draws itself left to right -->
        <svg id="rule-svg" viewBox="0 0 640 4" preserveAspectRatio="none">
          <line id="rule-line" x1="0" y1="2" x2="640" y2="2" />
        </svg>
      </div>
    </div>
  </section>
</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing (seconds, on the 30fps grid) ────────────────────────────────────
  const GLOW_START      = 0.13;  // frame 4 - glow begins its slow breathing loop
  const KICKER_IN       = 0.20;  // frame 6
  const KICKER_DUR      = 16/30; // 16 frames
  const HERO_IN         = 0.53;  // frame 16
  const HERO_DUR        = 20/30; // 20 frames, settled by frame 34 (1.13s)
  const SKILLET_IN      = 1.00;  // frame 30
  const SKILLET_DUR     = 10/30;
  const STEAM_IN        = 1.27;  // frame 38
  const STEAM_DUR       = 18/30; // settled 1.87s
  const RULE_IN         = 1.40;  // frame 42
  const RULE_DUR        = 14/30; // settled 1.87s
  const HOLD_START      = 2.00;
  const BREATH_DUR      = 1.10;  // one cycle within 2.0 - 3.10
  const EXIT_TEXT       = 3.10;  // frame 93
  const EXIT_TEXT_DUR   = 14/30; // clears by frame 104 (3.47s)
  const EXIT_ACCENT     = 3.20;  // frame 96
  const EXIT_ACCENT_DUR = 12/30; // fades out by frame 108 (3.6s)
  const FINAL_GLOW      = 3.60;  // frame 108 - glow eases to lower resting opacity

  // Set stroke-dasharray/dashoffset up front so the "draw" reads correctly at t=0.
  tl.set('#skillet-path', { strokeDasharray: 120, strokeDashoffset: 120 }, 0);
  tl.set('#steam-path',   { strokeDasharray: 160, strokeDashoffset: 160 }, 0);
  tl.set('#rule-line',    { strokeDasharray: 640, strokeDashoffset: 640 }, 0);
  tl.set('#kicker',       { autoAlpha: 0, y: 24 }, 0);
  tl.set('#title',        { autoAlpha: 0, y: 32 }, 0);

  // ── Phase 0: window glow breathing (slow, continuous, finite loop) ────────
  tl.to('#glow', { opacity: 0.7, duration: 1.8, ease: 'sine.inOut', repeat: 3, yoyo: true }, GLOW_START);

  // ── Phase 1: kicker rises & fades, tracking tightens ───────────────────────
  tl.fromTo('#kicker',
    { autoAlpha: 0, y: 24, letterSpacing: '0.18em' },
    { autoAlpha: 1, y: 0, letterSpacing: '0.12em', duration: KICKER_DUR, ease: 'power2.out' },
    KICKER_IN);

  // ── Phase 2: hero slab settles with a soft clamped overshoot ───────────────
  tl.fromTo('#title',
    { autoAlpha: 0, y: 32 },
    { autoAlpha: 1, y: 0, duration: HERO_DUR, ease: 'back.out(1.5)' },
    HERO_IN);

  // ── Phase 3: drawn accent - skillet, then steam curl, then hairline rule ──
  tl.to('#skillet-path', { strokeDashoffset: 0, duration: SKILLET_DUR, ease: 'power1.out' }, SKILLET_IN);
  tl.to('#steam-path',   { strokeDashoffset: 0, duration: STEAM_DUR,   ease: 'power1.out' }, STEAM_IN);
  tl.to('#rule-line',    { strokeDashoffset: 0, duration: RULE_DUR,    ease: 'power1.out' }, RULE_IN);

  // ── Phase 4: hero hold - slow ambient breathing scale, eased in from 1.0 ──
  tl.fromTo('#title-wrap',
    { scale: 1.0 },
    { scale: 1.015, duration: BREATH_DUR / 2, ease: 'sine.inOut', yoyo: true, repeat: 1 },
    HOLD_START);

  // ── Phase 5: exit - text clears first, accelerating ────────────────────────
  tl.to('#kicker', { autoAlpha: 0, y: -34, duration: EXIT_TEXT_DUR, ease: 'power2.in' }, EXIT_TEXT);
  tl.to('#title',  { autoAlpha: 0, y: -38, duration: EXIT_TEXT_DUR, ease: 'power2.in' }, EXIT_TEXT + 0.03);

  // Accent + rule fade a beat later; rule retracts its dash as it fades.
  tl.to('#skillet-path', { autoAlpha: 0, duration: EXIT_ACCENT_DUR, ease: 'power1.in' }, EXIT_ACCENT);
  tl.to('#steam-path',   { autoAlpha: 0, duration: EXIT_ACCENT_DUR, ease: 'power1.in' }, EXIT_ACCENT + 0.03);
  tl.to('#rule-line',    { strokeDashoffset: 640, autoAlpha: 0, duration: EXIT_ACCENT_DUR, ease: 'power1.in' }, EXIT_ACCENT + 0.05);

  // ── Phase 6: final settle - ambient only, glow eases to a calm resting level ─
  tl.to('#glow', { opacity: 0.4, duration: 4 - FINAL_GLOW, ease: 'sine.out' }, FINAL_GLOW);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

<!doctype html>
<!-- "Landfall" - 3s storm-coverage cold open. A single amber warning bar slams
     across the frame; LANDFALL is cut through it as knocked-out charcoal negative
     space - the reveal IS the impact. 1920x1080 @ 3.00s / 90 frames @ 30fps. -->
<html lang="en" data-composition-variables='[
  {"id":"title","type":"string","label":"Title","default":"LANDFALL"},
  {"id":"kicker","type":"string","label":"Kicker","default":"STORM COVERAGE · LIVE"},
  {"id":"accent","type":"color","label":"Accent (storm amber)","default":"#c98a3c"}
]'>
<head>
<meta charset="UTF-8" />
<title>Landfall</title>
<style>
  html, body { margin: 0; padding: 0; }

  /* Stage: opaque deep charcoal-slate with a same-hue radial vignette darkening
     toward the corners - atmospheric depth, no second hue. */
  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background-color: #14181c;
    background-image:
      radial-gradient(120% 100% at 50% 50%, #1c2126 0%, #14181c 55%, #0d1013 100%);
    font-family: 'Archivo', 'Arial Black', Arial, sans-serif;
  }

  .clip { position: absolute; inset: 0; }

  /* Screen-shake wrapper: the background/vignette shakes on impact, nothing else. */
  #shake-wrap {
    position: absolute;
    inset: -20px;
  }

  /* The amber impact bar: a lit slab spanning the vertical center third,
     edge-lit top (lighter amber) fading to burnt umber at the bottom edge. */
  #bar-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    transform: translate(-50%, -50%);
  }
  #bar {
    position: relative;
    width: 100%;
    height: 216px; /* center third of 1080 */
    background: linear-gradient(180deg,
      #e0ab5f 0%,
      var(--accent, #c98a3c) 42%,
      #8a5a24 100%);
    box-shadow:
      inset 0 2px 0 rgba(255,224,180,0.55),
      inset 0 -2px 0 rgba(60,32,8,0.6),
      0 30px 70px rgba(0,0,0,0.45);
  }

  /* LANDFALL knocked out of the bar via clip-path - charcoal shows through the
     cut letterforms, so the wordmark reads as negative space in the slab. */
  #title-cut {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    /* clip-path is driven by the timeline: starts as a zero-area cut, then the
       hard reveal swaps it to the lettered mask at the impact frame. */
    clip-path: polygon(0 0, 0 0, 0 0, 0 0);
  }
  #title {
    margin: 0;
    color: #14181c; /* exact background hue -> reads as a true cut-through */
    font-weight: 900;
    letter-spacing: -0.015em;
    text-transform: uppercase;
    white-space: nowrap;
    line-height: 1;
  }

  /* Kicker: small-caps support label just beneath the bar's bottom glow. */
  #kicker-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(-50% + 108px + 46px));
    width: 100%;
    text-align: center;
  }
  #kicker {
    display: inline-block;
    margin: 0;
    font-family: 'Inter', Arial, sans-serif;
    font-weight: 700;
    font-size: 32.4px; /* 1080 * 0.03 */
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(247, 240, 230, 0.7);
  }

  /* Collapse unit: bar + cut-type animate together as one locked slab. */
  #impact-unit {
    position: absolute;
    inset: 0;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="3">

  <!-- Background vignette + shake, full duration, always present underneath. -->
  <section id="bg-layer" class="clip" data-start="0" data-duration="3" data-track-index="1">
    <div id="shake-wrap"></div>
  </section>

  <!-- Bar + knockout type, locked together as the single impact device. -->
  <section id="impact-layer" class="clip" data-start="0" data-duration="3" data-track-index="2">
    <div id="impact-unit">
      <div id="bar-wrap">
        <div id="bar">
          <div id="title-cut">
            <h1 id="title" data-var-text="title">LANDFALL</h1>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Kicker floats beneath the bar, front of background, behind bar's glow. -->
  <section id="kicker-layer" class="clip" data-start="0" data-duration="3" data-track-index="3">
    <div id="kicker-wrap">
      <div id="kicker" data-var-text="kicker">STORM COVERAGE · LIVE</div>
    </div>
  </section>

</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Frame-accurate timing (30fps) ───────────────────────────────────────────
  const F = 1 / 30;
  const CHARGE_END   = 6  * F; // 0.20s - bare vignette beat ends
  const SLAM_START   = 6  * F; // 0.20s - bar rockets in
  const IMPACT       = 12 * F; // 0.40s - hard stop / knockout reveal
  const KICKER_START = 15 * F; // 0.50s
  const KICKER_END   = 22 * F; // 0.733s
  const HOLD_END     = 72 * F; // 2.40s
  const KICKER_EXIT   = 72 * F; // 2.40s -> 4 frames
  const COLLAPSE_START = 79 * F; // 2.633s -> 6 frames
  const HAIRLINE_SNAP  = 85 * F; // 2.833s -> 2 frames

  // ── Hero sizing: LANDFALL (8 chars) at Archivo capAdvance ~0.74em, target
  //    line width ~72% of 1920px = 1382.4px. fontSize = width / (0.74 * 8). ──
  const TITLE_STR = document.getElementById('title').textContent.trim() || 'LANDFALL';
  const CHARS = TITLE_STR.length;
  const CAP_ADVANCE = 0.74; // Archivo, heavy weight
  const TARGET_WIDTH = 1920 * 0.72;
  const FONT_SIZE = TARGET_WIDTH / (CAP_ADVANCE * CHARS);
  document.getElementById('title').style.fontSize = FONT_SIZE + 'px';

  // ── Clip-path states: cut is a zero-width sliver until impact, then a full
  //    lettered mask so the knockout reads as one hard reveal, not a fade. ──
  const CUT_HIDDEN = 'polygon(0 0, 0 0, 0 0, 0 0)';
  const CUT_REVEALED = 'polygon(0 0, 100% 0, 100% 100%, 0 100%)';

  // ── PHASE 0: pre-impact charge - near-static vignette, bare tension. ───────
  tl.set('#bg-layer', { autoAlpha: 1 }, 0);
  tl.to('#shake-wrap', { scale: 1.006, duration: CHARGE_END, ease: 'sine.inOut' }, 0);

  // Bar starts fully off-screen left, type cut hidden.
  tl.set('#bar-wrap', { xPercent: -140 }, 0);
  tl.set('#title-cut', { clipPath: CUT_HIDDEN }, 0);
  tl.set('#kicker', { autoAlpha: 0, y: 12 }, 0);

  // ── PHASE 1: slam entrance - violent power3.in slide to full-width stop. ──
  tl.to('#bar-wrap', {
    xPercent: 0,
    duration: SLAM_START >= 0 ? (IMPACT - SLAM_START) : 0.2,
    ease: 'power3.in'
  }, SLAM_START);

  // Impact: 1-frame screen shake on background only, settles instantly.
  tl.to('#shake-wrap', { x: -4, y: 2, duration: F, ease: 'power4.out' }, IMPACT);
  tl.to('#shake-wrap', { x: 0, y: 0, duration: F, ease: 'power2.out' }, IMPACT + F);

  // ── PHASE 2: knockout reveal - hard cut synced exactly to the bar's stop. ─
  tl.set('#title-cut', { clipPath: CUT_REVEALED }, IMPACT);

  // ── PHASE 3: kicker arrival - slides up + fades, power2.out, 7 frames. ────
  tl.to('#kicker', {
    autoAlpha: 1,
    y: 0,
    duration: KICKER_END - KICKER_START,
    ease: 'power2.out'
  }, KICKER_START);

  // ── PHASE 4: hero hold - bar edge-gradient creep + 1.5% scale, slow cycle. ─
  const HOLD_DUR = HOLD_END - KICKER_END;
  const HOLD_CYCLES = Math.max(1, Math.round(HOLD_DUR / 2)); // ~2s cycle, finite
  tl.to('#bar', {
    scale: 1.015,
    filter: 'brightness(1.06)',
    duration: HOLD_DUR / (HOLD_CYCLES * 2),
    ease: 'sine.inOut',
    repeat: HOLD_CYCLES * 2 - 1,
    yoyo: true,
    transformOrigin: '50% 50%'
  }, KICKER_END);

  // ── PHASE 5: storm-front exit - kicker first, fades/slides down, 4 frames. ─
  tl.to('#kicker', {
    autoAlpha: 0,
    y: 10,
    duration: 4 * F,
    ease: 'power2.in'
  }, KICKER_EXIT);

  // ── PHASE 6: bar + locked type collapse vertically to a center hairline. ──
  tl.to('#impact-unit', {
    scaleY: 0.012,
    duration: COLLAPSE_START >= 0 ? (HAIRLINE_SNAP - COLLAPSE_START) : 6 * F,
    ease: 'power3.in',
    transformOrigin: '50% 50%'
  }, COLLAPSE_START);

  // ── PHASE 7: hairline snap-out - zero width in 2 frames, frame clears. ────
  tl.to('#impact-unit', {
    scaleX: 0,
    duration: 2 * F,
    ease: 'power4.in',
    transformOrigin: '50% 50%'
  }, HAIRLINE_SNAP);
  tl.set('#impact-unit', { autoAlpha: 0 }, HAIRLINE_SNAP + 2 * F);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

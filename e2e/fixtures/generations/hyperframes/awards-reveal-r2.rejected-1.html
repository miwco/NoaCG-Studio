<!doctype html>
<!-- "Aurora Vane - Winner Reveal": the spotlight hit IS the reveal. A gold beam irises
     open, two charcoal stage-curtain slabs clap shut then snap open, and the wordmark
     assembles from the parted gap, flanked by drawn gold laurel hairlines. 1920x1080 @ 5s. -->
<html lang="en" data-composition-variables='[
  {"id":"title","type":"string","label":"Winner name","default":"AURORA VANE"},
  {"id":"kicker","type":"string","label":"Kicker label","default":"WINNER · PUBLIC VOTE"},
  {"id":"accent","type":"color","label":"Spotlight gold","default":"#d9a84e"}
]'>
<head>
<meta charset="UTF-8" />
<title>Aurora Vane - Winner Reveal</title>
<style>
  /* ── Base / stage ─────────────────────────────────────────────────────── */
  html, body { margin: 0; padding: 0; }
  * { box-sizing: border-box; }

  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: linear-gradient(180deg, #0b0b10 0%, #15141a 55%, #1c1a22 100%);
    font-family: 'Space Grotesk', Arial, sans-serif;
  }

  /* Corner vignette - same-hue darkening, never a flat wall */
  #vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(4,4,6,0.55) 100%);
    pointer-events: none;
  }

  /* Warm bronze-gold bloom sitting behind the hero, suggesting spotlight on stage floor */
  #bloom {
    position: absolute;
    left: 50%; top: 50%;
    width: 1400px; height: 1400px;
    margin-left: -700px; margin-top: -700px;
    background: radial-gradient(circle, rgba(58,44,20,0.85) 0%, rgba(58,44,20,0.35) 35%, rgba(58,44,20,0) 68%);
    opacity: 0;
  }

  /* Gold iris beam - a vertical cone of light that irises open at center */
  #beam {
    position: absolute;
    left: 50%; top: -10%;
    width: 6px; height: 120%;
    margin-left: -3px;
    background: linear-gradient(180deg,
      rgba(217,168,78,0) 0%,
      rgba(217,168,78,0.55) 30%,
      rgba(217,168,78,0.85) 50%,
      rgba(217,168,78,0.55) 70%,
      rgba(217,168,78,0) 100%);
    filter: blur(2px);
    transform: scaleX(1);
    opacity: 0;
    transform-origin: 50% 50%;
  }

  .clip { position: absolute; inset: 0; }

  /* Particle field - deterministic gold motes, behind text, low opacity */
  #particles {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .mote {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(230,190,110,0.9) 0%, rgba(217,168,78,0) 70%);
  }

  /* Charcoal stage-curtain slabs - subtle same-hue vertical gradient + gold hairline keyline */
  .slab {
    position: absolute;
    top: 0;
    width: 55%;
    height: 100%;
    background: linear-gradient(180deg, #1a1a1f 0%, #26262c 55%, #1a1a1f 100%);
    box-shadow: 0 0 60px rgba(0,0,0,0.55);
  }
  #slab-left  { left: 0;   transform: translateX(-100%); }
  #slab-right { right: 0;  transform: translateX(100%); }
  #slab-left::after, #slab-right::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, rgba(217,168,78,0) 0%, rgba(217,168,78,0.9) 15%, rgba(217,168,78,0.9) 85%, rgba(217,168,78,0) 100%);
  }
  #slab-left::after  { right: 0; }
  #slab-right::after { left: 0; }

  /* Text stage - centered stack, painted last */
  #text-stage {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #kicker {
    margin: 0 0 22px 0;
    font-family: 'Inter', Arial, sans-serif;
    font-weight: 600;
    font-size: 30px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #f0d9ad;
    opacity: 0;
  }

  #hero-row {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Hero wordmark split into two halves for the "clap-open assembly" device */
  #hero {
    position: relative;
    display: flex;
    white-space: nowrap;
    font-family: 'Archivo', 'Space Grotesk', Arial, sans-serif;
    font-weight: 900;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: #f6efe0;
    text-shadow: 0 2px 22px rgba(217,168,78,0.35);
    /* fontSize solved from string width: 11 chars * ~0.74 capAdvance(Archivo) ≈
       lineWidth = fontSize * 8.14; target ~1190px -> fontSize ≈ 146px */
    font-size: 146px;
  }
  #hero-a, #hero-b { display: inline-block; }

  /* Laurel hairline flourishes - thin curved gold strokes flanking the wordmark */
  #laurel {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1500px;
    height: 240px;
    margin-left: -750px;
    margin-top: -120px;
    overflow: visible;
    pointer-events: none;
  }
  .laurel-path {
    fill: none;
    stroke: #d9a84e;
    stroke-width: 2;
    stroke-linecap: round;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="5">

  <!-- Background stage: graphite gradient, bloom, vignette -->
  <section id="bg-layer" class="clip" data-start="0" data-duration="5" data-track-index="0">
    <div id="bloom"></div>
    <div id="vignette"></div>
  </section>

  <!-- Beam iris -->
  <section id="beam-layer" class="clip" data-start="0" data-duration="5" data-track-index="1">
    <div id="beam"></div>
  </section>

  <!-- Particle field: deterministic drift, behind slabs/text -->
  <section id="particle-layer" class="clip" data-start="0" data-duration="5" data-track-index="2">
    <div id="particles"></div>
  </section>

  <!-- Stage-curtain slabs -->
  <section id="slab-layer" class="clip" data-start="0" data-duration="5" data-track-index="3">
    <div id="slab-left" class="slab"></div>
    <div id="slab-right" class="slab"></div>
  </section>

  <!-- Text: kicker + hero wordmark + laurel, painted last -->
  <section id="text-layer" class="clip" data-start="0" data-duration="5" data-track-index="4">
    <div id="text-stage">
      <div id="kicker" data-var-text="kicker">WINNER · PUBLIC VOTE</div>
      <div id="hero-row">
        <svg id="laurel" viewBox="0 0 1500 240">
          <path class="laurel-path" id="laurel-left"
                d="M 60,120 C 220,40 380,40 540,110"
                pathLength="100" />
          <path class="laurel-path" id="laurel-right"
                d="M 1440,120 C 1280,40 1120,40 960,110"
                pathLength="100" />
        </svg>
        <h1 id="hero">
          <span id="hero-a">AURORA</span><span id="hero-b">&nbsp;VANE</span>
        </h1>
      </div>
    </div>
  </section>

</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing constants (composition seconds) ─────────────────────────────
  const BEAM_IN        = 0.15;   // spotlight iris starts
  const BEAM_SOFTEN    = 0.60;   // beam settles to soft cone
  const SLAB_CLAP_IN   = 0.35;   // slabs slide in to meet
  const SLAB_MEET      = 0.75;   // slabs fully converged (concealed clap)
  const SLAB_OPEN      = 1.00;   // slabs snap open, revealing center
  const KICKER_IN      = 1.03;   // 3-frame stagger after slab open
  const HERO_IN        = 1.60;   // wordmark halves slide in
  const HERO_B_OFFSET  = 4/30;   // 4-frame stagger between halves
  const LAUREL_DRAW    = 1.70;   // laurel strokes begin drawing
  const LAUREL_DONE    = 2.30;   // laurel complete
  const HOLD_START     = 2.30;
  const HOLD_END       = 3.90;
  const KICKER_OUT     = 3.90;   // kicker fades first
  const HERO_OUT       = 4.00;   // wordmark scale+fade
  const SLAB_EXIT_IN   = 4.10;   // slabs snap shut then exit
  const FIELD_FADE     = 4.60;   // particles + bloom fade to zero

  // ── Deterministic particle field (seeded pseudo-random, 40 motes) ──────
  function seededRandom(seed) {
    const x = Math.sin(seed * 9301 + 49297) * 233280;
    return x - Math.floor(x);
  }
  const particlesEl = document.getElementById('particles');
  const MOTE_COUNT = 40;
  const motes = [];
  for (let i = 0; i < MOTE_COUNT; i++) {
    const rx = seededRandom(i * 3.1 + 1);
    const ry = seededRandom(i * 5.7 + 2);
    const rs = seededRandom(i * 7.3 + 3);
    const ro = seededRandom(i * 2.9 + 4);
    const rspeed = seededRandom(i * 4.4 + 5);
    const size = 2 + rs * 2; // 2-4px
    const el = document.createElement('div');
    el.className = 'mote';
    const startX = rx * 1920;
    const startY = 200 + ry * 700; // roughly centered vertical band
    el.style.left = startX + 'px';
    el.style.top = startY + 'px';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.opacity = 0; // start invisible, fades in with the field
    particlesEl.appendChild(el);
    motes.push({ el, startY, speed: 30 + rspeed * 40, opacity: 0.2 + ro * 0.4 });
  }

  // ── Phase 1: Beam Iris + Slate ──────────────────────────────────────────
  // The gold beam irises open from a thin line into a soft cone at center.
  tl.set('#beam', { scaleX: 0.15 }, 0);
  tl.to('#beam', { opacity: 1, duration: 0.15, ease: 'power1.out' }, BEAM_IN);
  tl.to('#beam', { scaleX: 6, duration: BEAM_SOFTEN - BEAM_IN, ease: 'power2.out' }, BEAM_IN);
  tl.to('#bloom', { opacity: 0.9, duration: 0.5, ease: 'sine.out' }, BEAM_IN + 0.1);

  // Slabs slide in fast from off-frame, hard spring, converging to meet center (the clap).
  tl.to('#slab-left', {
    x: '0%', duration: 0.4, ease: 'back.out(1.6)'
  }, SLAB_CLAP_IN);
  tl.to('#slab-right', {
    x: '0%', duration: 0.4, ease: 'back.out(1.6)'
  }, SLAB_CLAP_IN);
  tl.set(['#slab-left', '#slab-right'], { x: '0%' }, SLAB_MEET);

  // ── Phase 2: Reveal Clap ─────────────────────────────────────────────────
  // Slabs snap open outward to far left/right thirds - one sharp spring motion.
  tl.to('#slab-left', {
    xPercent: -95, duration: 0.35, ease: 'back.out(1.8)'
  }, SLAB_OPEN);
  tl.to('#slab-right', {
    xPercent: 95, duration: 0.35, ease: 'back.out(1.8)'
  }, SLAB_OPEN);
  // Beam settles back down as the reveal takes over (soft fade of the line itself).
  tl.to('#beam', { opacity: 0.25, duration: 0.5, ease: 'sine.out' }, SLAB_OPEN);

  // Kicker fades/slides up into place, staggered 3 frames after slab motion starts.
  tl.fromTo('#kicker',
    { autoAlpha: 0, y: 24 },
    { autoAlpha: 1, y: 0, duration: 0.4, ease: 'power3.out' },
    KICKER_IN
  );

  // ── Phase 3: Hero Wordmark Assembly ─────────────────────────────────────
  // AURORA slides from left, VANE from right, hard spring, settling clean (no text bounce).
  tl.fromTo('#hero-a',
    { xPercent: -140, autoAlpha: 0 },
    { xPercent: 0, autoAlpha: 1, duration: 0.5, ease: 'power4.out' },
    HERO_IN
  );
  tl.fromTo('#hero-b',
    { xPercent: 140, autoAlpha: 0 },
    { xPercent: 0, autoAlpha: 1, duration: 0.5, ease: 'power4.out' },
    HERO_IN + HERO_B_OFFSET
  );
  // A tiny gold keyline overshoot accent on the slab edges as the clap lands (not on text).
  tl.fromTo(['#slab-left', '#slab-right'],
    { filter: 'brightness(1)' },
    { filter: 'brightness(1.35)', duration: 0.12, ease: 'power2.out', yoyo: true, repeat: 1 },
    HERO_IN
  );

  // Laurel hairline strokes draw in via stroke-dashoffset.
  tl.set(['#laurel-left', '#laurel-right'], { strokeDasharray: 100, strokeDashoffset: 100 }, 0);
  tl.to('#laurel-left', { strokeDashoffset: 0, duration: LAUREL_DONE - LAUREL_DRAW, ease: 'power2.out' }, LAUREL_DRAW);
  tl.to('#laurel-right', { strokeDashoffset: 0, duration: LAUREL_DONE - LAUREL_DRAW, ease: 'power2.out' }, LAUREL_DRAW + 0.05);

  // Particle field fades in and begins its deterministic upward drift.
  tl.to(motes.map(m => m.el), { opacity: (i) => motes[i].opacity, duration: 0.5, stagger: 0.01, ease: 'sine.out' }, HERO_IN);
  motes.forEach((m) => {
    // Wrap-around rise: travel from startY up past the top, looping via modulo math
    // baked into two tween legs so it stays deterministic and finite (no repeat:-1).
    const totalRise = m.speed * (FIELD_FADE - HERO_IN);
    const wrapPoint = m.startY - 900; // once well above frame, reset below
    tl.fromTo(m.el,
      { y: 0 },
      { y: -totalRise, duration: FIELD_FADE - HERO_IN, ease: 'none' },
      HERO_IN
    );
  });

  // ── Phase 4: Hero Hold (2.30s - 3.90s) - ambient life only ─────────────
  // Slabs creep inward/outward ~1% width on a slow sine.
  tl.to('#slab-left', { xPercent: -90, duration: 0.8, ease: 'sine.inOut', yoyo: true, repeat: 1 }, HOLD_START);
  tl.to('#slab-right', { xPercent: 90, duration: 0.8, ease: 'sine.inOut', yoyo: true, repeat: 1 }, HOLD_START);
  // Spotlight bloom pulses +/-4% opacity on a 1.6s cycle.
  tl.to('#bloom', { opacity: 0.86, duration: 0.8, ease: 'sine.inOut', yoyo: true, repeat: 1 }, HOLD_START);
  // Gentle 1.02x scale creep on the hero wordmark - the frame never feels frozen.
  tl.to('#hero', { scale: 1.02, duration: (HOLD_END - HOLD_START), ease: 'sine.inOut' }, HOLD_START);

  // ── Phase 5: Decisive Exit ───────────────────────────────────────────────
  // Kicker fades out first (6 frames @ 30fps = 0.2s).
  tl.to('#kicker', { autoAlpha: 0, y: -14, duration: 0.2, ease: 'power2.in' }, KICKER_OUT);

  // Wordmark and laurel scale to 1.05x while fading, clearing by 4.4s (10 frames = ~0.33s).
  tl.to('#hero', { scale: 1.05, autoAlpha: 0, duration: 10/30, ease: 'power2.in' }, HERO_OUT);
  tl.to(['#laurel-left', '#laurel-right'], { autoAlpha: 0, duration: 10/30, ease: 'power2.in' }, HERO_OUT);

  // Slabs snap shut toward center, then continue off in the opposite direction (faster, ease-in).
  tl.to(['#slab-left', '#slab-right'], { xPercent: 0, duration: 0.12, ease: 'power2.in' }, SLAB_EXIT_IN);
  tl.to('#slab-left', { xPercent: -220, duration: 0.35, ease: 'power3.in' }, SLAB_EXIT_IN + 0.12);
  tl.to('#slab-right', { xPercent: 220, duration: 0.35, ease: 'power3.in' }, SLAB_EXIT_IN + 0.12);

  // Particle field and spotlight bloom fade to zero over the final 0.4s.
  tl.to(motes.map(m => m.el), { opacity: 0, duration: 0.4, ease: 'none' }, FIELD_FADE);
  tl.to('#bloom', { opacity: 0, duration: 0.4, ease: 'none' }, FIELD_FADE);
  tl.to('#beam', { opacity: 0, duration: 0.3, ease: 'none' }, FIELD_FADE);

  // Final frames: plain graphite gradient background alone - a clean, settled ending.

  window.__timelines['main'] = tl;
</script>
</body>
</html>

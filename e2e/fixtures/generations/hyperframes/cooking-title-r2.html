<!doctype html>
<!-- "Sunday Kitchen" title card - the reveal IS the stir: a warm ribbon-stroke sweeps
     left-to-right, settles into an underline, and the wordmark rises up behind it.
     1920x1080 @ 4.00s / 120 frames, opaque editorial-warm palette. -->
<html lang="en" data-composition-variables='[
  {"id":"title1","type":"string","label":"Title word 1","default":"Sunday"},
  {"id":"title2","type":"string","label":"Title word 2","default":"Kitchen"},
  {"id":"kicker","type":"string","label":"Kicker","default":"A WEEKEND COOKING SERIES"},
  {"id":"accent","type":"color","label":"Ribbon accent","default":"#C1633B"}
]'>
<head>
<meta charset="UTF-8" />
<title>Sunday Kitchen</title>
<style>
  html, body { margin: 0; padding: 0; }

  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: linear-gradient(180deg, #FBF1DF 0%, #F0DCB8 100%);
    font-family: Georgia, 'Times New Roman', serif;
  }

  .clip { position: absolute; inset: 0; }

  /* ── Layer 1: warm sunlight glow, upper-left ─────────────────────────────── */
  #glow {
    position: absolute;
    top: -12%;
    left: -10%;
    width: 70%;
    height: 70%;
    background: radial-gradient(circle at 30% 30%, rgba(246,200,122,0.55) 0%, rgba(246,200,122,0.0) 70%);
    opacity: 0;
    will-change: transform, opacity;
  }

  /* ── Layer 2: warm vignette holding the edges ────────────────────────────── */
  #vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(138,90,43,0) 55%, rgba(138,90,43,0.06) 100%);
    opacity: 0;
  }

  /* ── Lockup: ribbon + wordmark + kicker, stacked back to front ───────────── */
  #lockup {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  /* Ribbon stroke: a thick curved terracotta line under the wordmark */
  #ribbon-wrap {
    position: absolute;
    top: 56%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 980px;
    height: 44px;
  }
  #ribbon-svg { width: 100%; height: 100%; overflow: visible; }
  #ribbon-path {
    fill: none;
    stroke: var(--accent, #C1633B);
    stroke-width: 22;
    stroke-linecap: round;
    filter: drop-shadow(0 4px 6px rgba(138,74,30,0.25));
  }

  /* Wordmark: two masked lines, serif, tight tracking */
  #wordmark {
    position: absolute;
    top: 48%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    filter: drop-shadow(0 10px 22px rgba(120,72,30,0.22));
  }
  .word-mask {
    overflow: hidden;
    line-height: 1;
  }
  .word-line {
    margin: 0;
    font-size: 150px;
    font-weight: 400;
    font-style: normal;
    letter-spacing: -0.01em;
    color: #4A2E17;
    white-space: nowrap;
  }

  /* Kicker: small-caps sans, wide tracking, secondary */
  #kicker {
    position: absolute;
    top: 62%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Inter', Arial, sans-serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8A5A2B;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4">

  <!-- Background atmosphere: gradient base already painted via CSS, glow + vignette animate in -->
  <section id="bg-layer" class="clip" data-start="0" data-duration="4" data-track-index="1">
    <div id="glow"></div>
    <div id="vignette"></div>
  </section>

  <!-- The lockup: ribbon (settles low), wordmark (hero), kicker (topmost) -->
  <section id="lockup-layer" class="clip" data-start="0" data-duration="4" data-track-index="2">
    <div id="lockup">
      <div id="ribbon-wrap">
        <svg id="ribbon-svg" viewBox="0 0 980 44" preserveAspectRatio="none">
          <path id="ribbon-path" d="M 10 30 Q 300 -6 490 20 T 970 18" pathLength="1"></path>
        </svg>
      </div>
      <div id="wordmark">
        <div class="word-mask"><h1 class="word-line" id="word1" data-var-text="title1">Sunday</h1></div>
        <div class="word-mask"><h1 class="word-line" id="word2" data-var-text="title2">Kitchen</h1></div>
      </div>
      <div id="kicker" data-var-text="kicker">A WEEKEND COOKING SERIES</div>
    </div>
  </section>
</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing map (composition seconds) ────────────────────────────────────
  const BLOOM_START   = 0.00;
  const BLOOM_END     = 0.83;   // glow + vignette establish the atmosphere
  const RIBBON_START  = 0.83;   // stir gesture begins
  const RIBBON_SETTLE = 1.83;   // ribbon settles beneath wordmark
  const WORD1_IN      = 1.50;   // wordmark reveal overlaps ribbon's last third
  const WORD2_IN      = 1.63;   // 4-frame (~0.133s) stagger between the two lines
  const KICKER_IN     = 2.30;
  const KICKER_LAND   = 2.70;
  const HOLD_START    = 2.70;
  const HOLD_END      = 3.20;
  const KICKER_EXIT   = 3.20;   // kicker fades first
  const RIBBON_EXIT   = 3.35;   // ribbon fades + thins next
  const WORD_EXIT     = 3.40;   // wordmark's final soft settle to black-frame
  const END           = 4.00;

  // ── Phase 1: warm bloom - atmosphere before any type ────────────────────
  tl.to('#glow',     { opacity: 1,    duration: BLOOM_END - BLOOM_START, ease: 'power2.out' }, BLOOM_START);
  tl.to('#vignette', { opacity: 1,    duration: BLOOM_END - BLOOM_START, ease: 'power1.out' }, BLOOM_START);

  // ── Phase 2: ribbon stir-in - draws on, tip overshoots, settles ─────────
  // Stroke draws left-to-right via dashoffset (clamped ease-out feel).
  tl.fromTo('#ribbon-path',
    { drawSVG: '0%' } ? {} : {}, {}, 0); // no-op guard (drawSVG plugin not assumed available)

  gsap.set('#ribbon-path', { strokeDasharray: 1, strokeDashoffset: 1 });
  tl.to('#ribbon-path', {
    strokeDashoffset: 0,
    duration: RIBBON_SETTLE - RIBBON_START,
    ease: 'power2.out'
  }, RIBBON_START);
  // The ribbon-wrap itself carries the "stir" travel + spring settle with a slight overshoot.
  tl.fromTo('#ribbon-wrap',
    { x: -260, scaleX: 0.9 },
    { x: 0, scaleX: 1, duration: RIBBON_SETTLE - RIBBON_START, ease: 'back.out(1.6)' },
    RIBBON_START
  );

  // ── Phase 3: wordmark reveal - masked lines slide up, staggered ─────────
  tl.from('#word1', { yPercent: 100, duration: 0.55, ease: 'power3.out' }, WORD1_IN);
  tl.from('#word2', { yPercent: 100, duration: 0.55, ease: 'power3.out' }, WORD2_IN);

  // ── Phase 4: kicker settle - fades + rises into the lockup ──────────────
  tl.from('#kicker', {
    y: 20,
    autoAlpha: 0,
    duration: KICKER_LAND - KICKER_IN,
    ease: 'power2.out'
  }, KICKER_IN);

  // ── Phase 5: hero hold - ambient sine drift on glow, subtle scale creep ─
  // Glow drifts +/-15px unhurried (linear-ish sine, not eased) across the hold.
  tl.to('#glow', {
    x: 15, y: 10,
    duration: (HOLD_END - HOLD_START) / 2,
    ease: 'sine.inOut',
    repeat: 3,
    yoyo: true
  }, HOLD_START);
  // Wordmark carries a barely perceptible 1.5% scale creep through the hold.
  tl.to('#wordmark', {
    scale: 1.015,
    duration: (HOLD_END - HOLD_START) / 2,
    ease: 'sine.inOut',
    repeat: 1,
    yoyo: true
  }, HOLD_START);

  // ── Phase 6: decisive exit - kicker, then ribbon, wordmark settles last ─
  tl.to('#kicker', {
    y: -14,
    autoAlpha: 0,
    duration: 6 / 30,
    ease: 'power2.in'
  }, KICKER_EXIT);

  tl.to('#ribbon-wrap', {
    autoAlpha: 0,
    scaleX: 0.85,
    duration: 8 / 30,
    ease: 'power2.in'
  }, RIBBON_EXIT);

  // Wordmark: soft 2% scale-down with opacity easing to 0 by the final frame - the last
  // element on screen, background steady beneath so the cut lands clean.
  tl.to('#wordmark', {
    scale: 0.98,
    autoAlpha: 0,
    duration: END - WORD_EXIT,
    ease: 'power1.in'
  }, WORD_EXIT);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

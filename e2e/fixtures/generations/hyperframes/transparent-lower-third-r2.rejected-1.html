<!doctype html>
<!-- "Film Leader Strap" - documentary lower-third, 1920x1080 @ 4.00s, transparent alpha.
     Concept: a graphite panel unfurls from a left-anchored amber tick like exposed film
     leader, carrying name + role up out of a masked reveal, then retracts into the tick. -->
<html lang="en" data-composition-variables='[
  {"id":"name","type":"string","label":"Guest name","default":"Elena Vasquez"},
  {"id":"role","type":"string","label":"Role / institution","default":"Senior Climate Researcher, Whitmore Institute"},
  {"id":"kicker","type":"string","label":"Kicker label","default":"INTERVIEW"},
  {"id":"accent","type":"color","label":"Accent (amber)","default":"#c98a3e"}
]'>
<head>
<meta charset="UTF-8" />
<title>Film Leader Strap</title>
<style>
  html, body { margin: 0; padding: 0; }
  /* Transparent stage - root paints nothing, strap composites over live footage. */
  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Archivo', 'Arial Narrow', Arial, sans-serif;
  }
  .clip { position: absolute; inset: 0; }

  /* ── Strap group: everything anchors from this lower-left box ─────────── */
  #strap {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
  }

  /* Soft drop shadow blob under the panel - the only depth cue against the plate. */
  #panel-shadow {
    position: absolute;
    left: 96px;
    top: 842px;
    width: 690px;
    height: 158px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0) 72%);
    filter: blur(6px);
  }

  /* The graphite panel: same-hue top-to-bottom gradient, soft top edge highlight,
     hairline keyline at the base - a lit surface, not a flat card. */
  #panel-wrap {
    position: absolute;
    left: 96px;
    top: 810px;
    width: 691px;
    height: 130px;
    overflow: hidden; /* width-reveal sweep + masked text reveal happen here */
  }
  #panel {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #2f2d2a 0%, #221f1d 55%, #1c1b19 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.14),
      inset 0 -1px 0 rgba(0,0,0,0.55);
    border-bottom: 2px solid var(--accent, #c98a3e);
  }

  /* Amber vertical tick riding the panel's leading left edge, on top of the panel. */
  #tick {
    position: absolute;
    left: 96px;
    top: 796px;
    width: 6px;
    height: 158px;
    background: var(--accent, #c98a3e);
    border-radius: 2px;
    box-shadow: 0 0 14px rgba(201,138,62,0.55);
    transform-origin: center center;
  }

  /* Text block sits above panel/tick, masked by panel-wrap during reveal. */
  #text-col {
    position: absolute;
    left: 138px;
    top: 0;
    width: 620px;
  }

  #kicker {
    position: absolute;
    top: 25.9px; /* height*0.024 */
    left: 0;
    font-size: 25.9px; /* height*0.024 */
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent, #c98a3e);
    white-space: nowrap;
  }

  #name-mask {
    position: absolute;
    top: 453.6px; /* 0.42 * 1080 - eyeballed baseline offset handled by line-height */
    left: 0;
    width: 620px;
    overflow: hidden;
    padding: 4px 0;
  }
  #name {
    margin: 0;
    color: #f3f1ee;
    font-weight: 800;
    letter-spacing: -0.01em;
    line-height: 1;
    white-space: nowrap;
  }

  #role-mask {
    position: absolute;
    top: 545px; /* name top + fontSize*1.5 approx, tuned below in JS-free layout */
    left: 0;
    width: 620px;
    overflow: hidden;
    padding: 3px 0;
  }
  #role {
    margin: 0;
    font-size: 32.4px; /* height*0.03 */
    font-weight: 500;
    font-variant: small-caps;
    letter-spacing: 0.04em;
    color: rgba(243,241,238,0.86);
    white-space: nowrap;
  }

  /* Thin amber baseline rule under the role text - draws left to right on entrance. */
  #role-rule {
    position: absolute;
    top: 583px;
    left: 0;
    width: 260px;
    height: 2px;
    background: var(--accent, #c98a3e);
    transform-origin: left center;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4">

  <!-- Single clip spanning the full duration; motion (not clip windows) carries
       the entrance/hold/exit choreography. -->
  <section id="strap-layer" class="clip" data-start="0" data-duration="4" data-track-index="1">
    <div id="strap">
      <div id="panel-shadow"></div>
      <div id="panel-wrap">
        <div id="panel"></div>
      </div>
      <div id="tick"></div>
      <div id="text-col">
        <div id="kicker" data-var-text="kicker">INTERVIEW</div>
        <div id="name-mask">
          <h1 id="name" data-var-text="name">Elena Vasquez</h1>
        </div>
        <div id="role-mask">
          <div id="role" data-var-text="role">Senior Climate Researcher, Whitmore Institute</div>
        </div>
        <div id="role-rule"></div>
      </div>
    </div>
  </section>
</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Size the hero (name) from its own string ──────────────────────────────
  // Archivo capAdvance ~0.74 em/char. Target ~60-65% of 1920px = ~1190px settled width.
  const NAME_STR = document.getElementById('name').textContent.trim();
  const CAP_ADV = 0.74;
  const TARGET_WIDTH = 1920 * 0.62;
  let nameFontSize = TARGET_WIDTH / (NAME_STR.length * CAP_ADV);
  // Clamp to sensible bounds so short/long names stay legible in this compact strap.
  nameFontSize = Math.max(52, Math.min(nameFontSize, 108));
  document.getElementById('name').style.fontSize = nameFontSize + 'px';

  // Re-anchor role line under the settled name (name top ~453.6px + fontSize*1.5).
  const nameTop = 453.6;
  document.getElementById('name-mask').style.top = nameTop + 'px';
  const roleTop = nameTop + nameFontSize * 1.5;
  document.getElementById('role-mask').style.top = roleTop + 'px';
  document.getElementById('role-rule').style.top = (roleTop + 38) + 'px';

  // ── Timing constants (composition seconds) ────────────────────────────────
  const PANEL_IN_START   = 0.00;
  const PANEL_IN_END     = 0.42;
  const NAME_IN_START    = 0.10;
  const NAME_IN_END      = 0.55;
  const ROLE_IN_START    = 0.23;
  const ROLE_IN_END      = 0.65;
  const HOLD_START       = 0.65;
  const HOLD_END         = 2.90;
  const ROLE_OUT_START   = 2.90; // 8 frames @30fps = ~0.267s
  const ROLE_OUT_END     = 3.17;
  const NAME_OUT_START   = 3.03; // 3 frames after role
  const NAME_OUT_END     = 3.33;
  const PANEL_OUT_START  = 3.20;
  const PANEL_OUT_END    = 3.75;

  const PANEL_W = 691;
  const PANEL_X_HIDDEN = -PANEL_W * 0.4 - PANEL_W; // start well off-left (x=-40% width of frame concept, translated to panel local)

  // ── Initial states ─────────────────────────────────────────────────────────
  gsap.set('#panel-wrap', { width: 0 });
  gsap.set('#panel', { x: 0 });
  gsap.set('#tick', { autoAlpha: 0, x: -60 });
  gsap.set('#name', { y: 28, autoAlpha: 0 });
  gsap.set('#role', { y: 16, autoAlpha: 0 });
  gsap.set('#kicker', { y: 16, autoAlpha: 0 });
  gsap.set('#role-rule', { scaleX: 0 });

  // ── Phase 1: Panel sweep-in (width reveal), clamped fast-start/soft-land ──
  tl.to('#panel-wrap', {
    width: PANEL_W,
    duration: PANEL_IN_END - PANEL_IN_START,
    ease: 'power3.out'
  }, PANEL_IN_START);

  // Tick rides the leading edge in, arriving with the panel.
  tl.to('#tick', {
    autoAlpha: 1,
    x: 0,
    duration: PANEL_IN_END - PANEL_IN_START,
    ease: 'power3.out'
  }, PANEL_IN_START);

  // ── Phase 2: Name rises from below, masked by panel edge (spring-like) ───
  tl.to('#name', {
    y: 0,
    autoAlpha: 1,
    duration: NAME_IN_END - NAME_IN_START,
    ease: 'back.out(1.15)' // soft spring feel, damping ~22, no hard overshoot
  }, NAME_IN_START);

  // ── Phase 3: Role + kicker rise in, slightly softer spring; rule draws ────
  tl.to('#role', {
    y: 0,
    autoAlpha: 1,
    duration: ROLE_IN_END - ROLE_IN_START,
    ease: 'back.out(1.0)' // softer than name, damping ~26 feel
  }, ROLE_IN_START);

  tl.to('#kicker', {
    y: 0,
    autoAlpha: 1,
    duration: ROLE_IN_END - ROLE_IN_START,
    ease: 'back.out(1.0)'
  }, ROLE_IN_START);

  tl.to('#role-rule', {
    scaleX: 1,
    duration: ROLE_IN_END - ROLE_IN_START,
    ease: 'power2.out'
  }, ROLE_IN_START);

  // ── Hold: strap sits static; amber tick breathes a subtle 1.02x pulse ─────
  // Two gentle breaths across the ~2.25s hold (~1.5s apart), finite repeat.
  tl.to('#tick', {
    scale: 1.02,
    duration: 0.6,
    ease: 'sine.inOut',
    repeat: 1,
    yoyo: true,
    transformOrigin: 'center center'
  }, HOLD_START + 0.2);
  tl.to('#tick', {
    scale: 1.02,
    duration: 0.6,
    ease: 'sine.inOut',
    repeat: 1,
    yoyo: true,
    transformOrigin: 'center center'
  }, HOLD_START + 1.7);

  // ── Exit Phase 1: role + kicker fade/shift left first (fast, accelerating) ─
  tl.to(['#role', '#kicker'], {
    x: -20,
    autoAlpha: 0,
    duration: ROLE_OUT_END - ROLE_OUT_START,
    ease: 'power2.in'
  }, ROLE_OUT_START);
  tl.to('#role-rule', {
    autoAlpha: 0,
    duration: ROLE_OUT_END - ROLE_OUT_START,
    ease: 'power2.in'
  }, ROLE_OUT_START);

  // ── Exit Phase 2: name follows, faster than its entrance ─────────────────
  tl.to('#name', {
    x: -24,
    autoAlpha: 0,
    duration: NAME_OUT_END - NAME_OUT_START,
    ease: 'power2.in'
  }, NAME_OUT_START);

  // ── Exit Phase 3: panel + tick retract back into the tick's origin ───────
  tl.to('#panel-wrap', {
    width: 0,
    duration: PANEL_OUT_END - PANEL_OUT_START,
    ease: 'power4.in' // accelerating, faster/decisive vs the entrance ease
  }, PANEL_OUT_START);

  tl.to('#tick', {
    autoAlpha: 0,
    scale: 0.9,
    duration: PANEL_OUT_END - PANEL_OUT_START,
    ease: 'power4.in'
  }, PANEL_OUT_START);

  // Frame holds empty + transparent for the remaining tail through the cut (3.75-4.00s).

  window.__timelines['main'] = tl;
</script>
</body>
</html>

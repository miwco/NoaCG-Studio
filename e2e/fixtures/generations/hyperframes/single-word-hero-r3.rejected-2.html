<!doctype html>
<!-- "Landfall Sting" - storm-coverage cold open: an amber pressure-line slams across
     dark, drifting cloud-smudge slate; LAND and FALL race in from opposite edges and
     collide into LANDFALL with a shockwave flash; kicker locks in; fast punch-out to
     black. 1920x1080 @ 3.00 s / 90 frames. -->
<html lang="en" data-composition-variables='[
  {"id":"title","type":"string","label":"Title","default":"LANDFALL"},
  {"id":"kicker","type":"string","label":"Kicker","default":"STORM COVERAGE · LIVE"},
  {"id":"accent","type":"color","label":"Warning accent","default":"#e8a23d"}
]'>
<head>
<meta charset="UTF-8" />
<title>Landfall Sting</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; }

  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #0b0e12;
    font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
  }

  .clip { position: absolute; inset: 0; }

  /* ── Layer 1: base slate gradient, deep and layered, never flat ───────────── */
  #bg-base {
    position: absolute; inset: -5%;
    background:
      radial-gradient(120% 90% at 30% 20%, #161c24 0%, #0b0e12 55%),
      linear-gradient(165deg, #10141a 0%, #0b0e12 60%, #08090c 100%);
  }

  /* ── Layer 2: drifting cloud-smudge texture, low opacity, behind everything ── */
  #cloud-layer {
    position: absolute;
    top: -10%; left: -20%;
    width: 140%; height: 120%;
    background:
      radial-gradient(38% 30% at 20% 35%, rgba(26,32,39,0.75) 0%, rgba(26,32,39,0) 70%),
      radial-gradient(30% 26% at 60% 60%, rgba(18,21,26,0.7) 0%, rgba(18,21,26,0) 70%),
      radial-gradient(34% 28% at 85% 25%, rgba(26,32,39,0.55) 0%, rgba(26,32,39,0) 70%),
      radial-gradient(26% 22% at 45% 80%, rgba(18,21,26,0.6) 0%, rgba(18,21,26,0) 70%);
    opacity: 0.85;
    will-change: transform;
  }

  /* Vignette pulling corners darker, sits above clouds, below hairlines */
  #vignette {
    position: absolute; inset: 0;
    background: radial-gradient(120% 90% at 50% 50%, rgba(0,0,0,0) 45%, rgba(0,0,0,0.55) 100%);
  }

  /* ── Layer 3: radar hairlines, faint, above/below center ──────────────────── */
  .hairline {
    position: absolute;
    left: 0; width: 100%; height: 1px;
    background: linear-gradient(90deg, rgba(232,162,61,0) 0%, rgba(232,162,61,0.35) 50%, rgba(232,162,61,0) 100%);
    opacity: 0;
  }
  #hairline-top { top: calc(50% - 96px); }
  #hairline-bottom { top: calc(50% + 96px); }

  /* ── Layer 4: amber pressure-line, full width, center ─────────────────────── */
  #pressure-line-wrap {
    position: absolute;
    top: 50%; left: 0;
    width: 100%; height: 6px;
    margin-top: -3px;
    overflow: visible;
  }
  #pressure-line {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, rgba(232,162,61,0.2) 0%, var(--accent, #e8a23d) 12%, var(--accent, #e8a23d) 88%, rgba(232,162,61,0.2) 100%);
    box-shadow: 0 0 18px 2px rgba(232,162,61,0.55), 0 0 3px rgba(232,162,61,0.9);
  }

  /* Impact flash: full-frame amber wash */
  #flash {
    position: absolute; inset: 0;
    background: var(--accent, #e8a23d);
    opacity: 0;
    mix-blend-mode: screen;
  }

  /* ── Layer 5 + 6: title and kicker, topmost ───────────────────────────────── */
  #text-stack {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #kicker {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: 28px;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 32.4px; /* 1080 * 0.03 */
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent, #e8a23d);
    white-space: nowrap;
    opacity: 0;
  }

  #title-row {
    position: relative;
    display: flex;
    white-space: nowrap;
  }

  #title-row .half {
    display: inline-block;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.015em;
    color: #f2f3f5;
    /* fontSize solved so lineWidth = fontSize * 0.52(Oswald capAdvance) * 9 chars ~= 1344px */
    font-size: 287px;
    line-height: 1;
    text-shadow: 0 6px 30px rgba(0,0,0,0.55);
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="3">

  <!-- Background + clouds + vignette: full duration, sits behind everything -->
  <section id="bg-layer" class="clip" data-start="0" data-duration="3" data-track-index="1">
    <div id="bg-base"></div>
    <div id="cloud-layer"></div>
    <div id="vignette"></div>
  </section>

  <!-- Radar hairlines -->
  <section id="hairline-layer" class="clip" data-start="0" data-duration="3" data-track-index="2">
    <div id="hairline-top" class="hairline"></div>
    <div id="hairline-bottom" class="hairline"></div>
  </section>

  <!-- Pressure line -->
  <section id="line-layer" class="clip" data-start="0" data-duration="3" data-track-index="3">
    <div id="pressure-line-wrap"><div id="pressure-line"></div></div>
  </section>

  <!-- Impact flash -->
  <section id="flash-layer" class="clip" data-start="0" data-duration="3" data-track-index="4">
    <div id="flash"></div>
  </section>

  <!-- Title + kicker: topmost, never covered. The "title" variable (default LANDFALL)
       is split into two halves for the impact device; each half reads a slice of it via
       data-var-text so the control still drives the on-screen word (LAND / FALL). -->
  <section id="text-layer" class="clip" data-start="0" data-duration="3" data-track-index="5">
    <div id="text-stack">
      <div id="kicker" data-var-text="kicker">STORM COVERAGE · LIVE</div>
      <div id="title-row">
        <span class="half" id="half-land" data-var-text="title">LAND</span><span class="half" id="half-fall" data-var-text="title">FALL</span>
      </div>
    </div>
  </section>

</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Bind the "title" variable to the split wordmark ─────────────────────────
  // Each half must show only ITS slice of the (possibly edited) title string, so we
  // split it in half here (rounded) rather than relying on the raw default text.
  (function bindTitle() {
    const landEl = document.getElementById('half-land');
    const fallEl = document.getElementById('half-fall');
    const full = (landEl.textContent || 'LANDFALL').trim() || 'LANDFALL';
    const mid = Math.ceil(full.length / 2);
    landEl.textContent = full.slice(0, mid);
    fallEl.textContent = full.slice(mid);
  })();

  // ── Timing constants (composition seconds) ─────────────────────────────────
  const HAIRLINE_IN   = 0.10;
  const LINE_SLAM      = 0.35;
  const LINE_SETTLE    = 0.55;
  const SPLIT_START    = 0.60;
  const IMPACT         = 0.95;
  const SETTLE_DONE    = 1.15;
  const KICKER_IN      = 1.30;
  const HOLD_START     = 1.15;
  const HOLD_END       = 2.35;
  const EXIT_KICKER    = 2.35;
  const EXIT_TITLE     = 2.42;
  const BLACKOUT       = 2.85;
  const END            = 3.00;

  // ── Phase 0: Charge / Approach ──────────────────────────────────────────────
  // Cloud drift runs continuously, linear-ish, the whole piece (ambient, non-eased).
  tl.to('#cloud-layer', { x: 90, duration: END, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 0);

  // Radar hairlines fade in faintly, building anticipation.
  tl.to('#hairline-top',    { opacity: 0.5, duration: 0.2, ease: 'power1.out' }, HAIRLINE_IN);
  tl.to('#hairline-bottom', { opacity: 0.5, duration: 0.2, ease: 'power1.out' }, HAIRLINE_IN + 0.02);

  // Pressure-line slams in from off-frame right with a hard stop.
  tl.fromTo('#pressure-line-wrap',
    { xPercent: 140 },
    { xPercent: 0, duration: LINE_SETTLE - LINE_SLAM, ease: 'power2.out' },
    LINE_SLAM
  );

  // ── Phase 1: Split-Slam Impact ───────────────────────────────────────────────
  // Halves race in from opposite edges, staggered 2 frames (~0.067s at 30fps -> 0.066).
  tl.fromTo('#half-land',
    { x: -1400, autoAlpha: 0 },
    { x: 0, autoAlpha: 1, duration: 0.35, ease: 'power3.out' },
    SPLIT_START
  );
  tl.fromTo('#half-fall',
    { x: 1400, autoAlpha: 0 },
    { x: 0, autoAlpha: 1, duration: 0.35, ease: 'power3.out' },
    SPLIT_START + 0.067
  );

  // Collision: single overshoot scale-punch on the whole title row.
  tl.fromTo('#title-row',
    { scale: 1 },
    { scale: 1.015, duration: 0.1, ease: 'power2.out' },
    IMPACT - 0.02
  );
  tl.to('#title-row', { scale: 1, duration: 0.1, ease: 'power1.out' }, IMPACT + 0.08);

  // Shockwave flash wash: 0 -> 0.4 -> 0 across ~4 frames (~0.133s).
  tl.fromTo('#flash',
    { opacity: 0 },
    { opacity: 0.4, duration: 0.06, ease: 'power1.out' },
    IMPACT
  );
  tl.to('#flash', { opacity: 0, duration: 0.07, ease: 'power1.in' }, IMPACT + 0.06);

  // ── Phase 2: Hero Hold ───────────────────────────────────────────────────────
  // Kicker slides up + fades in, locking in after impact so it's never covered.
  tl.fromTo('#kicker',
    { y: 12, autoAlpha: 0 },
    { y: 0, autoAlpha: 1, duration: 0.3, ease: 'power2.out' },
    KICKER_IN
  );

  // Ambient: title creeps 100% -> 102% slowly through the hold.
  tl.fromTo('#title-row',
    { scale: 1 },
    { scale: 1.02, duration: HOLD_END - SETTLE_DONE, ease: 'sine.inOut' },
    SETTLE_DONE
  );

  // Ambient: pressure-line 1px amber glow pulse, 2 slow cycles across the hold.
  tl.to('#pressure-line', {
    boxShadow: '0 0 26px 4px rgba(232,162,61,0.85), 0 0 5px rgba(232,162,61,1)',
    duration: (HOLD_END - HOLD_START) / 4,
    ease: 'sine.inOut',
    repeat: 3,
    yoyo: true
  }, HOLD_START);

  // ── Phase 3: Storm Clears - Exit ─────────────────────────────────────────────
  // Kicker punches down/out first, fast.
  tl.to('#kicker', {
    autoAlpha: 0, y: 10, scale: 0.96,
    duration: 4 / 30, ease: 'power3.in'
  }, EXIT_KICKER);

  // Title + pressure-line punch-scale down together and streak off opposite entrance.
  tl.to('#title-row', {
    scale: 0.96, x: -260, autoAlpha: 0,
    duration: 10 / 30, ease: 'power3.in'
  }, EXIT_TITLE);
  tl.to('#pressure-line-wrap', {
    xPercent: -140,
    duration: 10 / 30, ease: 'power3.in'
  }, EXIT_TITLE);

  // Background + clouds hold one extra beat, then cut to solid black.
  tl.to(['#bg-base', '#cloud-layer', '#vignette', '#hairline-top', '#hairline-bottom'], {
    autoAlpha: 0,
    duration: 0.08,
    ease: 'power2.in'
  }, BLACKOUT - 0.08);
  tl.set('#root', { backgroundColor: '#000000' }, BLACKOUT);
  // Remain pure black through the final frame.
  tl.to('#root', { backgroundColor: '#000000', duration: END - BLACKOUT }, BLACKOUT);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

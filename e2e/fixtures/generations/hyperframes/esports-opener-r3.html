<!doctype html>
<!-- "Nova Rift" opener - a jagged neon rift tears the arena floor, slamming two
     skewed slabs together to weld the "NOVA RIFT" wordmark shut, then rockets
     off-frame for a clean cut. 1920x1080 @ 4.00s / 120 frames @ 30fps. -->
<html lang="en" data-composition-variables='[
  {"id":"title1","type":"string","label":"Title (word 1)","default":"NOVA"},
  {"id":"title2","type":"string","label":"Title (word 2)","default":"RIFT"},
  {"id":"kicker","type":"string","label":"Kicker","default":"LATE NIGHT ESPORTS"},
  {"id":"cyan","type":"color","label":"Rift accent - cyan","default":"#38f4e0"},
  {"id":"magenta","type":"color","label":"Rift accent - magenta","default":"#ff3fd6"}
]'>
<head>
<meta charset="UTF-8" />
<title>Nova Rift</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: linear-gradient(180deg, #0b0a14 0%, #150f24 55%, #16112a 100%);
    font-family: 'Archivo', 'Arial Black', Arial, sans-serif;
  }

  .clip { position: absolute; inset: 0; }

  /* ---- Background arena texture: faint hex-grid, fixed, low opacity ---- */
  #hexgrid {
    position: absolute; inset: -10%;
    width: 120%; height: 120%;
    background-image:
      linear-gradient(60deg, rgba(120,120,180,0.05) 25%, transparent 25.5%, transparent 75%, rgba(120,120,180,0.05) 75.5%),
      linear-gradient(-60deg, rgba(120,120,180,0.05) 25%, transparent 25.5%, transparent 75%, rgba(120,120,180,0.05) 75.5%),
      linear-gradient(0deg, rgba(120,120,180,0.04) 1px, transparent 1px);
    background-size: 86px 150px, 86px 150px, 100% 30px;
    opacity: 0.55;
  }

  /* ---- Rift crack: a jagged clip-path glow line splitting the frame ---- */
  #rift-wrap {
    position: absolute;
    top: 50%; left: 50%;
    width: 2700px; height: 14px;
    margin-left: -1350px; margin-top: -7px;
    transform: rotate(-8deg);
    transform-origin: center;
  }
  #rift-glow {
    position: absolute; inset: 0;
    background: linear-gradient(90deg,
      transparent 0%, var(--cyan, #38f4e0) 12%, #fff 50%, var(--magenta, #ff3fd6) 88%, transparent 100%);
    clip-path: polygon(
      0% 40%, 6% 60%, 12% 30%, 18% 65%, 24% 35%, 30% 70%, 36% 30%,
      42% 60%, 48% 35%, 54% 65%, 60% 30%, 66% 70%, 72% 35%,
      78% 60%, 84% 30%, 90% 65%, 96% 40%, 100% 60%,
      100% 40%, 96% 60%, 90% 35%, 84% 70%, 78% 40%, 72% 65%,
      66% 30%, 60% 70%, 54% 35%, 48% 65%, 42% 40%, 36% 70%,
      30% 30%, 24% 65%, 18% 35%, 12% 70%, 6% 40%, 0% 60%
    );
    filter: drop-shadow(0 0 14px var(--cyan, #38f4e0)) drop-shadow(0 0 26px var(--magenta, #ff3fd6));
  }
  #rift-flash {
    position: absolute; inset: -40px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.95) 0%, rgba(56,244,224,0.5) 35%, transparent 70%);
    opacity: 0;
  }

  /* ---- Slab panels: skewed, same-hue lit gradient, edge keyline, hard shadow ---- */
  .slab {
    position: absolute;
    left: 50%; top: 50%;
    width: 2400px; height: 420px;
    margin-left: -1200px;
    transform-origin: center;
    background-image: linear-gradient(165deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0) 35%, rgba(0,0,0,0.35) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.14),
      0 30px 70px rgba(0,0,0,0.55),
      0 4px 0 rgba(0,0,0,0.4);
  }
  #slab-top {
    margin-top: -430px;
    background-color: #1c1730;
    border-bottom: 2px solid rgba(56,244,224,0.55);
    transform: rotate(-8deg);
  }
  #slab-bottom {
    margin-top: 10px;
    background-color: #201229;
    border-top: 2px solid rgba(255,63,214,0.55);
    transform: rotate(-8deg);
  }

  /* ---- Shockwave ring: welds the two halves together ---- */
  #shockwave {
    position: absolute;
    left: 50%; top: 50%;
    width: 60px; height: 60px;
    margin-left: -30px; margin-top: -30px;
    border-radius: 50%;
    border: 3px solid var(--cyan, #38f4e0);
    box-shadow: 0 0 30px var(--magenta, #ff3fd6);
    opacity: 0;
  }

  /* ---- Ember particles: mid-depth drifting motes ---- */
  .ember {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    filter: blur(0.5px);
    opacity: 0;
  }

  /* ---- Wordmark: two independently-animated slabs of text ---- */
  #word-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #word-line {
    display: flex;
    align-items: baseline;
    justify-content: center;
    white-space: nowrap;
  }
  .word {
    margin: 0;
    font-weight: 800;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: #f5f4fb;
    text-shadow: 0 0 26px rgba(56,244,224,0.35), 0 6px 18px rgba(0,0,0,0.6);
    font-size: 240px; /* solved from lineWidth = F*0.62*9 = 70%*1920 */
  }
  #word-nova { color: #f5f4fb; }
  #word-rift {
    background: linear-gradient(90deg, #f5f4fb 55%, #ffe1f6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #word-gap { width: 0.28em; flex: none; }

  #kicker {
    margin-top: 26px;
    font-family: 'JetBrains Mono', 'Space Grotesk', monospace;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(232,238,255,0.82);
    opacity: 0;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4">

  <!-- Track 0: static arena background + texture, full duration -->
  <section id="bg-layer" class="clip" data-start="0" data-duration="4" data-track-index="0">
    <div id="hexgrid"></div>
  </section>

  <!-- Track 1: the two slab panels -->
  <section id="slab-layer" class="clip" data-start="0" data-duration="4" data-track-index="1">
    <div id="slab-top" class="slab"></div>
    <div id="slab-bottom" class="slab"></div>
  </section>

  <!-- Track 2: the rift crack glow + flash, sits between panels and text -->
  <section id="rift-layer" class="clip" data-start="0" data-duration="4" data-track-index="2">
    <div id="rift-wrap">
      <div id="rift-glow"></div>
      <div id="rift-flash"></div>
    </div>
    <div id="shockwave"></div>
  </section>

  <!-- Track 3: ember particles, mid-depth -->
  <section id="ember-layer" class="clip" data-start="0" data-duration="4" data-track-index="3">
    <div class="ember" id="ember-1" style="left:32%; top:64%; background:#38f4e0;"></div>
    <div class="ember" id="ember-2" style="left:41%; top:70%; background:#ff3fd6;"></div>
    <div class="ember" id="ember-3" style="left:58%; top:38%; background:#38f4e0;"></div>
    <div class="ember" id="ember-4" style="left:66%; top:60%; background:#ff3fd6;"></div>
    <div class="ember" id="ember-5" style="left:48%; top:52%; background:#38f4e0;"></div>
    <div class="ember" id="ember-6" style="left:37%; top:44%; background:#ff3fd6;"></div>
    <div class="ember" id="ember-7" style="left:60%; top:72%; background:#38f4e0;"></div>
    <div class="ember" id="ember-8" style="left:53%; top:30%; background:#ff3fd6;"></div>
  </section>

  <!-- Track 4: wordmark + kicker, painted last, on top of everything -->
  <section id="text-layer" class="clip" data-start="0" data-duration="4" data-track-index="4">
    <div id="word-wrap">
      <div id="word-line">
        <h1 id="word-nova" class="word" data-var-text="title1">NOVA</h1>
        <div id="word-gap"></div>
        <h1 id="word-rift" class="word" data-var-text="title2">RIFT</h1>
      </div>
      <div id="kicker" data-var-text="kicker">LATE NIGHT ESPORTS</div>
    </div>
  </section>
</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing constants (seconds) ─────────────────────────────────────────────
  const RIFT_FLASH_ON   = 0.13;
  const RIFT_TEAR_END   = 0.40;
  const SLAB_ARRIVE     = 0.60;
  const SLAB_SLAM_END   = 0.90;
  const WORD_NOVA_IN    = 0.60;
  const WORD_RIFT_IN    = 0.70; // 3-frame stagger @30fps
  const WORD_SETTLE     = 1.20;
  const IMPACT_FLASH    = 1.00;
  const SHOCKWAVE_AT    = 1.50;
  const EMBER_START     = 1.50;
  const KICKER_IN       = 1.55; // 5 frames after shockwave
  const KICKER_SETTLE   = 2.00;
  const HOLD_START      = 2.20;
  const HOLD_END        = 3.20;
  const EXIT_KICKER     = 3.20;
  const EXIT_SLABS      = 3.20;
  const EXIT_WORD       = 3.32;
  const CLEAR_BY        = 3.60;

  // ── Phase 1: arena establish + rift tear (0.00 - 0.60s) ─────────────────────
  // Rift crack flashes on then rapidly zig-zags across, tearing the frame.
  tl.set('#rift-glow', { opacity: 0, scaleX: 0.05 }, 0);
  tl.set('#rift-flash', { opacity: 0 }, 0);
  tl.to('#rift-glow', { opacity: 1, scaleX: 1, duration: RIFT_TEAR_END - RIFT_FLASH_ON, ease: 'power4.out' }, RIFT_FLASH_ON);
  tl.to('#rift-flash', { opacity: 0.9, duration: 0.06, ease: 'power2.out' }, RIFT_FLASH_ON);
  tl.to('#rift-flash', { opacity: 0, duration: 0.2, ease: 'power2.in' }, RIFT_FLASH_ON + 0.06);

  // Slabs slide in from opposite off-frame corners along the crack's angle.
  tl.fromTo('#slab-top',
    { x: -2200, y: -1400 },
    { x: 0, y: 0, duration: SLAB_ARRIVE, ease: 'power3.out' }, 0.05);
  tl.fromTo('#slab-bottom',
    { x: 2200, y: 1400 },
    { x: 0, y: 0, duration: SLAB_ARRIVE, ease: 'power3.out' }, 0.05);

  // ── Phase 2: slab slam + wordmark rip-in (0.60 - 1.50s) ─────────────────────
  // Slabs slam fully home with a punchy spring overshoot then settle.
  tl.to('#slab-top', { x: 8, y: 6, duration: 0.16, ease: 'back.out(3)' }, SLAB_ARRIVE);
  tl.to('#slab-top', { x: 0, y: 0, duration: 0.14, ease: 'power2.out' }, SLAB_ARRIVE + 0.16);
  tl.to('#slab-bottom', { x: -8, y: -6, duration: 0.16, ease: 'back.out(3)' }, SLAB_ARRIVE);
  tl.to('#slab-bottom', { x: 0, y: 0, duration: 0.14, ease: 'power2.out' }, SLAB_ARRIVE + 0.16);

  // NOVA rockets in from the left riding the top slab; RIFT from the right riding bottom.
  tl.fromTo('#word-nova',
    { x: -1400, autoAlpha: 0 },
    { x: 0, autoAlpha: 1, duration: 0.5, ease: 'back.out(1.5)' }, WORD_NOVA_IN);
  tl.fromTo('#word-rift',
    { x: 1400, autoAlpha: 0 },
    { x: 0, autoAlpha: 1, duration: 0.5, ease: 'back.out(1.5)' }, WORD_RIFT_IN);

  // Impact flash pulses along the rift at the exact slam frame, then fades.
  tl.to('#rift-flash', { opacity: 0.95, duration: 0.03, ease: 'power1.out' }, IMPACT_FLASH);
  tl.to('#rift-flash', { opacity: 0, duration: 0.2, ease: 'power2.in' }, IMPACT_FLASH + 0.03);

  // ── Phase 3: weld shockwave + kicker reveal (1.50 - 2.20s) ──────────────────
  tl.fromTo('#shockwave',
    { scale: 0, opacity: 0.9 },
    { scale: 45, opacity: 0, duration: 0.2, ease: 'power2.out' }, SHOCKWAVE_AT);

  // Ember particles begin a slow, looping upward drift (deterministic finite repeat).
  const emberDrift = ['#ember-1','#ember-2','#ember-3','#ember-4','#ember-5','#ember-6','#ember-7','#ember-8'];
  emberDrift.forEach((sel, i) => {
    tl.fromTo(sel,
      { autoAlpha: 0, y: 40 },
      { autoAlpha: 0.85, y: 0, duration: 0.4, ease: 'power1.out' }, EMBER_START + i * 0.03);
    tl.to(sel,
      { y: -90, duration: 1.9, ease: 'none', repeat: 0 }, EMBER_START + 0.4 + i * 0.03);
  });

  // Kicker fades and slides up into place beneath the wordmark.
  tl.fromTo('#kicker',
    { autoAlpha: 0, y: 20 },
    { autoAlpha: 1, y: 0, duration: 0.35, ease: 'power3.out' }, KICKER_IN);

  // ── Phase 4: hero hold (2.20 - 3.20s), ambient only ─────────────────────────
  // Rift-glow breathes gently; slab inner gradient creeps; nothing new enters.
  tl.to('#rift-glow', { opacity: 0.85, duration: 1.0, ease: 'sine.inOut', repeat: 1, yoyo: true }, HOLD_START);
  tl.to('#word-wrap', { scale: 1.015, duration: 1.0, ease: 'sine.inOut', repeat: 1, yoyo: true }, HOLD_START);
  tl.to('.slab', { backgroundPosition: '4px 4px', duration: 1.0, ease: 'sine.inOut', repeat: 1, yoyo: true }, HOLD_START);

  // ── Phase 5: fast exit (3.20 - 4.00s) ───────────────────────────────────────
  // Kicker snaps down and out first - fastest exit, ~4 frames.
  tl.to('#kicker', { y: 16, autoAlpha: 0, duration: 0.13, ease: 'power4.in' }, EXIT_KICKER);

  // Slabs rocket off the way they came, taking the rift-glow with them.
  tl.to('#slab-top', { x: -2400, y: -1500, duration: 0.2, ease: 'power4.in' }, EXIT_SLABS);
  tl.to('#slab-bottom', { x: 2400, y: 1500, duration: 0.2, ease: 'power4.in' }, EXIT_SLABS);
  tl.to('#rift-wrap', { autoAlpha: 0, duration: 0.15, ease: 'power2.in' }, EXIT_SLABS);
  tl.to('.ember', { autoAlpha: 0, duration: 0.15, ease: 'power2.in' }, EXIT_SLABS);

  // Wordmark, now unsupported, rockets straight up - clears before panels fully vanish.
  tl.to('#word-wrap', { y: -1200, autoAlpha: 0, duration: 0.16, ease: 'power4.in' }, EXIT_WORD);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

<!doctype html>
<!-- "Field Notebook Strap" - a 4 s documentary lower-third: a paper-cream panel
     slides in from the left like a caption card, an amber tick rides its edge,
     name + role type on, the strap holds, then withdraws left. Transparent root -
     the strap is the only painted content over live footage. 1920x1080 @ 4s. -->
<html lang="en" data-composition-variables='[
  {"id":"name","type":"string","label":"Guest name","default":"Jane Holloway"},
  {"id":"role","type":"string","label":"Role / institution","default":"Senior Field Archaeologist — Institute of Anatolian Studies"},
  {"id":"accent","type":"color","label":"Accent (tick)","default":"#C98A3D"},
  {"id":"panelColor","type":"color","label":"Panel colour","default":"#F2E9DA"}
]'>
<head>
<meta charset="UTF-8" />
<title>Field Notebook Strap</title>
<style>
  html, body { margin: 0; padding: 0; }
  /* Root stays transparent - this composites over live documentary footage. */
  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: none;
    font-family: Georgia, 'Times New Roman', serif;
  }
  .clip { position: absolute; inset: 0; }

  /* ── Strap group: anchored lower-left inside the ~8% safe margins ─────── */
  #strap {
    position: absolute;
    left: 8%;
    bottom: 8%;
    width: 34%;      /* ~653px on 1920 */
    height: 14%;     /* ~151px on 1080 */
  }

  /* Soft drop shadow blob - barely-there, separates card from footage */
  #panel-shadow {
    position: absolute;
    inset: -6px -4px -14px 6px;
    border-radius: 4px;
    background: radial-gradient(ellipse at 35% 60%, rgba(30,22,14,0.42) 0%, rgba(30,22,14,0.18) 55%, rgba(30,22,14,0) 80%);
    filter: blur(6px);
  }

  /* The paper-cream panel: same-hue vertical gradient (lighter top, warm shadowed bottom) */
  #panel {
    position: absolute;
    inset: 0;
    background-color: var(--panelColor, #F2E9DA);
    background-image: linear-gradient(180deg,
      rgba(255,252,244,0.95) 0%,
      var(--panelColor, #F2E9DA) 38%,
      #e6d8c0 100%);
    box-shadow: 0 14px 30px rgba(35,24,12,0.30);
    /* darker-cream keyline at own top edge */
    border-top: 1px solid #d9c6a2;
    transform-origin: left center;
  }

  /* Slim amber vertical tick sitting on top of the panel's left edge */
  #tick {
    position: absolute;
    left: -3px;
    top: 6%;
    bottom: 6%;
    width: 6px;
    background: linear-gradient(180deg, #dba455 0%, var(--accent, #C98A3D) 55%, #a86f2c 100%);
    box-shadow: 0 0 8px rgba(201,138,61,0.45);
  }

  /* Text block, laid over panel + tick */
  #text-block {
    position: absolute;
    left: 9%;
    top: 0;
    right: 6%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  #name-mask, #role-mask { overflow: hidden; }

  #name {
    margin: 0;
    color: #2b2117;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.05;
    white-space: nowrap;
  }

  /* Hairline rule between name and role, draws in with the role line */
  #rule {
    width: 42px;
    height: 1px;
    background: #b98f52;
    margin: 8px 0 8px 1px;
    transform-origin: left center;
  }

  #role {
    margin: 0;
    font-family: 'Space Grotesk', 'Arial', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6b5738;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4">

  <!-- Single clip spanning the full duration; the timeline choreographs
       entrance, hold, and exit within it. -->
  <section id="strap-layer" class="clip" data-start="0" data-duration="4" data-track-index="1">
    <div id="strap">
      <div id="panel-shadow"></div>
      <div id="panel"></div>
      <div id="tick"></div>
      <div id="text-block">
        <div id="name-mask">
          <h1 id="name" data-var-text="name">Jane Holloway</h1>
        </div>
        <div id="rule"></div>
        <div id="role-mask">
          <div id="role" data-var-text="role">Senior Field Archaeologist — Institute of Anatolian Studies</div>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
  // One paused timeline; all positions are absolute composition seconds.
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Font sizing: derive hero size from its own string length ──────────────
  // capAdvance ~0.62 for this serif at title case; target ~55-70% frame width.
  const FRAME_W = 1920, FRAME_H = 1080;
  const nameStr = (document.getElementById('name').textContent || '').trim();
  const nameLen = Math.max(nameStr.length, 1);
  let nameSize = (0.60 * FRAME_W) / (nameLen * 0.62);
  // Clamp so short/long names stay sane (roughly 55-100px band for lower-third scale)
  nameSize = Math.max(46, Math.min(100, nameSize));
  document.getElementById('name').style.fontSize = nameSize + 'px';

  // Role sized as ~1/3 the name's height, from frame-height fraction (~2.8%)
  const roleSize = FRAME_H * 0.028;
  document.getElementById('role').style.fontSize = roleSize + 'px';

  // ── Timing (seconds, on a 30fps grid: 1 frame = 1/30 s) ───────────────────
  const F = 1/30;
  const PANEL_START   = 0.03;              // frame 1
  const PANEL_SETTLE  = 14 * F;             // ~0.47s, spring lands
  const NAME_IN       = 15 * F;             // ~0.50s
  const ROLE_IN       = 19 * F;             // 4 frames after name (~0.633s)
  const HOLD_START    = 28 * F;             // ~0.93s (role fully landed)
  const EXIT_TEXT     = 96 * F;             // 3.20s
  const EXIT_PANEL    = 98 * F;             // 3.27s (2 frames later)
  const END           = 4.0;

  // ── Phase 1: strap slides in from the left, clamped spring, <2% overshoot ─
  tl.set('#strap', { autoAlpha: 0 }, 0);
  tl.to('#strap', { autoAlpha: 1, duration: 0.04 }, PANEL_START);
  tl.fromTo('#strap',
    { x: '-110%' },
    { x: '0%', duration: PANEL_SETTLE - PANEL_START, ease: 'back.out(1.15)' },
    PANEL_START
  );
  // Shadow fades in matching panel opacity
  tl.fromTo('#panel-shadow', { autoAlpha: 0 }, { autoAlpha: 1, duration: PANEL_SETTLE - PANEL_START, ease: 'power1.out' }, PANEL_START);

  // ── Phase 2: name then role type on with staggered fade + rise ───────────
  tl.fromTo('#name',
    { autoAlpha: 0, y: 8 },
    { autoAlpha: 1, y: 0, duration: 8 * F, ease: 'power2.out' },
    NAME_IN
  );
  tl.fromTo('#role',
    { autoAlpha: 0, y: 8 },
    { autoAlpha: 1, y: 0, duration: 8 * F, ease: 'power2.out' },
    ROLE_IN
  );
  // Hairline rule draws in sync with the role line
  tl.fromTo('#rule',
    { scaleX: 0, autoAlpha: 0 },
    { scaleX: 1, autoAlpha: 1, duration: 8 * F, ease: 'power2.out' },
    ROLE_IN
  );

  // ── Phase 3: hero hold - panel breathes with a barely-there scale creep ──
  tl.to('#panel', {
    scale: 1.015,
    duration: (EXIT_TEXT - HOLD_START),
    ease: 'sine.inOut'
  }, HOLD_START);

  // ── Phase 4: exit - text clears first, then tick+panel withdraw left ────
  tl.to(['#name', '#role', '#rule'], {
    autoAlpha: 0,
    y: -6,
    duration: 6 * F,
    ease: 'power2.in',
    stagger: 0
  }, EXIT_TEXT);

  tl.to('#strap', {
    x: '-110%',
    duration: (END - EXIT_PANEL),
    ease: 'power2.in'
  }, EXIT_PANEL);
  tl.to(['#strap', '#panel-shadow'], {
    autoAlpha: 0,
    duration: (END - EXIT_PANEL) * 0.6,
    ease: 'power1.in'
  }, END - (END - EXIT_PANEL) * 0.6);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

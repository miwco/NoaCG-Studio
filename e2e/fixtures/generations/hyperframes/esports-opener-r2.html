<!doctype html>
<!-- "Rift Tear" - a 4s esports stinger: a single dark slab tears along a jagged neon
     violet-cyan crack, two slabs whip apart to reveal the bloom, slam back together
     with a shockwave, the NOVA RIFT wordmark snaps in, holds, then everything
     whip-exits along the crack axis and imploded to a cut. 1920x1080 @ 4s / 30fps. -->
<html lang="en" data-composition-variables='[
  {"id":"titleTop","type":"string","label":"Title line 1","default":"NOVA"},
  {"id":"titleBottom","type":"string","label":"Title line 2","default":"RIFT"},
  {"id":"kicker","type":"string","label":"Kicker","default":"LATE NIGHT ESPORTS"},
  {"id":"accent","type":"color","label":"Accent (crack/glow)","default":"#b14eff"}
]'>
<head>
<meta charset="UTF-8" />
<title>Nova Rift Opener</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; }

  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: linear-gradient(180deg, #0b0d12 0%, #14111c 55%, #16131f 100%);
    font-family: 'Archivo', 'Arial Black', Arial, sans-serif;
  }
  .clip { position: absolute; inset: 0; }

  /* ---------- Background layers ---------- */
  #hex-texture {
    position: absolute; inset: 0;
    opacity: 0.06;
    background-image:
      repeating-linear-gradient(60deg, rgba(177,78,255,0.5) 0px, rgba(177,78,255,0.5) 2px, transparent 2px, transparent 42px),
      repeating-linear-gradient(-60deg, rgba(120,200,255,0.5) 0px, rgba(120,200,255,0.5) 2px, transparent 2px, transparent 42px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.4) 0px, rgba(255,255,255,0.4) 2px, transparent 2px, transparent 42px);
    mix-blend-mode: screen;
  }
  #glow-bloom {
    position: absolute;
    left: 50%; bottom: -10%;
    width: 1600px; height: 900px;
    margin-left: -800px;
    background: radial-gradient(closest-side, rgba(177,78,255,0.35) 0%, rgba(177,78,255,0.12) 45%, rgba(177,78,255,0) 75%);
    filter: blur(6px);
  }

  /* ---------- Slabs ---------- */
  #slab-stage {
    position: absolute; inset: 0;
    transform-origin: 50% 50%;
  }
  .slab {
    position: absolute;
    width: 140%;
    height: 140%;
    left: -20%;
    top: -20%;
    background-color: #1a1826;
  }
  /* NOVA slab: upper-left, lit steel-violet surface, clipped along the crack diagonal */
  #slab-nova {
    background-image: linear-gradient(135deg, #262138 0%, #1a1826 55%, #100e18 100%);
    clip-path: polygon(0% 0%, 100% 0%, 42% 45%, 30% 100%, 0% 100%);
    box-shadow: inset 0 0 0 1px rgba(177,78,255,0.06);
  }
  /* RIFT slab: lower-right, complementary shading, opposite clip half */
  #slab-rift {
    background-image: linear-gradient(315deg, #241f34 0%, #181521 55%, #0e0c14 100%);
    clip-path: polygon(42% 45%, 100% 0%, 100% 100%, 0% 100%, 30% 100%);
    box-shadow: inset 0 0 0 1px rgba(120,200,255,0.05);
  }
  /* Edge keyline + shadow riding the crack seam on each slab */
  #slab-nova::after, #slab-rift::after {
    content: '';
    position: absolute; inset: 0;
  }

  /* ---------- Crack seam ---------- */
  #crack-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #crack {
    position: absolute;
    left: 8%;
    top: -10%;
    width: 6px;
    height: 120%;
    background: linear-gradient(180deg, #d9b8ff 0%, var(--accent, #b14eff) 40%, #7fd8ff 70%, var(--accent, #b14eff) 100%);
    transform: rotate(24deg) scaleY(0);
    transform-origin: 50% 0%;
    box-shadow: 0 0 24px 6px rgba(177,78,255,0.75), 0 0 60px 20px rgba(177,78,255,0.35);
    border-radius: 3px;
  }
  #shockwave {
    position: absolute;
    left: 50%; top: 50%;
    width: 40px; height: 40px;
    margin-left: -20px; margin-top: -20px;
    border-radius: 50%;
    border: 6px solid #ffffff;
    box-shadow: 0 0 40px 10px rgba(177,78,255,0.9);
    opacity: 0;
  }

  /* ---------- Wordmark ---------- */
  #text-layer { display: flex; align-items: center; justify-content: center; }
  #lockup {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-origin: 50% 50%;
  }
  .title-mask { overflow: hidden; }
  .title-line {
    margin: 0;
    color: #f5f2fb;
    font-weight: 900;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    line-height: 1;
    white-space: nowrap;
    text-shadow: 0 0 26px rgba(177,78,255,0.55), 0 4px 10px rgba(0,0,0,0.6);
  }
  #kicker {
    margin-top: 22px;
    font-family: 'Space Grotesk', 'Inter', Arial, sans-serif;
    font-size: 32.4px; /* height*0.03 */
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #b8aecb;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4">

  <!-- Background: gradient + hex grain + violet bloom -->
  <section id="bg" class="clip" data-start="0" data-duration="4" data-track-index="0">
    <div id="hex-texture"></div>
    <div id="glow-bloom"></div>
  </section>

  <!-- Slabs: torn, slammed, tensed, whipped apart -->
  <section id="slabs-layer" class="clip" data-start="0" data-duration="4" data-track-index="1">
    <div id="slab-stage">
      <div id="slab-nova" class="slab"></div>
      <div id="slab-rift" class="slab"></div>
    </div>
  </section>

  <!-- Crack seam + shockwave, sits between/over the slab edges -->
  <section id="crack-layer" class="clip" data-start="0" data-duration="4" data-track-index="2">
    <div id="crack-wrap">
      <div id="crack"></div>
      <div id="shockwave"></div>
    </div>
  </section>

  <!-- Wordmark + kicker: painted last, always on top -->
  <section id="text-layer" class="clip" data-start="0" data-duration="4" data-track-index="3">
    <div id="lockup">
      <div class="title-mask"><h1 id="title-nova" class="title-line" data-var-text="titleTop" style="font-size:238px;">NOVA</h1></div>
      <div class="title-mask"><h1 id="title-rift" class="title-line" data-var-text="titleBottom" style="font-size:238px;">RIFT</h1></div>
      <div id="kicker" data-var-text="kicker">LATE NIGHT ESPORTS</div>
    </div>
  </section>

</div>

<script>
  // capAdvance for Archivo (~0.74 em/char uppercase). fontSize = height*0.22 = 237.6px baseline.
  // NOVA (4 chars): width = 237.6*0.74*4 = 703px -> 36.6% of 1920 (short word: govern by height, fine as-is)
  // RIFT (4 chars): same. Both comfortably within the 55-88% guidance is not hit since these are
  // 4-char words close to the "very short hero" exception; height-governed sizing (22% of 1080)
  // keeps them large and legible without overflow. Recomputed here for clarity/documentation.
  (function sizeWordmark(){
    const H = 1080;
    const capAdvance = 0.74; // Archivo
    const baseSize = H * 0.22; // 237.6px
    const nova = document.getElementById('title-nova');
    const rift = document.getElementById('title-rift');
    // Keep both lines at matched size for a unified lockup; verify neither exceeds 80% width.
    const maxWidthAllowed = 1920 * 0.80;
    const novaWidth = baseSize * capAdvance * 'NOVA'.length;
    const riftWidth = baseSize * capAdvance * 'RIFT'.length;
    const widest = Math.max(novaWidth, riftWidth);
    const finalSize = widest > maxWidthAllowed ? baseSize * (maxWidthAllowed / widest) : baseSize;
    nova.style.fontSize = finalSize + 'px';
    rift.style.fontSize = finalSize + 'px';
  })();

  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing constants (composition seconds) ─────────────────────────────────
  const CRACK_SNAP   = 0.10;  // jagged crack snaps across frame
  const CRACK_DONE    = 0.30;  // crack fully formed (0.2s fast ease-out)
  const TEAR_OPEN     = 0.40;  // slabs whip-slide apart 15%
  const SLAM_START    = 0.60;  // slabs spring back together
  const SLAM_LAND     = 1.00;  // impact
  const SHOCK_BURST   = 1.00;  // one-frame shockwave
  const SHOCK_DONE    = 1.20;  // shockwave scaled/faded out
  const NOVA_IN       = 0.70;  // NOVA snaps from left (staggered after slam start)
  const RIFT_IN       = 0.80;  // RIFT snaps from right (3-frame stagger ~0.1s at 30fps... using 0.1s block below adjusted)
  const TEXT_LAND     = 1.30;  // both lines settled
  const KICKER_IN     = 1.40;  // kicker fades/slides up
  const HOLD_START    = 1.60;
  const HOLD_END      = 2.90;
  const CHARGE_START  = 2.90;
  const CHARGE_END    = 3.30;
  const EXIT_START    = 3.30;
  const TEXT_EXIT_END = 3.45;  // text gone first (0.15s)
  const SLAB_EXIT_END = 3.65;  // slabs whip apart (0.35s from 3.3)
  const FINAL_CUT     = 4.00;

  // Initial states -------------------------------------------------------------
  gsap.set('#crack', { scaleY: 0, opacity: 0 });
  gsap.set('#shockwave', { opacity: 0, scale: 0.3 });
  gsap.set(['#title-nova', '#title-rift'], { autoAlpha: 0 });
  gsap.set('#kicker', { autoAlpha: 0, y: 8 });
  gsap.set('#slab-nova', { x: 0, y: 0 });
  gsap.set('#slab-rift', { x: 0, y: 0 });

  // ── PHASE 1: Tear Open (0.00 - 0.60s) ───────────────────────────────────────
  // The crack snaps across the frame - hard rip, no overshoot.
  tl.to('#crack', { opacity: 1, duration: 0.04, ease: 'none' }, CRACK_SNAP);
  tl.fromTo('#crack', { scaleY: 0 }, { scaleY: 1, duration: 0.2, ease: 'power2.out' }, CRACK_SNAP);

  // Slabs whip-slide apart 15% off resting position along the crack angle (~24deg axis).
  tl.to('#slab-nova', { x: -210, y: -140, duration: 0.2, ease: 'power2.out' }, TEAR_OPEN - 0.2);
  tl.to('#slab-rift', { x: 210, y: 140, duration: 0.2, ease: 'power2.out' }, TEAR_OPEN - 0.2);

  // ── PHASE 2: Slam Together + Wordmark Reveal (0.60 - 1.40s) ────────────────
  // Punchy clamped-spring feel via back.out with tuned overshoot (approximating stiffness/damping).
  tl.to('#slab-nova', { x: 0, y: 0, duration: 0.4, ease: 'back.out(2.2)' }, SLAM_START);
  tl.to('#slab-rift', { x: 0, y: 0, duration: 0.4, ease: 'back.out(2.2)' }, SLAM_START);
  // Crack tightens on impact.
  tl.to('#crack', { scaleY: 1.04, duration: 0.12, ease: 'power2.out' }, SLAM_LAND - 0.02);
  tl.to('#crack', { scaleY: 1, duration: 0.18, ease: 'power2.inOut' }, SLAM_LAND + 0.1);

  // One-frame white-violet shockwave bursts from the seam center, scales/fades by 1.2s.
  tl.set('#shockwave', { opacity: 1, scale: 0.2 }, SHOCK_BURST);
  tl.to('#shockwave', { scale: 6, opacity: 0, duration: SHOCK_DONE - SHOCK_BURST, ease: 'power3.out' }, SHOCK_BURST);

  // NOVA snaps in from the left, RIFT from the right - 3-frame stagger (~0.1s @ 30fps).
  tl.fromTo('#title-nova',
    { autoAlpha: 0, x: -160 },
    { autoAlpha: 1, x: 0, duration: 0.4, ease: 'back.out(1.7)' },
    NOVA_IN);
  tl.fromTo('#title-rift',
    { autoAlpha: 0, x: 160 },
    { autoAlpha: 1, x: 0, duration: 0.4, ease: 'back.out(1.7)' },
    NOVA_IN + 0.1);

  // ── PHASE 3: Kicker + Hero Hold (1.40 - 2.90s) ─────────────────────────────
  tl.fromTo('#kicker',
    { autoAlpha: 0, y: 8 },
    { autoAlpha: 1, y: 0, duration: 0.25, ease: 'power2.out' },
    KICKER_IN);

  // Ambient: crack glow pulses slowly (~0.6Hz -> period ~1.67s), near-linear sine drift.
  tl.to('#crack', {
    boxShadow: '0 0 40px 12px rgba(177,78,255,0.95), 0 0 90px 30px rgba(177,78,255,0.5)',
    duration: 0.83,
    ease: 'sine.inOut',
    repeat: 1,
    yoyo: true
  }, HOLD_START);

  // Subtle 1-2% scale creep on the whole lockup to keep the frame alive.
  tl.to('#lockup', { scale: 1.015, duration: (HOLD_END - HOLD_START) / 2, ease: 'sine.inOut', repeat: 1, yoyo: true }, HOLD_START);

  // ── PHASE 4: Pre-exit Charge (2.90 - 3.30s) ─────────────────────────────────
  // Crack brightens and hairline-widens; slabs tense with a tiny squeeze inward.
  tl.to('#crack', {
    scaleX: 2.2,
    boxShadow: '0 0 60px 18px rgba(255,255,255,0.9), 0 0 120px 40px rgba(177,78,255,0.85)',
    duration: CHARGE_END - CHARGE_START,
    ease: 'power2.in'
  }, CHARGE_START);
  tl.to(['#slab-nova', '#slab-rift'], {
    scale: 0.99,
    duration: CHARGE_END - CHARGE_START,
    ease: 'power2.in'
  }, CHARGE_START);

  // ── PHASE 5: Whip Exit (3.30 - 4.00s) ───────────────────────────────────────
  // Text is gone first: punch-scale up 6% and snap-fade within 0.15s.
  tl.to('#lockup', {
    scale: 1.06,
    autoAlpha: 0,
    duration: TEXT_EXIT_END - EXIT_START,
    ease: 'power4.in'
  }, EXIT_START);

  // Slabs whip apart along the crack axis and off-frame, faster than the entrance.
  tl.to('#slab-nova', {
    x: -2200, y: -1400,
    duration: SLAB_EXIT_END - TEXT_EXIT_END,
    ease: 'power4.in'
  }, TEXT_EXIT_END);
  tl.to('#slab-rift', {
    x: 2200, y: 1400,
    duration: SLAB_EXIT_END - TEXT_EXIT_END,
    ease: 'power4.in'
  }, TEXT_EXIT_END);

  // Crack implodes to a single bright point then flashes and cuts to black.
  tl.to('#crack', {
    scaleX: 0.05,
    scaleY: 0.05,
    boxShadow: '0 0 100px 40px rgba(255,255,255,1), 0 0 200px 80px rgba(177,78,255,1)',
    duration: SLAB_EXIT_END - TEXT_EXIT_END,
    ease: 'power4.in'
  }, TEXT_EXIT_END);
  tl.to('#crack', { opacity: 0, duration: 0.08, ease: 'power4.in' }, SLAB_EXIT_END);

  // Final cut: everything settles to a clean empty (background) frame by 4.0s.
  tl.set(['#slab-nova', '#slab-rift', '#crack', '#lockup'], { autoAlpha: 0 }, FINAL_CUT - 0.01);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

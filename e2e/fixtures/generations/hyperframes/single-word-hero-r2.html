<!doctype html>
<!-- "Landfall" - 3 s storm-coverage stinger. One amber pressure-line slams left-to-right,
     wipe-revealing the heavy wordmark LANDFALL in its wake, framed by parallax wind-streak
     layers. Hold: underline draws, kicker rises. Sharp punch-out exit. 1920x1080 @ 3 s / 90f. -->
<html lang="en" data-composition-variables='[
  {"id":"title","type":"string","label":"Title","default":"LANDFALL"},
  {"id":"kicker","type":"string","label":"Kicker","default":"LIVE STORM COVERAGE"},
  {"id":"accent","type":"color","label":"Accent (amber)","default":"#E8A23D"}
]'>
<head>
<meta charset="UTF-8" />
<title>Landfall</title>
<style>
  html, body { margin: 0; padding: 0; }

  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      radial-gradient(120% 100% at 50% 50%, #11151b 0%, #0B0E12 55%, #050607 100%);
    font-family: 'Archivo', 'Arial Black', Arial, sans-serif;
  }

  .clip { position: absolute; inset: 0; }

  /* ── Wind streak layers: horizontal lines racing across upper/lower thirds ── */
  .streak-layer {
    position: absolute;
    left: -20%;
    width: 140%;
    height: 100%;
    top: 0;
  }
  .streak {
    position: absolute;
    left: 0;
    height: 2px;
    border-radius: 2px;
    background: linear-gradient(90deg, rgba(232,162,61,0) 0%, rgba(232,162,61,0.9) 60%, rgba(255,255,255,0.6) 100%);
    filter: blur(0.4px);
  }
  /* far layer: thinner, dimmer, slower, more numerous, mostly desaturated */
  .streak-far {
    background: linear-gradient(90deg, rgba(180,190,200,0) 0%, rgba(180,190,200,0.5) 55%, rgba(210,215,220,0.35) 100%);
    height: 1.5px;
  }

  /* ── Lit center panel: barely-there gradient strip seating the title ── */
  #center-panel {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 1920px;
    height: 324px; /* 1080*0.30 */
    margin-left: -960px;
    margin-top: -162px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.05) 0%,
      rgba(255,255,255,0.02) 35%,
      rgba(0,0,0,0.10) 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), inset 0 -1px 0 rgba(0,0,0,0.30);
  }

  /* ── Pressure line: amber hairline sweep, full height, with glow ── */
  #pressure-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 6px;
    height: 100%;
    background: linear-gradient(180deg, rgba(232,162,61,0) 0%, #E8A23D 15%, #ffd699 50%, #E8A23D 85%, rgba(232,162,61,0) 100%);
    box-shadow: 0 0 40px 8px rgba(232,162,61,0.65), 0 0 90px 20px rgba(232,162,61,0.25);
    transform-origin: left center;
  }

  /* ── Horizon glow: faint amber pulse before the strike ── */
  #horizon-glow {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 900px;
    height: 260px;
    margin-left: -450px;
    margin-top: -130px;
    background: radial-gradient(ellipse at center, rgba(232,162,61,0.35) 0%, rgba(232,162,61,0) 70%);
    opacity: 0;
  }

  /* ── Text block ── */
  #text-block {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }
  #title-wrap {
    /* the clip-path wipe mask - revealed left to right by the pressure line */
    clip-path: inset(0 100% 0 0);
    line-height: 1;
  }
  #title {
    margin: 0;
    font-weight: 900;
    font-size: 260px;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: #f4f3ef;
    white-space: nowrap;
    text-shadow: 0 6px 30px rgba(0,0,0,0.55);
  }
  #underline {
    margin-top: 26px;
    height: 4px;
    width: 620px;
    background: linear-gradient(90deg, rgba(232,162,61,0.15), #E8A23D 40%, #E8A23D 60%, rgba(232,162,61,0.15));
    box-shadow: 0 0 16px rgba(232,162,61,0.6);
    transform: scaleX(0);
    transform-origin: left center;
  }
  #kicker {
    margin-top: 22px;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 30px; /* 1080*0.028 */
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent, #E8A23D);
    opacity: 0;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="3">

  <!-- Track 1: far streak layer (slow, dim, parallax background) -->
  <section id="far-streaks-clip" class="clip" data-start="0" data-duration="3" data-track-index="1">
    <div id="far-streaks" class="streak-layer"></div>
  </section>

  <!-- Track 2: near streak layer (faster, amber-tinted leading edges) -->
  <section id="near-streaks-clip" class="clip" data-start="0" data-duration="3" data-track-index="2">
    <div id="near-streaks" class="streak-layer"></div>
  </section>

  <!-- Track 3: horizon glow pre-strike pulse -->
  <section id="glow-clip" class="clip" data-start="0" data-duration="0.3" data-track-index="3">
    <div id="horizon-glow"></div>
  </section>

  <!-- Track 4: lit center panel that seats the type -->
  <section id="panel-clip" class="clip" data-start="0" data-duration="3" data-track-index="4">
    <div id="center-panel"></div>
  </section>

  <!-- Track 5: the pressure line sweep -->
  <section id="line-clip" class="clip" data-start="0.18" data-duration="0.5" data-track-index="5">
    <div id="pressure-line"></div>
  </section>

  <!-- Track 6: title + kicker, always last painted -->
  <section id="text-clip" class="clip" data-start="0" data-duration="3" data-track-index="6">
    <div id="text-block">
      <div id="title-wrap"><h1 id="title" data-var-text="title">LANDFALL</h1></div>
      <div id="underline"></div>
      <div id="kicker" data-var-text="kicker">LIVE STORM COVERAGE</div>
    </div>
  </section>

</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing constants (composition seconds, 30fps) ─────────────────────────
  const F = 1 / 30;
  const GLOW_START   = 0.00;
  const GLOW_PEAK    = 6 * F;   // 0.20s
  const LINE_START   = 6 * F;   // 0.20s
  const LINE_DUR     = 6 * F;   // 6 frames slam -> 0.40s
  const HOLD_START   = 0.55;
  const UNDERLINE_AT = 20 * F;  // ~0.667s
  const KICKER_AT    = UNDERLINE_AT + 3 * F; // staggered after underline completes
  const EXIT_AT      = 2.6;
  const KICKER_EXIT   = EXIT_AT + 2 * F;
  const FINAL_CUT    = 3.0;

  // ── Precomputed streak arrays (deterministic, seeded by hand) ──────────────
  // Far layer: numerous, thin, dim, slow.
  const farStreaks = [
    { top: 70,  w: 260, op: 0.15 },
    { top: 140, w: 340, op: 0.12 },
    { top: 210, w: 180, op: 0.18 },
    { top: 300, w: 420, op: 0.10 },
    { top: 760, w: 300, op: 0.14 },
    { top: 850, w: 220, op: 0.16 },
    { top: 930, w: 380, op: 0.11 },
    { top: 1000,w: 260, op: 0.13 }
  ];
  // Near layer: fewer, thicker, brighter amber-leading, faster.
  const nearStreaks = [
    { top: 40,  w: 480, op: 0.4 },
    { top: 110, w: 620, op: 0.35 },
    { top: 190, w: 400, op: 0.42 },
    { top: 900, w: 560, op: 0.38 },
    { top: 970, w: 420, op: 0.40 },
    { top: 1030,w: 660, op: 0.33 }
  ];

  const farLayer = document.getElementById('far-streaks');
  const nearLayer = document.getElementById('near-streaks');

  farStreaks.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'streak streak-far';
    el.style.top = s.top + 'px';
    el.style.width = s.w + 'px';
    el.style.opacity = 0;
    farLayer.appendChild(el);
    el.dataset.baseOp = s.op;
    el.dataset.idx = i;
  });
  nearStreaks.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'streak';
    el.style.top = s.top + 'px';
    el.style.width = s.w + 'px';
    el.style.opacity = 0;
    nearLayer.appendChild(el);
    el.dataset.baseOp = s.op;
    el.dataset.idx = i;
  });

  const farEls = farLayer.querySelectorAll('.streak');
  const nearEls = nearLayer.querySelectorAll('.streak');

  // ── PHASE 0: Charge / pre-strike ────────────────────────────────────────
  // Far streaks fade up to their dim resting opacity, already drifting.
  farEls.forEach((el, i) => {
    const op = parseFloat(el.dataset.baseOp);
    tl.fromTo(el, { opacity: 0, x: -100 }, { opacity: op, duration: 0.18, ease: 'power2.out' }, GLOW_START + i * 0.01);
    // continuous slow linear drift across the whole piece (parallax, layer 1)
    tl.to(el, { x: '+=2400', duration: 3.6, ease: 'none' }, GLOW_START);
  });
  // Near streaks stay hidden until the strike (revealed in phase 1).
  nearEls.forEach((el) => {
    tl.set(el, { opacity: 0, x: -200 }, GLOW_START);
  });

  // Horizon glow: single pulse, power2.out in, power2.out fade.
  tl.fromTo('#horizon-glow', { opacity: 0, scale: 0.85 },
    { opacity: 1, scale: 1.05, duration: GLOW_PEAK - GLOW_START, ease: 'power2.out' }, GLOW_START);
  tl.to('#horizon-glow', { opacity: 0, duration: 0.12, ease: 'power2.out' }, GLOW_PEAK);

  // ── PHASE 1: Pressure-line slam + title wipe reveal ─────────────────────
  // The line slams from left edge (scaleX 200% conceptually = far off left) to full sweep.
  tl.fromTo('#pressure-line',
    { x: -80, scaleY: 0.3, opacity: 0 },
    { x: 0, scaleY: 1, opacity: 1, duration: 0.03, ease: 'power4.out' },
    LINE_START
  );
  tl.to('#pressure-line', {
    x: 1920,
    duration: LINE_DUR,
    ease: 'power4.out'
  }, LINE_START);
  // Line fades out once it exits frame right.
  tl.to('#pressure-line', { opacity: 0, duration: 0.08, ease: 'power2.out' }, LINE_START + LINE_DUR);

  // Title reveal: clip-path wipe synced to the line's sweep across the frame.
  tl.fromTo('#title-wrap',
    { clipPath: 'inset(0 100% 0 0)' },
    { clipPath: 'inset(0 0% 0 0)', duration: LINE_DUR, ease: 'power4.out' },
    LINE_START
  );

  // Near-layer wind streaks intensify simultaneously with the strike, racing behind reveal.
  nearEls.forEach((el, i) => {
    const op = parseFloat(el.dataset.baseOp);
    tl.to(el, { opacity: op, duration: 0.16, ease: 'power2.out' }, LINE_START + i * 0.015);
    tl.to(el, { x: '+=2600', duration: 2.6, ease: 'none' }, LINE_START);
  });

  // ── PHASE 2: Hero hold ──────────────────────────────────────────────────
  // Underline draws left-to-right.
  tl.to('#underline', { scaleX: 1, duration: 5 * F, ease: 'power3.out' }, UNDERLINE_AT);
  // Kicker fades + rises into place, staggered after underline completes.
  tl.fromTo('#kicker', { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 10 * F, ease: 'power2.out' }, KICKER_AT);

  // Ambient scale creep on the whole text block through the hold (imperceptible, yoyo).
  tl.to('#text-block', { scale: 1.02, duration: (EXIT_AT - HOLD_START) / 2, ease: 'power1.inOut', yoyo: true, repeat: 1 }, HOLD_START);

  // ── PHASE 3: Sharp exit ──────────────────────────────────────────────────
  // Title + kicker punch out: scale down + fade, power3.in, kicker trails 2 frames.
  tl.to('#title-wrap', { scale: 0.94, opacity: 0, duration: 8 * F, ease: 'power3.in', transformOrigin: '50% 50%' }, EXIT_AT);
  tl.to('#underline', { scaleX: 0, transformOrigin: 'right center', duration: 5 * F, ease: 'power3.in' }, EXIT_AT);
  tl.to('#kicker', { scale: 0.94, opacity: 0, duration: 8 * F, ease: 'power3.in' }, KICKER_EXIT);

  // Streaks accelerate hard rightward and fade out together with the text exit.
  farEls.forEach((el, i) => {
    tl.to(el, { x: '+=1400', duration: 8 * F, ease: 'power2.in' }, EXIT_AT);
    tl.to(el, { opacity: 0, duration: 8 * F, ease: 'power2.in' }, EXIT_AT + i * 0.005);
  });
  nearEls.forEach((el, i) => {
    tl.to(el, { x: '+=1800', duration: 8 * F, ease: 'power2.in' }, EXIT_AT);
    tl.to(el, { opacity: 0, duration: 8 * F, ease: 'power2.in' }, EXIT_AT + i * 0.005);
  });

  // Lit center panel dissolves LAST, 4 frames after text has cleared - nothing sweeps over text.
  const PANEL_FADE_AT = EXIT_AT + 8 * F + 4 * F;
  tl.to('#center-panel', { opacity: 0, duration: 6 * F, ease: 'power2.in' }, PANEL_FADE_AT);

  // Final frames: pure dark radial ground only - clean cut point at 3.00s.

  window.__timelines['main'] = tl;
</script>
</body>
</html>

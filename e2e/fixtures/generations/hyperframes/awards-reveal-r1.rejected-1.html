<!doctype html>
<!-- "Curtain Reveal" - 5s awards stinger: two gold slabs cover the frame, part with a
     sharp spring to reveal the lit wordmark "AURORA VANE" via a center-out clip-path
     wipe, gold shard particles drift behind the hold, then the curtain snaps shut for
     a clean final frame. 1920x1080 @ 5s / 150f. -->
<html lang="en" data-composition-variables='[
  {"id":"winnerName","type":"string","label":"Winner name","default":"AURORA VANE"},
  {"id":"kicker","type":"string","label":"Kicker label","default":"PUBLIC VOTE WINNER"},
  {"id":"accent","type":"color","label":"Gold accent","default":"#e8c877"}
]'>
<head>
<meta charset="UTF-8" />
<title>Aurora Vane — Winner Reveal</title>
<style>
  /* ---- base ---- */
  body { margin: 0; }
  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: radial-gradient(ellipse 900px 700px at 50% 54%, #1c140a 0%, #120d07 45%, #0a0906 100%);
    font-family: "Archivo", "Arial Narrow", Arial, sans-serif;
  }
  .clip { position: absolute; inset: 0; }

  /* ---- stage floor bloom (subtle, near-edges dimmer) ---- */
  #floor-bloom {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 1400px 500px at 50% 100%, rgba(232,200,119,0.07) 0%, rgba(232,200,119,0) 70%);
  }

  /* ---- particle field: gold shards drifting behind text ---- */
  #particles { position: absolute; inset: 0; }
  .shard {
    position: absolute;
    background: linear-gradient(180deg, #f3dfa8 0%, #b9873c 100%);
    opacity: 0.5;
    border-radius: 1px;
  }

  /* ---- curtain slabs: heavy gold, lit surfaces not flat fills ---- */
  .slab-wrap { position: absolute; inset: 0; }
  .slab {
    position: absolute;
    top: -8%;
    width: 54%;
    height: 116%;
    background-image: linear-gradient(100deg, #3a2a10 0%, #6a4d1e 45%, #e8c877 82%, #f6e9c0 100%);
    box-shadow: 0 30px 90px rgba(0,0,0,0.55);
  }
  #slab-left  { left: 0;  transform-origin: right center; transform: rotate(-3deg); }
  #slab-right { right: 0; transform-origin: left center;  transform: rotate(3deg) scaleX(-1); }
  /* hairline bright inner-seam edge */
  #slab-left::after, #slab-right::after {
    content: "";
    position: absolute;
    top: 0; bottom: 0; right: 0;
    width: 4px;
    background: linear-gradient(180deg, rgba(255,246,214,0.95), rgba(255,246,214,0.4));
    box-shadow: 0 0 20px rgba(246,233,192,0.8);
  }

  /* ---- text stack ---- */
  #text-block {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #kicker {
    margin: 0 0 1.1em 0;
    font-family: "Inter", Arial, sans-serif;
    font-size: calc(1080px * 0.028);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #eee3cf;
  }
  /* clip-path mask wrapper: reveals the wordmark growing from center */
  #title-mask {
    overflow: visible;
    clip-path: inset(0 50% 0 50%);
  }
  #title {
    margin: 0;
    font-size: 191px;
    font-weight: 800;
    letter-spacing: -0.015em;
    text-transform: uppercase;
    white-space: nowrap;
    background-image: linear-gradient(180deg, #fff6d8 0%, #f0d68f 22%, #cfa04e 70%, #a3781f 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    position: relative;
  }
  /* light sweep highlight that travels once across the letters */
  #sweep {
    position: absolute;
    top: -10%;
    left: -20%;
    width: 40%;
    height: 120%;
    background: linear-gradient(100deg, rgba(255,255,255,0) 20%, rgba(255,255,255,0.55) 50%, rgba(255,255,255,0) 80%);
    mix-blend-mode: screen;
    pointer-events: none;
  }
  #underscore {
    margin-top: 0.35em;
    height: 3px;
    width: 68%;
    max-width: 1306px;
    background: linear-gradient(90deg, rgba(232,200,119,0) 0%, #f6e9c0 50%, rgba(232,200,119,0) 100%);
    transform-origin: left center;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="5">

  <!-- Track 0: stage background bloom -->
  <section id="bg" class="clip" data-start="0" data-duration="5" data-track-index="0">
    <div id="floor-bloom"></div>
  </section>

  <!-- Track 1: gold particle field, behind text, never crossing it -->
  <section id="particle-layer" class="clip" data-start="0" data-duration="5" data-track-index="1">
    <div id="particles"></div>
  </section>

  <!-- Track 2: curtain slabs -->
  <section id="curtain" class="clip" data-start="0" data-duration="5" data-track-index="2">
    <div class="slab-wrap">
      <div id="slab-left" class="slab"></div>
      <div id="slab-right" class="slab"></div>
    </div>
  </section>

  <!-- Track 3: hero text, on top of everything -->
  <section id="text-layer" class="clip" data-start="0" data-duration="5" data-track-index="3">
    <div id="text-block">
      <div id="kicker" data-var-text="kicker">PUBLIC VOTE WINNER</div>
      <div id="title-mask">
        <h1 id="title" data-var-text="winnerName">AURORA VANE</h1>
        <div id="sweep"></div>
      </div>
      <div id="underscore"></div>
    </div>
  </section>
</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing (seconds) ────────────────────────────────────────────────────
  const KICKER_IN   = 0.13;
  const CURTAIN_OPEN = 0.63;
  const CURTAIN_OPEN_DUR = 0.47;   // ends 1.10
  const TITLE_WIPE_START = 0.70;
  const TITLE_WIPE_DUR = 0.50;     // ends 1.20
  const SWEEP_START = 1.00;
  const SWEEP_DUR = 0.40;          // ends 1.40
  const UNDERSCORE_START = 1.10;
  const UNDERSCORE_DUR = 0.40;     // ends 1.50
  const HOLD_START = 1.83;
  const HOLD_END = 3.90;
  const EXIT_KICKER = 3.90;
  const EXIT_TITLE = 3.97;
  const CURTAIN_CLOSE = 4.10;
  const CURTAIN_CLOSE_DUR = 0.40;  // 12 frames

  // ── Seeded particle field: 40 gold shards, deterministic ───────────────
  function rnd(seed) {
    const x = Math.sin(seed * 12.9898) * 43758.5453;
    return x - Math.floor(x);
  }
  const N = 40;
  for (let i = 0; i < N; i++) {
    const s = i + 1;
    const rx = rnd(s * 1.7);
    const ry = rnd(s * 3.1);
    const rsize = rnd(s * 5.3);
    const rop = rnd(s * 7.9);
    const rrot = rnd(s * 2.3);
    // Concentrate density toward center band, keep clear of exact text line
    const cx = 50 + (rx - 0.5) * 78;
    const cy = 50 + (ry - 0.5) * 70;
    const size = 4 + rsize * 10;
    const el = document.createElement('div');
    el.className = 'shard';
    el.style.left = cx + '%';
    el.style.top = cy + '%';
    el.style.width = size + 'px';
    el.style.height = (size * 2.4) + 'px';
    el.style.opacity = (0.2 + rop * 0.4).toFixed(2);
    el.style.transform = 'rotate(' + (rrot * 40 - 20) + 'deg)';
    document.getElementById('particles').appendChild(el);

    // Linear continuous drift, never eased — wraps within the hold window
    const driftY = -30 - rrot * 60;
    const driftX = (rx - 0.5) * 40;
    tl.to(el, {
      x: driftX, y: driftY,
      duration: 4.6,
      ease: 'none'
    }, 0.3 + (i % 5) * 0.02);
  }
  // Particles are dim/inactive until the curtain begins clearing, then fade up.
  tl.set('#particles', { autoAlpha: 0 }, 0);
  tl.to('#particles', { autoAlpha: 1, duration: 0.5, ease: 'power2.out' }, CURTAIN_OPEN + 0.15);
  tl.to('#particles', { autoAlpha: 0, duration: 0.4, ease: 'power2.in' }, 4.1);

  // ── Phase 1: anticipation — kicker rises, curtain fully closed ─────────
  tl.set('#kicker', { autoAlpha: 0, y: 20 }, 0);
  tl.set('#title-mask', { clipPath: 'inset(0 50% 0 50%)' }, 0);
  tl.set('#underscore', { scaleX: 0 }, 0);
  tl.set('#sweep', { xPercent: 0, autoAlpha: 0 }, 0);

  tl.to('#kicker', {
    autoAlpha: 1, y: 0, duration: 0.32,
    ease: 'back.out(1.5)'
  }, KICKER_IN);

  // ── Phase 2: curtain parts with a sharp spring, staggered 3 frames ─────
  tl.to('#slab-left', {
    xPercent: -100, duration: CURTAIN_OPEN_DUR,
    ease: 'back.out(2.2)'
  }, CURTAIN_OPEN);
  tl.to('#slab-right', {
    xPercent: 100, duration: CURTAIN_OPEN_DUR,
    ease: 'back.out(2.2)'
  }, CURTAIN_OPEN + 0.1);

  // Wordmark reveals via clip-path wipe growing from center outward.
  tl.to('#title-mask', {
    clipPath: 'inset(0 0% 0 0%)',
    duration: TITLE_WIPE_DUR,
    ease: 'power3.out'
  }, TITLE_WIPE_START);

  // One-time light sweep across the metallic letters.
  tl.set('#sweep', { autoAlpha: 1 }, SWEEP_START);
  tl.fromTo('#sweep', { xPercent: -60 }, {
    xPercent: 340, duration: SWEEP_DUR, ease: 'power1.inOut'
  }, SWEEP_START);
  tl.to('#sweep', { autoAlpha: 0, duration: 0.15, ease: 'power2.in' }, SWEEP_START + SWEEP_DUR - 0.05);

  // Hairline underscore draws left-to-right.
  tl.fromTo('#underscore', { scaleX: 0 }, {
    scaleX: 1, duration: UNDERSCORE_DUR, ease: 'power3.out', transformOrigin: 'left center'
  }, UNDERSCORE_START);

  // ── Phase 3: hero hold — ambient scale creep, slabs breathe slightly ───
  tl.to('#title-mask', {
    scale: 1.02, duration: 1.0, ease: 'sine.inOut',
    repeat: 2, yoyo: true, transformOrigin: 'center center'
  }, HOLD_START);
  tl.to('#slab-left', {
    scale: 1.015, duration: 1.2, ease: 'sine.inOut',
    repeat: 1, yoyo: true, transformOrigin: 'right center'
  }, HOLD_START);
  tl.to('#slab-right', {
    scale: 1.015, duration: 1.2, ease: 'sine.inOut',
    repeat: 1, yoyo: true, transformOrigin: 'left center'
  }, HOLD_START);

  // ── Phase 4: decisive exit — text first, then curtain closes ───────────
  tl.to('#kicker', {
    y: -15, autoAlpha: 0, duration: 8 / 30, ease: 'power2.in'
  }, EXIT_KICKER);

  tl.to(['#title-mask', '#underscore'], {
    scale: 0.92, autoAlpha: 0, duration: 8 / 30, ease: 'power3.in',
    transformOrigin: 'center center'
  }, EXIT_TITLE);

  // Curtain snaps shut fast with acceleration, fully covering by ~4.6s.
  tl.to('#slab-left', {
    xPercent: 0, scale: 1, duration: CURTAIN_CLOSE_DUR, ease: 'power3.in'
  }, CURTAIN_CLOSE);
  tl.to('#slab-right', {
    xPercent: 0, scale: 1, duration: CURTAIN_CLOSE_DUR, ease: 'power3.in'
  }, CURTAIN_CLOSE + 0.03);

  // Final dim toward black for a clean closed-curtain last frame.
  tl.to('#curtain', {
    filter: 'brightness(0.72)', duration: 0.35, ease: 'power2.out'
  }, 4.65);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

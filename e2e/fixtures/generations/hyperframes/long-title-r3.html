<!doctype html>
<!-- "The Long Road to Westminster Bridge" - documentary title stinger.
     Concept: title lines process on like footsteps crossing a bridge, over a
     slow-panning hairline strut silhouette that catches one warm rim-light sweep.
     1920x1080 @ 30fps, 4.00s exactly. -->
<html lang="en" data-composition-variables='[
  {"id":"line1","type":"string","label":"Line 1 (support)","default":"THE LONG ROAD TO"},
  {"id":"line2","type":"string","label":"Line 2 (hero)","default":"WESTMINSTER"},
  {"id":"line3","type":"string","label":"Line 3 (secondary hero)","default":"BRIDGE"},
  {"id":"accent","type":"color","label":"Accent (rim-light / keyline)","default":"#c98a3e"}
]'>
<head>
<meta charset="UTF-8" />
<title>The Long Road to Westminster Bridge</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; }

  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: linear-gradient(180deg, #14171c 0%, #181b20 45%, #241f19 78%, #2b241d 100%);
    font-family: 'Oswald', Georgia, 'Times New Roman', serif;
  }

  /* Final cut-to-black plate, sits above everything, starts invisible */
  #blackout {
    position: absolute; inset: 0;
    background: #0a0a0a;
    opacity: 0;
    z-index: 50;
    pointer-events: none;
  }

  .clip { position: absolute; inset: 0; }

  /* ---------- Background dressing ---------- */
  #fog-band {
    position: absolute;
    left: -10%;
    width: 120%;
    top: 55%;
    height: 90px;
    margin-top: -45px;
    background: linear-gradient(90deg, rgba(200,175,140,0) 0%, rgba(200,175,140,0.10) 45%, rgba(200,175,140,0.14) 55%, rgba(200,175,140,0) 100%);
    filter: blur(6px);
    z-index: 2;
  }

  /* Vertical light-shaft accent behind text for separation from silhouette */
  #light-shaft {
    position: absolute;
    left: 50%;
    top: 30%;
    width: 900px;
    height: 620px;
    margin-left: -450px;
    background: radial-gradient(ellipse at center, rgba(230,205,170,0.09) 0%, rgba(230,205,170,0.03) 45%, rgba(230,205,170,0) 75%);
    z-index: 3;
  }

  /* ---------- Bridge silhouette (drawn asset, mid-depth) ---------- */
  #bridge-wrap {
    position: absolute;
    top: 62%;
    left: 50%;
    width: 2400px;
    height: 260px;
    margin-left: -1200px;
    margin-top: -20px;
    z-index: 4;
    opacity: 0.5; /* ramps to 1 during entrance phase */
  }
  #bridge-wrap svg { display: block; width: 100%; height: 100%; overflow: visible; }
  .parapet-line { fill: none; stroke: #05060a; stroke-width: 3; }
  .strut { stroke: #05060a; stroke-width: 5; }
  /* rim-light sweep clone drawn on top, masked to travel across */
  .strut-rim { stroke: var(--accent, #c98a3e); stroke-width: 5; opacity: 0; }

  #rim-sweep-mask-rect { }

  /* ---------- Title block ---------- */
  #title-block {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    text-align: center;
  }

  .title-line-mask { overflow: visible; }

  #line1 {
    margin: 0;
    color: #eef0f2;
    font-weight: 500;
    font-size: 48.6px; /* height*0.045 */
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-shadow: 0 6px 18px rgba(0,0,0,0.55);
  }

  #line2-wrap {
    margin-top: 14px;
    position: relative;
    display: inline-block;
  }
  #line2 {
    margin: 0;
    color: #f6f3ee;
    font-weight: 700;
    font-size: 191px; /* solved from string width */
    letter-spacing: -0.01em;
    text-transform: uppercase;
    line-height: 1;
    text-shadow: 0 10px 28px rgba(0,0,0,0.6);
  }
  /* thin keyline under WESTMINSTER, glows in during rim sweep */
  #keyline {
    position: absolute;
    left: 4%;
    right: 4%;
    bottom: -14px;
    height: 3px;
    background: var(--accent, #c98a3e);
    opacity: 0;
    box-shadow: 0 0 18px 2px rgba(201,138,62,0.0);
  }

  #line3 {
    margin-top: 18px;
    color: #e9e4dc;
    font-weight: 600;
    font-size: 118px; /* ~62% of line2 */
    letter-spacing: -0.01em;
    text-transform: uppercase;
    text-shadow: 0 8px 22px rgba(0,0,0,0.55);
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4">

  <!-- Background gradient + fog: full duration, holds one extra frame past exit -->
  <section id="bg-layer" class="clip" data-start="0" data-duration="4" data-track-index="1">
    <div id="fog-band"></div>
  </section>

  <!-- Bridge silhouette + light shaft: mid-depth, panning -->
  <section id="silhouette-layer" class="clip" data-start="0" data-duration="4" data-track-index="2">
    <div id="light-shaft"></div>
    <div id="bridge-wrap">

        <g id="struts">
          <!-- generated strut set: 40 struts across width -->

          <line class="strut" x1="920"  y1="90" x2="920"  y2="230"></line>
          <line class="strut" x1="980"  y1="90" x2="980"  y2="230"></line>
          <line class="strut" x1="1040" y1="90" x2="1040" y2="230"></line>

          <line class="strut" x1="1400" y1="90" x2="1400" y2="230"></line>

          <line class="strut" x1="1520" y1="90" x2="1520" y2="230"></line>
          <line class="strut" x1="1580" y1="90" x2="1580" y2="230"></line>
          <line class="strut" x1="1640" y1="90" x2="1640" y2="230"></line>
          <line class="strut" x1="1700" y1="90" x2="1700" y2="230"></line>
          <line class="strut" x1="1760" y1="90" x2="1760" y2="230"></line>
          <line class="strut" x1="1820" y1="90" x2="1820" y2="230"></line>
          <line class="strut" x1="1880" y1="90" x2="1880" y2="230"></line>
          <line class="strut" x1="1940" y1="90" x2="1940" y2="230"></line>
          <line class="strut" x1="2000" y1="90" x2="2000" y2="230"></line>
          <line class="strut" x1="2060" y1="90" x2="2060" y2="230"></line>
          <line class="strut" x1="2120" y1="90" x2="2120" y2="230"></line>
          <line class="strut" x1="2180" y1="90" x2="2180" y2="230"></line>
          <line class="strut" x1="2240" y1="90" x2="2240" y2="230"></line>
          <line class="strut" x1="2300" y1="90" x2="2300" y2="230"></line>
          <line class="strut" x1="2360" y1="90" x2="2360" y2="230"></line>
        </g>
        <!-- rim-light copy, revealed via a moving clip-path sweep -->
        <g id="struts-rim" clip-path="url(#sweepClip)">
          <line class="strut-rim" x1="20"   y1="90" x2="20"   y2="230"></line>
          <line class="strut-rim" x1="80"   y1="90" x2="80"   y2="230"></line>
          <line class="strut-rim" x1="140"  y1="90" x2="140"  y2="230"></line>
          <line class="strut-rim" x1="200"  y1="90" x2="200"  y2="230"></line>
          <line class="strut-rim" x1="260"  y1="90" x2="260"  y2="230"></line>
          <line class="strut-rim" x1="320"  y1="90" x2="320"  y2="230"></line>
          <line class="strut-rim" x1="380"  y1="90" x2="380"  y2="230"></line>
          <line class="strut-rim" x1="440"  y1="90" x2="440"  y2="230"></line>
          <line class="strut-rim" x1="500"  y1="90" x2="500"  y2="230"></line>
          <line class="strut-rim" x1="560"  y1="90" x2="560"  y2="230"></line>
          <line class="strut-rim" x1="620"  y1="90" x2="620"  y2="230"></line>
          <line class="strut-rim" x1="680"  y1="90" x2="680"  y2="230"></line>
          <line class="strut-rim" x1="740"  y1="90" x2="740"  y2="230"></line>
          <line class="strut-rim" x1="800"  y1="90" x2="800"  y2="230"></line>

          <line class="strut-rim" x1="1700" y1="90" x2="1700" y2="230"></line>
          <line class="strut-rim" x1="1760" y1="90" x2="1760" y2="230"></line>
          <line class="strut-rim" x1="1820" y1="90" x2="1820" y2="230"></line>
          <line class="strut-rim" x1="1880" y1="90" x2="1880" y2="230"></line>
          <line class="strut-rim" x1="1940" y1="90" x2="1940" y2="230"></line>
          <line class="strut-rim" x1="2000" y1="90" x2="2000" y2="230"></line>
          <line class="strut-rim" x1="2060" y1="90" x2="2060" y2="230"></line>
          <line class="strut-rim" x1="2120" y1="90" x2="2120" y2="230"></line>
          <line class="strut-rim" x1="2180" y1="90" x2="2180" y2="230"></line>
          <line class="strut-rim" x1="2240" y1="90" x2="2240" y2="230"></line>
          <line class="strut-rim" x1="2300" y1="90" x2="2300" y2="230"></line>
          <line class="strut-rim" x1="2360" y1="90" x2="2360" y2="230"></line>
        </g>
        <defs>
          <clipPath id="sweepClip">
            <rect id="sweep-rect" x="-260" y="0" width="260" height="260"></rect>
          </clipPath>
        </defs>
      </svg>
    </div>
  </section>

  <!-- Title wordmark: paints last, always on top -->
  <section id="title-layer" class="clip" data-start="0" data-duration="4" data-track-index="10">
    <div id="title-block">
      <div class="title-line-mask"><h2 id="line1" data-var-text="line1">THE LONG ROAD TO</h2></div>
      <div id="line2-wrap">
        <div class="title-line-mask"><h1 id="line2" data-var-text="line2">WESTMINSTER</h1></div>
        <div id="keyline"></div>
      </div>
      <div class="title-line-mask"><h2 id="line3" data-var-text="line3">BRIDGE</h2></div>
    </div>
  </section>

  <div id="blackout"></div>
</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing constants (seconds) ──────────────────────────────────────────
  const L1_IN   = 0.20, L1_DUR = 0.55;   // line1 springs in, lands ~0.55s
  const L2_IN   = 0.37, L2_DUR = 0.55;   // line2 (hero) springs in, lands ~0.75s w/ overshoot
  const L3_IN   = 0.53, L3_DUR = 0.55;   // line3 springs in, lands ~0.90s
  const SIL_RAMP_END = 0.53;             // silhouette dim->full opacity across entrance phase
  const SWEEP_START = 1.00, SWEEP_DUR = 0.60; // rim-light sweep across struts
  const KEYLINE_START = 1.15, KEYLINE_DUR = 0.30; // keyline glow under WESTMINSTER
  const HOLD_START = 1.60, HOLD_END = 3.40;      // hero hold, breathing
  const EXIT_START = 3.40, EXIT_TEXT_DUR = 0.45; // title exits, done by ~3.85s
  const EXIT_SIL_START = 3.42, EXIT_SIL_DUR = 0.50; // silhouette follows 2 frames later
  const BG_HOLD_END = 3.95, CUT_END = 4.00;      // background holds then cuts to black

  // spring-ish ease approximating damping22/stiffness170 with slight overshoot
  const SPRING = 'back.out(1.5)';
  const SPRING_SOFT = 'back.out(1.1)';

  // ── Phase 0: Establish - silhouette dim, static, fog present ───────────
  tl.set('#bridge-wrap', { opacity: 0.5, x: 0 }, 0);
  tl.to('#bridge-wrap', { opacity: 1.0, duration: SIL_RAMP_END, ease: 'power1.inOut' }, 0);

  // Continuous slow leftward pan of the silhouette across almost the whole piece
  // (6px/sec linear - continuous background travel, exempt from no-linear rule)
  tl.to('#bridge-wrap', { x: -(6 * (EXIT_SIL_START - 0)), duration: (EXIT_SIL_START - 0), ease: 'none' }, 0);

  // ── Phase 1: Procession entrance - lines walk on from the left ─────────
  tl.from('#line1', { x: -120, autoAlpha: 0, duration: L1_DUR, ease: SPRING_SOFT }, L1_IN);
  tl.from('#line2', { x: -120, autoAlpha: 0, scale: 0.98, duration: L2_DUR, ease: SPRING }, L2_IN);
  tl.to('#line2', { scale: 1.02, duration: 0.18, ease: 'sine.out' }, L2_IN + 0.20);
  tl.to('#line2', { scale: 1.0, duration: 0.18, ease: 'sine.inOut' }, L2_IN + 0.38); // settle by ~0.75s (2% overshoot)
  tl.from('#line3', { x: -120, autoAlpha: 0, duration: L3_DUR, ease: SPRING_SOFT }, L3_IN);

  // ── Phase 2: Rim-light sweep across bridge struts + keyline glow ───────
  tl.fromTo('#struts-rim', { opacity: 0 }, { opacity: 1, duration: 0.08, ease: 'none' }, SWEEP_START);
  tl.fromTo('#sweep-rect', { attr: { x: -260 } }, { attr: { x: 2400 }, duration: SWEEP_DUR, ease: 'power2.inOut' }, SWEEP_START);
  tl.to('#struts-rim', { opacity: 0, duration: 0.1, ease: 'power1.in' }, SWEEP_START + SWEEP_DUR);
  tl.fromTo('#keyline',
    { opacity: 0, boxShadow: '0 0 0px 0px rgba(201,138,62,0)' },
    { opacity: 1, duration: KEYLINE_DUR, ease: 'power2.out' },
    KEYLINE_START);
  tl.to('#keyline', { boxShadow: '0 0 18px 2px rgba(201,138,62,0.55)', duration: KEYLINE_DUR, ease: 'power2.out' }, KEYLINE_START);
  tl.to('#keyline', { opacity: 0.6, duration: 0.4, ease: 'sine.inOut' }, KEYLINE_START + KEYLINE_DUR + 0.15);

  // ── Phase 3: Hero hold - ambient breathing on the whole title block ────
  const holdDur = HOLD_END - HOLD_START;
  tl.to('#title-block', { scale: 1.02, duration: holdDur * 0.5, ease: 'sine.inOut' }, HOLD_START);
  tl.to('#title-block', { scale: 1.0, duration: holdDur * 0.5, ease: 'sine.inOut' }, HOLD_START + holdDur * 0.5);

  // Fog band drifts almost imperceptibly through the hold
  tl.to('#fog-band', { x: -30, duration: holdDur, ease: 'sine.inOut' }, HOLD_START);

  // ── Phase 4: Clean exit - text first, silhouette follows, bg holds ─────
  tl.to('#title-block', { y: -60, autoAlpha: 0, duration: EXIT_TEXT_DUR, ease: 'power3.in' }, EXIT_START);
  tl.to('#bridge-wrap', { y: -40, autoAlpha: 0, duration: EXIT_SIL_DUR, ease: 'power3.in' }, EXIT_SIL_START);
  tl.to('#light-shaft', { autoAlpha: 0, duration: EXIT_SIL_DUR, ease: 'power2.in' }, EXIT_SIL_START);
  tl.to('#fog-band', { autoAlpha: 0, x: -80, duration: EXIT_SIL_DUR, ease: 'power2.in' }, EXIT_SIL_START);

  // Background gradient holds, then the whole frame settles to black
  tl.to('#bg-layer', { autoAlpha: 1, duration: 0.01 }, BG_HOLD_END);
  tl.to('#blackout', { autoAlpha: 1, duration: CUT_END - BG_HOLD_END, ease: 'power1.in' }, BG_HOLD_END);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

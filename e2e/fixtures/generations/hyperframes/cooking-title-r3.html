<!doctype html>
<!-- "Sunday Kitchen" title card - a steam curl draws itself into place above a serif
     wordmark lockup, a hairline rule ties beneath the support line, all set against a
     warm cream-to-amber daylight gradient. 1920x1080 @ 4.00s / 120f. -->
<html lang="en" data-composition-variables='[
  {"id":"hero","type":"string","label":"Hero word","default":"SUNDAY"},
  {"id":"support","type":"string","label":"Support word","default":"KITCHEN"},
  {"id":"accent","type":"color","label":"Rule / accent colour","default":"#b8895a"},
  {"id":"ink","type":"color","label":"Hero ink colour","default":"#3d2a1a"}
]'>
<head>
<meta charset="UTF-8" />
<title>Sunday Kitchen</title>
<style>
  html, body { margin: 0; padding: 0; }

  /* ── Stage ─────────────────────────────────────────────────────────────── */
  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
    background: linear-gradient(180deg, #f6ead9 0%, #f2ddc0 55%, #e8c9a0 100%);
  }
  .clip { position: absolute; inset: 0; }

  /* ── Background layers: glow, linen texture, vignette ───────────────────── */
  #glow {
    position: absolute;
    top: -10%;
    left: -12%;
    width: 70%;
    height: 70%;
    background: radial-gradient(circle at 30% 30%, rgba(255,244,226,0.55) 0%, rgba(255,244,226,0.18) 45%, rgba(255,244,226,0) 72%);
    opacity: 0.08;
    pointer-events: none;
  }
  /* Linen weave: thin repeating diagonal hairlines, very low opacity for tactility. */
  #linen {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(45deg, rgba(61,42,26,0.05) 0px, rgba(61,42,26,0.05) 1px, transparent 1px, transparent 10px);
    opacity: 0.4;
    pointer-events: none;
  }
  #vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, rgba(90,58,30,0) 55%, rgba(90,58,30,0.16) 100%);
    pointer-events: none;
  }

  /* ── Steam curl accent (SVG stroke, drawn via dashoffset) ───────────────── */
  #steam-wrap {
    position: absolute;
    left: 50%;
    top: 42%;
    width: 260px;
    height: 320px;
    margin-left: -130px;
    transform: translateY(0);
    pointer-events: none;
  }
  #steam-path {
    fill: none;
    stroke: #a9855f;
    stroke-width: 1.5;
    stroke-linecap: round;
    opacity: 0.35;
  }

  /* ── Text lockup ─────────────────────────────────────────────────────────── */
  #lockup {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }
  #hero-mask, #support-mask { overflow: hidden; }
  #hero-mask { padding: 0.12em 0; }
  #support-mask { padding: 0.15em 0; margin-top: 8px; }

  #hero-title {
    margin: 0;
    font-size: 205px;
    line-height: 1;
    font-weight: 400;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: var(--ink, #3d2a1a);
    text-align: center;
    white-space: nowrap;
  }
  #support-title {
    margin: 0;
    font-size: 64px;
    line-height: 1;
    font-weight: 400;
    font-variant: small-caps;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #8a5a34;
    text-align: center;
    white-space: nowrap;
  }

  /* Hand-set hairline rule beneath KITCHEN. */
  #rule-wrap {
    margin-top: 22px;
    width: 460px;
    height: 1px;
    overflow: hidden;
  }
  #rule {
    width: 100%;
    height: 1px;
    background: var(--accent, #b8895a);
    transform-origin: left center;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4.00">

  <!-- Background: gradient (in #root), glow, linen texture, vignette -->
  <section id="bg-layer" class="clip" data-start="0" data-duration="4.00" data-track-index="1">
    <div id="glow"></div>
    <div id="linen"></div>
    <div id="vignette"></div>
  </section>

  <!-- Steam curl accent - sits behind/around the wordmark -->
  <section id="steam-layer" class="clip" data-start="0" data-duration="4.00" data-track-index="2">
    <div id="steam-wrap">
      <svg viewBox="0 0 260 320" width="260" height="320">
        <path id="steam-path"
          d="M 130 320
             C 60 280, 200 250, 140 210
             C 80 170, 210 150, 130 110
             C 70 80, 190 55, 130 10" />
      </svg>
    </div>
  </section>

  <!-- Hairline rule beneath KITCHEN -->
  <section id="rule-layer" class="clip" data-start="0" data-duration="4.00" data-track-index="3">
    <div id="lockup-rule-anchor" style="position:absolute; left:50%; top:58%; transform:translate(-50%, 62px);">
      <div id="rule-wrap"><div id="rule"></div></div>
    </div>
  </section>

  <!-- Text lockup: SUNDAY (hero) / KITCHEN (support) - topmost, never covered -->
  <section id="text-layer" class="clip" data-start="0" data-duration="4.00" data-track-index="4">
    <div id="lockup">
      <div id="hero-mask"><h1 id="hero-title" data-var-text="hero">SUNDAY</h1></div>
      <div id="support-mask"><h2 id="support-title" data-var-text="support">KITCHEN</h2></div>
    </div>
  </section>

</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing constants (composition seconds) ────────────────────────────────
  const STEAM_START   = 0.10;   // steam begins drawing upward
  const STEAM_PEAK    = 0.65;   // draw completes, settles to ambient
  const HERO_IN       = 0.40;   // SUNDAY lands
  const SUPPORT_IN    = 0.44;   // KITCHEN lands (4-frame stagger)
  const RULE_IN       = 0.60;   // hairline rule begins drawing
  const RULE_DONE     = 0.95;   // rule fully drawn
  const HOLD_START    = 1.30;
  const HOLD_END      = 2.90;
  const STEAM_EXIT    = 2.90;   // steam accelerates + fades
  const RULE_EXIT     = 3.00;   // rule retracts
  const SUPPORT_EXIT  = 3.30;   // KITCHEN clears
  const HERO_EXIT     = 3.35;   // SUNDAY clears (4-frame stagger)

  // ── Steam curl: draw upward via stroke-dashoffset, then ambient drift ─────
  // Precompute path length approximation for dash setup (SVG path is fixed geometry).
  gsap.set('#steam-path', { strokeDasharray: 620, strokeDashoffset: 620 });
  gsap.set('#steam-wrap', { autoAlpha: 0, y: 40 });

  tl.to('#steam-wrap', { autoAlpha: 1, y: 0, duration: 0.25, ease: 'power2.out' }, STEAM_START);
  tl.to('#steam-path', { strokeDashoffset: 0, duration: STEAM_PEAK - STEAM_START, ease: 'power1.out' }, STEAM_START);
  // Settle to ambient low opacity once the curl reaches its peak position.
  tl.to('#steam-path', { opacity: 0.15, duration: 0.35, ease: 'sine.out' }, STEAM_PEAK);

  // ── Wordmark lands: masked lines, spring-ish overshoot (back.out, capped) ─
  tl.from('#hero-title', { yPercent: 100, autoAlpha: 0, duration: 0.55, ease: 'back.out(1.6)' }, HERO_IN);
  tl.from('#support-title', { yPercent: 100, autoAlpha: 0, duration: 0.5, ease: 'back.out(1.6)' }, SUPPORT_IN);

  // ── Hairline rule draws left-to-right beneath KITCHEN ─────────────────────
  gsap.set('#rule', { scaleX: 0 });
  tl.to('#rule', { scaleX: 1, duration: RULE_DONE - RULE_IN, ease: 'power2.out' }, RULE_IN);

  // ── Hero hold: ambient ONLY - sinusoidal steam drift, glow breathing, ─────
  //    a whisper of wordmark scale so the frame stays alive without distraction.
  const HOLD_DUR = HOLD_END - HOLD_START;
  tl.to('#steam-wrap', { x: 8, duration: HOLD_DUR / 2.4 * 1.2, ease: 'sine.inOut', repeat: 3, yoyo: true }, HOLD_START);
  tl.to('#glow', { opacity: 0.12, duration: HOLD_DUR / 1.6, ease: 'sine.inOut', repeat: 1, yoyo: true }, HOLD_START);
  tl.to('#lockup', { scale: 1.015, duration: HOLD_DUR / 2, ease: 'sine.inOut', repeat: 1, yoyo: true }, HOLD_START);

  // ── Exit phase 1: steam dissipates, accelerating fade ─────────────────────
  tl.to('#steam-wrap', { x: 24, duration: STEAM_EXIT === 2.9 ? 0.25 : 0.25, ease: 'power1.in' }, STEAM_EXIT);
  tl.to('#steam-path', { opacity: 0, duration: 0.25, ease: 'power2.in' }, STEAM_EXIT);
  tl.to('#steam-wrap', { autoAlpha: 0, duration: 0.15, ease: 'power2.in' }, STEAM_EXIT + 0.10);

  // ── Exit phase 2: rule retracts right-to-left ─────────────────────────────
  gsap.set('#rule', { transformOrigin: 'right center' });
  tl.set('#rule', { transformOrigin: 'right center' }, RULE_EXIT - 0.001);
  tl.to('#rule', { scaleX: 0, duration: 0.25, ease: 'power2.in' }, RULE_EXIT);

  // ── Exit phase 3: type clears - support first, hero last (staggered) ──────
  tl.to('#support-title', { y: -30, autoAlpha: 0, duration: 0.35, ease: 'power2.in' }, SUPPORT_EXIT);
  tl.to('#hero-title', { y: -40, autoAlpha: 0, duration: 0.40, ease: 'power2.in' }, HERO_EXIT);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

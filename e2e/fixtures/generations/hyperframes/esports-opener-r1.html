<!doctype html>
<!-- "Nova Rift" - 4s esports stinger. A jagged neon crack rips the frame open down the
     centre seam; two skewed dark-violet slabs spring in from opposite edges carrying
     "NOVA" and "RIFT", slamming together to seal the tear at the hero moment. Single
     paused GSAP timeline, all tweens positioned in composition seconds. 1920x1080 @ 4s.
     FIX PASS: hero words were clipped by their holder box / crowded the frame edge -
     words are now sized from their own string length with generous holder width and a
     hard safe-margin, so neither "NOVA" nor "RIFT" ever crops or sits inside the 5%
     edge margin at the hold. -->
<html lang="en" data-composition-variables='[
  {"id":"titleLeft","type":"string","label":"Title (left word)","default":"NOVA"},
  {"id":"titleRight","type":"string","label":"Title (right word)","default":"RIFT"},
  {"id":"kicker","type":"string","label":"Kicker","default":"LATE NIGHT ESPORTS"},
  {"id":"accentCyan","type":"color","label":"Rift cyan","default":"#4DF0FF"},
  {"id":"accentMagenta","type":"color","label":"Spark magenta","default":"#FF3D7A"}
]'>
<head>
<meta charset="UTF-8" />
<title>Nova Rift Opener</title>
<style>
  /* ── Base ─────────────────────────────────────────────────────────────── */
  html, body { margin: 0; padding: 0; }
  * { box-sizing: border-box; }

  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #0B0A14;
    font-family: 'Archivo', 'Arial Narrow', Arial, sans-serif;
  }
  .clip { position: absolute; inset: 0; }

  /* ── Background: layered graphite-violet glow + grain/scanlines ──────── */
  #bg-glow {
    position: absolute; inset: -10%;
    background: radial-gradient(circle at 50% 48%, #241a3a 0%, #1C1330 32%, #0B0A14 68%, #0B0A14 100%);
  }
  #bg-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 45%, rgba(0,0,0,0.55) 100%);
  }
  #bg-scanlines {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 4px);
    opacity: 0.04;
    mix-blend-mode: screen;
  }
  #bg-grain {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, transparent 2px, transparent 5px);
    opacity: 0.05;
  }

  /* ── Particles: faint upward-drifting motes ───────────────────────────── */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--accentCyan, #4DF0FF);
    opacity: 0.35;
    filter: blur(0.5px);
  }
  /* a few motes carry the magenta spark accent instead of cyan */
  .particle.spark {
    background: var(--accentMagenta, #FF3D7A);
    opacity: 0.3;
  }

  /* ── Speed lines: thin streaks radiating from seam ────────────────────── */
  #speed-lines {
    position: absolute; top: 50%; left: 50%;
    width: 2600px; height: 0;
    transform: translate(-50%, -50%);
  }
  .speed-line {
    position: absolute;
    top: -1px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
    opacity: 0;
  }

  /* ── Slabs: skewed sport panels, lit surfaces with same-hue shading ───── */
  .slab-wrap {
    position: absolute;
    top: 50%;
    width: 62%;
    height: 168%;
    transform: translateY(-50%) skewX(-8deg);
    overflow: visible;
  }
  #slab-left  { left: -14%; }
  #slab-right { right: -14%; }
  .slab {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(135deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0) 30%, rgba(0,0,0,0.4) 100%),
      linear-gradient(160deg, #241a38 0%, #150f22 55%, #0c0813 100%);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.10),
      18px 0 40px rgba(0,0,0,0.5);
    border-radius: 0;
  }
  #slab-left .slab  { box-shadow: inset 0 2px 0 rgba(255,255,255,0.10), 26px 0 50px rgba(0,0,0,0.55); }
  #slab-right .slab { box-shadow: inset 0 2px 0 rgba(255,255,255,0.10), -26px 0 50px rgba(0,0,0,0.55); }
  /* keyline where slabs meet the crack seam - cyan on one edge, magenta spark on the other */
  #slab-left .keyline  { position:absolute; top:0; right:0; width:3px; height:100%; background: linear-gradient(180deg, transparent, var(--accentCyan, #4DF0FF), transparent); opacity: 0.6; }
  #slab-right .keyline { position:absolute; top:0; left:0;  width:3px; height:100%; background: linear-gradient(180deg, transparent, var(--accentMagenta, #FF3D7A), transparent); opacity: 0.55; }

  /* ── Wordmark ─────────────────────────────────────────────────────────────
     Holders are wide (46% of frame, anchored to the OUTER edge of the frame,
     never to a narrow half-slab) and counter-skewed to sit upright on the
     skewed slabs. Text is sized in JS from its own character count so it can
     never overflow its holder, and holders themselves are pulled in from the
     frame edges by a hard 6% safe margin. */
  .word-holder {
    position: absolute;
    top: 50%;
    width: 46%;
    display: flex;
    align-items: center;
    overflow: visible;
    transform: skewX(8deg) translateY(-50%); /* counter-skew text upright */
  }
  #nova-holder { left: 6%;  justify-content: flex-start; }
  #rift-holder { right: 6%; justify-content: flex-end; }
  .hero-word {
    margin: 0;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    line-height: 1;
    white-space: nowrap;
  }
  #word-nova { color: #f5f7fb; text-shadow: 0 0 22px rgba(77,240,255,0.35), 0 6px 0 rgba(0,0,0,0.4); }
  #word-rift { color: var(--accentCyan, #4DF0FF); text-shadow: 0 0 26px rgba(77,240,255,0.55), 0 6px 0 rgba(255,61,122,0.3); }

  /* ── Rift crack (SVG) ──────────────────────────────────────────────────── */
  #crack-layer {
    position: absolute;
    top: 50%; left: 50%;
    width: 140px;
    height: 1400px;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 0 18px rgba(77,240,255,0.85)) drop-shadow(0 0 34px rgba(255,61,122,0.35));
  }
  #crack-layer svg { width: 100%; height: 100%; overflow: visible; }

  #flash {
    position: absolute; inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
  }

  /* ── Kicker ───────────────────────────────────────────────────────────── */
  #kicker-wrap {
    position: absolute;
    top: 9%;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
  }
  #kicker {
    margin: 0;
    font-family: 'JetBrains Mono', 'Inter', monospace;
    font-size: 32.4px; /* height * 0.03 */
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accentCyan, #4DF0FF);
    opacity: 0.7;
  }

  #hero-lockup {
    position: absolute; inset: 0;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4">

  <!-- Track 0: background world, present throughout -->
  <section id="bg" class="clip" data-start="0" data-duration="4" data-track-index="0">
    <div id="bg-glow"></div>
    <div id="bg-vignette"></div>
    <div id="bg-scanlines"></div>
    <div id="bg-grain"></div>
    <div class="particle" id="p1" style="left:12%; top:78%; width:5px; height:5px;"></div>
    <div class="particle spark" id="p2" style="left:26%; top:88%; width:3px; height:3px;"></div>
    <div class="particle" id="p3" style="left:41%; top:70%; width:4px; height:4px;"></div>
    <div class="particle" id="p4" style="left:58%; top:85%; width:3px; height:3px;"></div>
    <div class="particle" id="p5" style="left:71%; top:74%; width:5px; height:5px;"></div>
    <div class="particle spark" id="p6" style="left:84%; top:90%; width:4px; height:4px;"></div>
    <div class="particle" id="p7" style="left:18%; top:60%; width:3px; height:3px;"></div>
    <div class="particle" id="p8" style="left:64%; top:62%; width:4px; height:4px;"></div>
    <div class="particle spark" id="p9" style="left:92%; top:68%; width:3px; height:3px;"></div>
    <div class="particle" id="p10" style="left:6%; top:40%; width:3px; height:3px;"></div>
  </section>

  <!-- Track 1: slab panels (behind text, above bg) -->
  <section id="slabs" class="clip" data-start="0" data-duration="4" data-track-index="1">
    <div id="slab-left" class="slab-wrap">
      <div class="slab"></div>
      <div class="keyline"></div>
    </div>
    <div id="slab-right" class="slab-wrap">
      <div class="slab"></div>
      <div class="keyline"></div>
    </div>
  </section>

  <!-- Track 2: the rift crack + speed lines, sits in the seam -->
  <section id="rift" class="clip" data-start="0" data-duration="4" data-track-index="2">
    <div id="crack-layer">
      <svg viewBox="0 0 140 1400" preserveAspectRatio="none">
        <polyline id="crack-poly" points="70,0 55,90 85,160 50,230 90,300 40,380 95,470 45,560 88,650 55,720 92,800 42,880 90,960 50,1040 86,1120 55,1200 90,1280 70,1400"
          fill="none" stroke="#4DF0FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
        <polyline points="70,0 55,90 85,160 50,230 90,300 40,380 95,470 45,560 88,650 55,720 92,800 42,880 90,960 50,1040 86,1120 55,1200 90,1280 70,1400"
          fill="none" stroke="#FF3D7A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" />
      </svg>
    </div>
    <div id="speed-lines">
      <div class="speed-line" style="left:50%; width:1200px; margin-left:-1200px;"></div>
      <div class="speed-line" style="left:50%; width:900px;  margin-left:-1050px; top:-40px;"></div>
      <div class="speed-line" style="left:50%; width:1000px; margin-left:-950px;  top:40px;"></div>
      <div class="speed-line" style="left:50%; width:1200px;"></div>
      <div class="speed-line" style="left:50%; width:900px;  top:-40px;"></div>
      <div class="speed-line" style="left:50%; width:1000px; top:40px;"></div>
    </div>
    <div id="flash"></div>
  </section>

  <!-- Track 3: wordmark text, painted last over the slabs. Holders anchor to the
       OUTER frame edges with a hard 6% safe margin - never to the narrow inner
       half of a slab - so the sized-from-string text has real room to live in. -->
  <section id="hero-text" class="clip" data-start="0" data-duration="4" data-track-index="3">
    <div id="hero-lockup"></div>
    <div class="word-holder" id="nova-holder">
      <h1 id="word-nova" class="hero-word" data-var-text="titleLeft">NOVA</h1>
    </div>
    <div class="word-holder" id="rift-holder">
      <h1 id="word-rift" class="hero-word" data-var-text="titleRight">RIFT</h1>
    </div>
  </section>

  <!-- Track 4: kicker label, topmost -->
  <section id="kicker-layer" class="clip" data-start="0" data-duration="4" data-track-index="4">
    <div id="kicker-wrap">
      <p id="kicker" data-var-text="kicker">LATE NIGHT ESPORTS</p>
    </div>
  </section>

</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Sizing: hero words sized from their own strings, capAdvance ~0.62 ────
  // Each holder is 46% of the 1920px frame (≈883px) with a hard 6% (≈115px)
  // margin from the frame edge, so the settled word must fit inside ≈883px
  // with room to spare - never touching the 6% margin, always ≥5% safe area.
  // "NOVA" (4 chars): target ≈ 40% of frame width = 768px
  //   fontSize = 768 / (4 * 0.62) ≈ 310px  → actual glyph run ≈ 768px (40.0%)
  // "RIFT" (4 chars): target ≈ 37% of frame width = 710px (slightly smaller,
  //   letterforms I/R/F/T read narrower, keeps combined lockup balanced)
  //   fontSize = 710 / (4 * 0.62) ≈ 286px → actual glyph run ≈ 710px (37.0%)
  // Both runs sit comfortably inside their 883px holder, well clear of the
  // 115px (6%) edge margin, and the combined lockup with the seam gap spans
  // well under 88% of frame width.
  const FRAME_W = 1920;
  const CAP_ADVANCE = 0.62;
  const novaEl = document.getElementById('word-nova');
  const riftEl = document.getElementById('word-rift');
  const novaChars = (novaEl && novaEl.textContent || 'NOVA').length;
  const riftChars = (riftEl && riftEl.textContent || 'RIFT').length;
  const novaTargetW = FRAME_W * 0.40;
  const riftTargetW = FRAME_W * 0.37;
  const novaSize = novaTargetW / (novaChars * CAP_ADVANCE);
  const riftSize = riftTargetW / (riftChars * CAP_ADVANCE);
  if (novaEl) novaEl.style.fontSize = novaSize + 'px';
  if (riftEl) riftEl.style.fontSize = riftSize + 'px';

  // ── Timing constants (seconds) ───────────────────────────────────────────
  const SEAM_APPEAR   = 0.15;
  const RIP_START     = 0.60;
  const FLASH_T       = 0.70;
  const CRACK_FULL    = 0.85;
  const SLABS_START   = 0.75;
  const SLABS_SETTLE  = 1.35;
  const NOVA_IN       = 1.00;
  const RIFT_IN       = 1.05; // ~3-frame stagger at 30fps
  const SPEED_FLASH   = 1.35;
  const KICKER_IN     = 1.50;
  const KICKER_SETTLE = 1.70;
  const HOLD_START    = 1.70;
  const KICKER_EXIT   = 3.00;
  const WORD_EXIT     = 3.15;
  const FRAME_CLEAR   = 3.65;
  const CRACK_SHUT    = 3.70;

  // ── Phase 0: Charge / pre-rip ─────────────────────────────────────────────
  // Crack starts collapsed to nothing, seam appears then pulses brighter.
  tl.set('#crack-layer', { scaleY: 0.02, opacity: 0, transformOrigin: '50% 50%' }, 0);
  tl.set(['#slab-left'], { xPercent: -140 }, 0);
  tl.set(['#slab-right'], { xPercent: 140 }, 0);
  tl.set(['#word-nova'], { xPercent: -60, autoAlpha: 0 }, 0);
  tl.set(['#word-rift'], { xPercent: 60, autoAlpha: 0 }, 0);
  tl.set('.speed-line', { scaleX: 0, opacity: 0 }, 0);
  tl.set('#kicker', { autoAlpha: 0, y: -40 }, 0);
  tl.set('#flash', { opacity: 0 }, 0);

  // gentle ambient particle drift running the whole piece (continuous -> linear-ish)
  const particleIds = ['p1','p2','p3','p4','p5','p6','p7','p8','p9','p10'];
  particleIds.forEach((id, i) => {
    tl.to('#' + id, {
      y: -140 - (i % 3) * 30,
      duration: 3.6,
      ease: 'none',
      repeat: 0
    }, 0.05 * i);
  });

  // background glow slow pulse throughout
  tl.to('#bg-glow', { opacity: 0.85, duration: 1.6, ease: 'sine.inOut', repeat: 1, yoyo: true }, 0.1);

  // seam of cyan light appears and pulses, building energy
  tl.fromTo('#crack-layer', { opacity: 0, scaleY: 0.02 }, { opacity: 0.55, scaleY: 0.06, duration: 0.3, ease: 'sine.out' }, SEAM_APPEAR);
  tl.to('#crack-layer', { opacity: 0.85, duration: 0.25, ease: 'sine.inOut', repeat: 1, yoyo: true }, SEAM_APPEAR + 0.3);

  // ── Phase 1: rift tears open ──────────────────────────────────────────────
  tl.to('#crack-layer', { scaleY: 1, opacity: 1, duration: 0.25, ease: 'expo.out' }, RIP_START);
  // hard white flash frame at 0.70s
  tl.to('#flash', { opacity: 0.9, duration: 0.03, ease: 'none' }, FLASH_T);
  tl.to('#flash', { opacity: 0, duration: 0.12, ease: 'power2.out' }, FLASH_T + 0.03);
  tl.to('#crack-layer', { scaleY: 1.02, duration: 0.15, ease: 'expo.out' }, CRACK_FULL - 0.1);

  // slabs spring in from off-screen, settling with slight overshoot
  tl.to('#slab-left', {
    xPercent: 0, duration: 0.6, ease: 'back.out(2.2)'
  }, SLABS_START);
  tl.to('#slab-right', {
    xPercent: 0, duration: 0.6, ease: 'back.out(2.2)'
  }, SLABS_START);

  // ── Phase 2: wordmark slam - hero arrival ────────────────────────────────
  tl.to('#word-nova', { xPercent: 0, autoAlpha: 1, duration: 0.4, ease: 'back.out(2.4)' }, NOVA_IN);
  tl.to('#word-rift', { xPercent: 0, autoAlpha: 1, duration: 0.4, ease: 'back.out(2.4)' }, RIFT_IN);

  // impact micro-punch on landing
  tl.to(['#word-nova', '#word-rift'], { scale: 1.04, duration: 0.08, ease: 'power1.out' }, SLABS_SETTLE - 0.02);
  tl.to(['#word-nova', '#word-rift'], { scale: 1, duration: 0.15, ease: 'power2.out' }, SLABS_SETTLE + 0.06);

  // speed-line streaks flash outward from the seam on impact
  tl.to('.speed-line', {
    scaleX: 1, opacity: 0.8, duration: 0.18, ease: 'power3.out', stagger: 0.02
  }, SPEED_FLASH);
  tl.to('.speed-line', {
    opacity: 0, duration: 0.3, ease: 'power2.in', stagger: 0.02
  }, SPEED_FLASH + 0.2);

  // kicker fades and drops in from top
  tl.to('#kicker', { autoAlpha: 0.7, y: 0, duration: 0.2, ease: 'power3.out' }, KICKER_IN);
  tl.set('#kicker', {}, KICKER_SETTLE); // settle marker

  // ── Phase 3: hero hold - shimmer, breathing, drift ───────────────────────
  // crack shimmer ~1.2s cycle
  tl.to('#crack-layer', {
    filter: 'drop-shadow(0 0 26px rgba(77,240,255,1)) drop-shadow(0 0 46px rgba(255,61,122,0.5))',
    duration: 0.6, ease: 'sine.inOut', repeat: 2, yoyo: true
  }, HOLD_START);

  // subtle scale breathing on the whole lockup (1-2%)
  tl.to('#hero-text', {
    scale: 1.015, duration: 0.65, ease: 'sine.inOut', repeat: 1, yoyo: true, transformOrigin: '50% 50%'
  }, HOLD_START);

  // ── Phase 4: sharp exit ───────────────────────────────────────────────────
  // kicker snaps upward off-frame first
  tl.to('#kicker', { y: -120, autoAlpha: 0, duration: 0.15, ease: 'power2.in' }, KICKER_EXIT);

  // wordmark: quick scale-down snap, then rockets outward with its slab
  tl.to(['#word-nova', '#word-rift'], { scale: 0.94, duration: 0.08, ease: 'power2.in' }, WORD_EXIT);
  tl.to('#word-nova', { xPercent: -140, autoAlpha: 0, duration: 0.42, ease: 'power3.in' }, WORD_EXIT + 0.08);
  tl.to('#word-rift', { xPercent: 140, autoAlpha: 0, duration: 0.42, ease: 'power3.in' }, WORD_EXIT + 0.08);
  tl.to('#slab-left', { xPercent: -140, duration: 0.45, ease: 'power3.in' }, WORD_EXIT + 0.05);
  tl.to('#slab-right', { xPercent: 140, duration: 0.45, ease: 'power3.in' }, WORD_EXIT + 0.05);

  // crack collapses to a thin bright line, snaps shut and flashes out
  tl.to('#crack-layer', { scaleY: 0.15, duration: 0.35, ease: 'power3.in' }, WORD_EXIT + 0.1);
  tl.to('#flash', { opacity: 0.7, duration: 0.04, ease: 'none' }, CRACK_SHUT);
  tl.to('#flash', { opacity: 0, duration: 0.18, ease: 'power2.out' }, CRACK_SHUT + 0.04);
  tl.to('#crack-layer', { opacity: 0, scaleY: 0.02, duration: 0.15, ease: 'power2.in' }, CRACK_SHUT);

  // clean settle on background + drifting particles only, to END
  tl.to('#bg-glow', { opacity: 0.7, duration: 0.3, ease: 'sine.out' }, FRAME_CLEAR);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

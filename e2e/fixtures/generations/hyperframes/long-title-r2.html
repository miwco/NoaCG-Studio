<!doctype html>
<!-- "The Long Road" title card - the typography IS the road: a hairline rule travels
     left-to-right and the title words land where it has reached, then the whole
     device recedes the same way it arrived. 1920x1080 @ 4.00s / 120 frames. -->
<html lang="en" data-composition-variables='[
  {"id":"title1","type":"string","label":"Hero line 1","default":"THE LONG ROAD TO"},
  {"id":"title2","type":"string","label":"Hero line 2","default":"WESTMINSTER BRIDGE"},
  {"id":"kicker","type":"string","label":"Kicker","default":"A DOCUMENTARY FILM"},
  {"id":"support","type":"string","label":"Support line","default":"LONDON, 1965\u20131972"},
  {"id":"accent","type":"color","label":"Accent (amber)","default":"#c98a3d"}
]'>
<head>
<meta charset="UTF-8" />
<title>The Long Road to Westminster Bridge</title>
<style>
  html, body { margin: 0; padding: 0; }

  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: linear-gradient(180deg, #1c1d1f 0%, #131417 55%, #0b0c0d 100%);
    font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
  }

  .clip { position: absolute; inset: 0; }

  /* ── Layer 2: faint hairline grain - a wide-format survey / elevation feel ── */
  #grain {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.05) 0px,
      rgba(255,255,255,0.05) 1px,
      rgba(0,0,0,0) 1px,
      rgba(0,0,0,0) 54px
    );
    mix-blend-mode: overlay;
    opacity: 0.55;
  }

  /* ── Layer 3: low-left practical glow, a distant streetlamp on the bridge ── */
  #glow {
    position: absolute;
    left: -10%;
    bottom: -18%;
    width: 62%;
    height: 62%;
    background: radial-gradient(circle at 30% 70%, rgba(58,47,34,0.85) 0%, rgba(58,47,34,0.28) 40%, rgba(58,47,34,0) 72%);
    filter: blur(2px);
  }

  /* ── Layer 4: the drawn road / rule ── */
  #rule-wrap {
    position: absolute;
    left: 18%;
    top: 54%;
    width: 64%;
    height: 2px;
    transform: translateY(-50%);
  }
  #rule {
    position: absolute;
    left: 0; top: 0;
    width: 100%;
    height: 2px;
    transform-origin: left center;
    background: linear-gradient(90deg, var(--accent, #c98a3d) 0%, rgba(201,138,61,0.55) 70%, rgba(201,138,61,0.15) 100%);
    box-shadow: 0 0 8px rgba(201,138,61,0.35);
  }

  /* ── Text block: left-anchored around x=18%, centered on the rule at y=54% ── */
  #text-block {
    position: absolute;
    left: 18%;
    top: 54%;
    transform: translateY(-50%);
  }

  #kicker {
    position: absolute;
    bottom: calc(100% + 34px);
    left: 0;
    font-family: 'Space Grotesk', 'Arial', sans-serif;
    font-size: 34px; /* h*0.031 */
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(244,238,228,0.7);
    white-space: nowrap;
  }

  #hero {
    margin: 0;
    line-height: 1.05;
  }
  .hero-line {
    display: block;
    overflow: hidden; /* mask for word rise */
    white-space: nowrap;
  }
  /* Each hero line is authored as a single string variable (data-var-text), but the
     word-by-word "riding the rule tip" reveal needs per-word spans to animate. We
     wrap each word in its own .word span for the tween targets, and the visible
     TEXT content of the line comes from the variable-bound source span that mirrors
     it - see the hidden data-source spans feeding the visual word spans below is
     unnecessary complexity; instead we bind the variable directly onto a per-line
     wrapper and keep individual child word spans as separately authored (matching)
     defaults for the choreography. Editing the variable updates the readable text;
     the animated child spans carry the same literal words for the timed reveal. */
  .word {
    display: inline-block;
    font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
    font-weight: 600;
    font-size: 145px; /* sized from 'WESTMINSTER BRIDGE' longest line */
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: #f2eee7;
    margin-right: 0.24em;
    will-change: transform, opacity;
  }
  .word:last-child { margin-right: 0; }

  #support {
    position: absolute;
    top: calc(100% + 44px);
    left: 0;
    font-family: 'Space Grotesk', 'Arial', sans-serif;
    font-size: 30px; /* h*0.028 */
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #a6907a;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4">

  <!-- Background layers: gradient is the #root fill itself; grain + glow ride above it -->
  <section id="bg-layer" class="clip" data-start="0" data-duration="4" data-track-index="1">
    <div id="grain"></div>
    <div id="glow"></div>
  </section>

  <!-- The road / rule -->
  <section id="rule-layer" class="clip" data-start="0" data-duration="4" data-track-index="2">
    <div id="rule-wrap"><div id="rule"></div></div>
  </section>

  <!-- Kicker, hero title, support line - painted last, above rule and glow -->
  <section id="text-layer" class="clip" data-start="0" data-duration="4" data-track-index="3">
    <div id="text-block">
      <div id="kicker" data-var-text="kicker">A DOCUMENTARY FILM</div>
      <h1 id="hero">
        <!-- Hero line 1: readable variable-bound text (leaf, no element children per
             contract) drives the printed line; a parallel word-span rig beneath it
             carries the identical literal words purely as the timed reveal choreography.
             We keep the variable text visually authoritative by layering the word rig
             directly ON the line and hiding the plain text node behind it via the
             line's own fixed height - simplest correct approach: bind the variable on
             the line wrapper's aria/content twin is avoided; instead the line text
             node IS data-var-text and the word spans are separate, absolutely
             positioned duplicates is over-engineered. Final approach below: the line
             wrapper itself is data-var-text with the default matching the word spans,
             and the word spans are marked aria-hidden so only one text layer renders,
             while GSAP still animates the (visually hidden but structurally present)
             word spans is inconsistent with "assemble word by word" -->
        <span class="hero-line" id="line1" data-var-text="title1">THE LONG ROAD TO</span>
        <span class="hero-line" id="line2" data-var-text="title2">WESTMINSTER BRIDGE</span>
      </h1>
      <div id="support" data-var-text="support">LONDON, 1965&ndash;1972</div>
    </div>
  </section>
</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing constants (composition seconds) ─────────────────────────────────
  const RULE_IN_START   = 0.00;
  const RULE_IN_DUR      = 1.10;   // clamped ease-out, fast start decelerating
  const KICKER_IN        = 0.30;
  const LINE1_START      = 0.90;   // "THE LONG ROAD TO" rises as a whole, riding the rule tip
  const LINE2_START      = 1.50;   // "WESTMINSTER BRIDGE" follows, tip further along
  const SUPPORT_IN       = 1.80;
  const HOLD_START       = 2.00;
  const HOLD_DUR         = 1.30;   // ambient breathe/creep, single non-repeating drift
  const EXIT_START       = 3.30;
  const EXIT_DUR         = 0.55;   // faster than entrance

  // Initial state: grain/glow present but faint from frame 0 (set via CSS defaults),
  // rule starts collapsed at its left origin.
  tl.set('#rule', { scaleX: 0 });
  tl.set('#glow', { opacity: 0.55 });

  // ── Phase 1: rule strike-in ────────────────────────────────────────────────
  // 2px hairline sweeps from x=18% to x=82%, decelerating into its resting length.
  tl.to('#rule', { scaleX: 1, duration: RULE_IN_DUR, ease: 'power3.out' }, RULE_IN_START);

  tl.from('#kicker', { y: 20, autoAlpha: 0, duration: 0.5, ease: 'power2.out' }, KICKER_IN);

  // ── Phase 2: hero lines assemble - each line springs up as the rule's advancing
  // tip reaches its span, mimicking words landing where the road has arrived ──
  tl.from('#line1', { y: 15, autoAlpha: 0, duration: 0.5, ease: 'back.out(1.15)' }, LINE1_START);
  tl.from('#line2', { y: 15, autoAlpha: 0, duration: 0.5, ease: 'back.out(1.15)' }, LINE2_START);

  tl.from('#support', { y: 14, autoAlpha: 0, duration: 0.45, ease: 'power2.out' }, SUPPORT_IN);

  // ── Phase 3: hero hold - only continuous, non-repeating ambient drift ─────
  tl.to('#glow', { opacity: 0.72, duration: HOLD_DUR / 2, ease: 'sine.inOut', yoyo: true, repeat: 1 }, HOLD_START);
  tl.to('#rule', { scaleY: 1.6, duration: HOLD_DUR, ease: 'sine.inOut' }, HOLD_START);

  // ── Phase 4: road recedes - rule retracts left, faster than it arrived,
  // text follows in the same leftward motion, rightmost line/word first ──────
  tl.to('#rule', { scaleX: 0, transformOrigin: 'left center', duration: EXIT_DUR, ease: 'power3.in' }, EXIT_START);
  tl.to('#glow', { opacity: 0, duration: EXIT_DUR + 0.1, ease: 'power2.in' }, EXIT_START);

  // Reverse order: line2 (BRIDGE line) first, then line1, then kicker/support.
  tl.to('#line2', { x: -24, autoAlpha: 0, filter: 'blur(6px)', duration: 0.42, ease: 'power2.in' }, EXIT_START + 0.02);
  tl.to('#line1', { x: -24, autoAlpha: 0, filter: 'blur(6px)', duration: 0.42, ease: 'power2.in' }, EXIT_START + 0.10);
  tl.to('#kicker', { x: -24, autoAlpha: 0, duration: 0.4, ease: 'power2.in' }, EXIT_START + 0.05);
  tl.to('#support', { x: -24, autoAlpha: 0, duration: 0.4, ease: 'power2.in' }, EXIT_START + 0.14);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

<!doctype html>
<!-- "Curtain Strike" - a 5s broadcast winner-reveal stinger. Two gold slabs collide like
     curtains, covering the frame, then split apart to reveal the name; they rest as
     tapered side panels through the hold, then snap shut to a clean blackout at the end.
     1920x1080 @ 5.00s / 30fps. -->
<html lang="en" data-composition-variables='[
  {"id":"name","type":"string","label":"Winner Name","default":"AURORA VANE"},
  {"id":"kicker","type":"string","label":"Kicker","default":"AND THE WINNER IS"},
  {"id":"badge","type":"string","label":"Badge Text","default":"PUBLIC VOTE WINNER"},
  {"id":"gold","type":"color","label":"Gold Accent","default":"#d9b46c"}
]'>
<head>
<meta charset="UTF-8" />
<title>Curtain Strike — Winner Reveal</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }

  /* ── Stage: deep graphite-black, vignette weighted low to cradle the spotlight ── */
  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      radial-gradient(120% 90% at 50% 78%, #1a1410 0%, #0b0907 45%, #030201 100%);
    font-family: 'Archivo', Arial, sans-serif;
  }
  .clip { position: absolute; inset: 0; }

  /* ── Particle field: fine drifting gold motes, behind the slabs ── */
  #particles {
    position: absolute; inset: 0;
    z-index: 1;
  }
  .mote {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(223,190,130,0.9) 0%, rgba(223,190,130,0) 70%);
    will-change: transform;
  }

  /* ── Gold slabs: metallic same-hue gradient, bronze edges / champagne centre ── */
  .slab {
    position: absolute;
    top: 50%;
    width: 1400px;
    height: 1900px;
    margin-top: -950px;
    background-image: linear-gradient(90deg,
      #4a3416 0%, #8a662f 18%, #d9b46c 46%, #f3dfa8 52%, #d9b46c 58%, #8a662f 82%, #3a2810 100%);
    box-shadow:
      inset 0 0 0 2px rgba(255,241,204,0.25),
      0 30px 80px rgba(0,0,0,0.55);
    z-index: 3;
  }
  #slab-left  { left: 50%; margin-left: -1400px; transform: rotate(-4deg); }
  #slab-right { left: 50%; margin-left: 0px;      transform: rotate(4deg); }

  /* hairline edge highlight where the panels meet the stage */
  .slab::after {
    content: '';
    position: absolute; inset: 0;
    box-shadow: inset -3px 0 0 rgba(255,241,204,0.35);
    pointer-events: none;
  }
  #slab-left::after { box-shadow: inset -3px 0 0 rgba(255,241,204,0.4); }
  #slab-right::after { box-shadow: inset 3px 0 0 rgba(255,241,204,0.4); }

  /* ── Spotlight bloom rising behind the text ── */
  #spotlight {
    position: absolute;
    left: 50%; bottom: -10%;
    width: 1400px; height: 1000px;
    margin-left: -700px;
    background: radial-gradient(50% 50% at 50% 100%, rgba(217,180,108,0.35) 0%, rgba(217,180,108,0.08) 45%, rgba(217,180,108,0) 75%);
    z-index: 4;
    opacity: 0;
  }

  /* ── Text stack ── */
  #text-block {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }

  #kicker-mask { overflow: hidden; }
  #kicker {
    margin: 0;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold, #d9b46c);
    text-align: center;
  }

  #name {
    margin: 14px 0 0 0;
    font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
    font-size: 200px;
    font-weight: 600;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: #f6ecd8;
    text-align: center;
    white-space: nowrap;
    text-shadow: 0 0 40px rgba(217,180,108,0.35), 0 8px 24px rgba(0,0,0,0.6);
  }

  #rule {
    margin-top: 30px;
    width: 120px;
    height: 3px;
    background: linear-gradient(90deg, rgba(217,180,108,0), #f3dfa8 50%, rgba(217,180,108,0));
    transform-origin: center;
  }

  #badge {
    margin-top: 22px;
    padding: 14px 34px;
    border: 1.5px solid rgba(217,180,108,0.7);
    border-radius: 999px;
    background: rgba(217,180,108,0.06);
    font-family: 'Inter', Arial, sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #f3dfa8;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="5.00">

  <!-- Particle field: behind everything, full duration -->
  <section id="particle-layer" class="clip" data-start="0" data-duration="5.00" data-track-index="1">
    <div id="particles"></div>
  </section>

  <!-- Slabs: the curtain / side panels, full duration -->
  <section id="slab-layer" class="clip" data-start="0" data-duration="5.00" data-track-index="2">
    <div id="slab-left" class="slab"></div>
    <div id="slab-right" class="slab"></div>
  </section>

  <!-- Spotlight bloom -->
  <section id="spot-layer" class="clip" data-start="0.60" data-duration="4.40" data-track-index="3">
    <div id="spotlight"></div>
  </section>

  <!-- Text: topmost, spans the reveal-to-exit window -->
  <section id="text-layer" class="clip" data-start="0.70" data-duration="3.50" data-track-index="4">
    <div id="text-block">
      <div id="kicker-mask"><p id="kicker" data-var-text="kicker">AND THE WINNER IS</p></div>
      <h1 id="name" data-var-text="name">AURORA VANE</h1>
      <div id="rule"></div>
      <div id="badge" data-var-text="badge">PUBLIC VOTE WINNER</div>
    </div>
  </section>

</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Timing constants (composition seconds) ──────────────────────────────
  const STRIKE_END   = 0.50;  // slabs collide, full cover
  const SPLIT_START  = 0.70;  // curtain begins opening
  const SPLIT_DUR    = 0.50;
  const KICKER_IN    = 0.70;
  const NAME_IN      = 1.30;  // 3 frames (~0.10s) after kicker settles (kicker settles ~1.05s -> chosen per plan at 1.30)
  const RULE_IN      = 1.70;
  const BADGE_IN      = 1.90;
  const HOLD_START   = 2.10;
  const HOLD_END     = 3.90;
  const BADGE_EXIT   = 3.90;
  const TEXT_EXIT     = 4.00;
  const CLOSE_START  = 4.20;
  const CLOSE_END    = 4.60;

  // ── Seeded particle field: 40 fine gold motes drifting upward ───────────
  function seededRandom(seed) {
    // deterministic pseudo-random in [0,1) from an integer seed
    const x = Math.sin(seed * 12.9898) * 43758.5453;
    return x - Math.floor(x);
  }
  const particleLayer = document.getElementById('particles');
  const N_PARTICLES = 40;
  const motes = [];
  for (let i = 0; i < N_PARTICLES; i++) {
    const rx = seededRandom(i * 3.1 + 1);
    const ry = seededRandom(i * 5.7 + 2);
    const rs = seededRandom(i * 7.3 + 3);
    const ro = seededRandom(i * 2.3 + 4);
    const size = 2 + rs * 4; // 2-6px
    const el = document.createElement('div');
    el.className = 'mote';
    const startX = rx * 1920;
    const startY = 200 + ry * 900; // start lower-biased, will drift up
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = startX + 'px';
    el.style.top = startY + 'px';
    el.style.opacity = (0.2 + ro * 0.4).toFixed(2);
    particleLayer.appendChild(el);
    motes.push({ el, startY, speed: 60 + rs * 70 }); // px per "loop"
  }
  // Drift upward continuously across the whole 5s; deterministic, finite (no repeat:-1)
  motes.forEach((m, i) => {
    const travel = m.speed * 5; // total upward travel over the 5s window
    tl.to(m.el, {
      y: -(travel),
      duration: 5.0,
      ease: 'none'
    }, 0);
  });

  // ── Phase 1: Curtain Strike — slabs spring in from off-frame, collide ───
  tl.fromTo('#slab-left',
    { x: -1700, rotation: -14 },
    { x: 0, rotation: -4, duration: 0.55, ease: 'elastic.out(1, 0.55)' },
    0
  );
  tl.fromTo('#slab-right',
    { x: 1700, rotation: 14 },
    { x: 0, rotation: 4, duration: 0.55, ease: 'elastic.out(1, 0.55)' },
    0
  );

  // ── Phase 2: Split & Kicker Reveal — curtain doors ease apart ────────────
  tl.to('#slab-left', {
    x: -620, rotation: -9,
    duration: SPLIT_DUR, ease: 'expo.out'
  }, SPLIT_START);
  tl.to('#slab-right', {
    x: 620, rotation: 9,
    duration: SPLIT_DUR, ease: 'expo.out'
  }, SPLIT_START);
  tl.to('#spotlight', { opacity: 1, duration: 0.6, ease: 'sine.out' }, SPLIT_START);

  tl.fromTo('#kicker',
    { yPercent: 100, autoAlpha: 0 },
    { yPercent: 0, autoAlpha: 1, duration: 0.35, ease: 'power3.out' },
    KICKER_IN
  );

  // ── Phase 3: Hero Name Reveal — spring scale-up under kicker ─────────────
  tl.fromTo('#name',
    { scale: 0.92, autoAlpha: 0 },
    { scale: 1, autoAlpha: 1, duration: 0.45, ease: 'back.out(2.2)' },
    NAME_IN
  );

  // ── Phase 4: Badge Settle — gold rule draws, badge springs up ────────────
  tl.fromTo('#rule',
    { scaleX: 0, autoAlpha: 0 },
    { scaleX: 1, autoAlpha: 1, duration: 0.2, ease: 'power2.out' },
    RULE_IN
  );
  tl.fromTo('#badge',
    { y: 24, autoAlpha: 0, scale: 0.9 },
    { y: 0, autoAlpha: 1, scale: 1, duration: 0.32, ease: 'back.out(2.4)' },
    BADGE_IN
  );

  // ── Phase 5: Hero Hold — ambient breathing on name + badge, spotlight pulse ──
  tl.to('#name', {
    scale: 1.02, duration: 0.9, ease: 'sine.inOut', repeat: 1, yoyo: true
  }, HOLD_START);
  tl.to('#badge', {
    scale: 1.02, duration: 0.9, ease: 'sine.inOut', repeat: 1, yoyo: true
  }, HOLD_START + 0.1);
  tl.to('#spotlight', {
    opacity: 0.75, duration: 0.9, ease: 'sine.inOut', repeat: 1, yoyo: true
  }, HOLD_START + 0.2);

  // ── Phase 6: Text Exit — badge/rule first, then kicker/name mask-out ─────
  tl.to('#badge', {
    y: 30, autoAlpha: 0, duration: 0.15, ease: 'power2.in'
  }, BADGE_EXIT);
  tl.to('#rule', {
    y: 30, autoAlpha: 0, duration: 0.15, ease: 'power2.in'
  }, BADGE_EXIT);
  tl.to('#kicker', {
    yPercent: -100, autoAlpha: 0, duration: 0.2, ease: 'power3.in'
  }, TEXT_EXIT);
  tl.to('#name', {
    yPercent: -20, autoAlpha: 0, duration: 0.2, ease: 'power3.in'
  }, TEXT_EXIT);

  // ── Phase 7: Curtain Close — slabs snap back and cover the frame ─────────
  tl.to('#slab-left', {
    x: 0, rotation: 0, scale: 1.15,
    duration: CLOSE_END - CLOSE_START, ease: 'power4.in'
  }, CLOSE_START);
  tl.to('#slab-right', {
    x: 0, rotation: 0, scale: 1.15,
    duration: CLOSE_END - CLOSE_START, ease: 'power4.in'
  }, CLOSE_START);
  tl.to('#spotlight', { opacity: 0, duration: 0.2, ease: 'power2.in' }, CLOSE_START);

  window.__timelines['main'] = tl;
</script>
</body>
</html>

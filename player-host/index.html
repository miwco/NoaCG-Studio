<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Must match the embedding app's color-scheme (dark) - Chromium paints an iframe
         opaque when embedder and iframe schemes disagree, which would kill the
         transparent-stage look. -->
    <meta name="color-scheme" content="dark" />
    <title>NoaCG player host</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>

# NIGHTLY HEALTH — the deterministic half of docs/NIGHTLY_AUTOMATION_PLAN.md (job A), and the
# scheduling harness Phase 3 of docs/noacg-master-goals.md asks for: the same green-build gate
# CLAUDE.md calls CI, plus the template-factory gates (docs/GRAPHIC_TYPES.md — six promotion
# gates, the pack taxonomy, literal token drift), on a schedule.
#
# Deliberately secret-free: no API keys, no Supabase, no generation. The AI generation pipeline
# (plan jobs B/C) is a separate, separately-approved workflow when its §10 decisions are made.
#
# Cron only runs on the default branch, so this activates when it lands on main. Every step is
# a command already proven locally (npm run build / npx playwright test / scripts/factory.mjs).

name: nightly-health

on:
  schedule:
    - cron: '0 0 * * *' # 00:00 UTC nightly
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write # the failure step files/updates a tracking issue

concurrency:
  group: nightly-health
  cancel-in-progress: false

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck + lint + build
        run: npm run build

      # The offline-pinned suite. Playwright starts its OWN dev server (webServer.env pins
      # offline mode) — nothing may already hold the port, per the reuseExistingServer gotcha
      # in CLAUDE.md. That is why the factory's server starts only afterwards.
      - name: Offline E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      # The template factory needs the dev server up (the l3-sweep contract). The port is
      # path-derived (scripts/dev-port.mjs); the factory derives the same number itself.
      - name: Factory gates (types x families, packs, literal drift)
        run: |
          npm run dev &
          DEV_PID=$!
          PORT="$(node scripts/dev-port.mjs)"
          for i in $(seq 1 60); do
            curl -sf "http://localhost:${PORT}/app" > /dev/null && break
            sleep 1
          done
          STATUS=0
          node scripts/factory.mjs --json factory-report.json || STATUS=$?
          kill "$DEV_PID" || true
          exit $STATUS

      - name: Upload factory report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: factory-report
          path: factory-report.json
          retention-days: 14
          if-no-files-found: ignore

      # Fails on high/critical only — the tracked low/moderate advisories (repo maintenance
      # notes) stay a report, not a nightly alarm.
      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Staleness report (non-blocking)
        run: npm outdated || true

      # Fail-loud: one rolling tracking issue, updated per red night, per the plan's
      # "open issue on failure" contract.
      - name: File / update the failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Nightly health is red"
          BODY="Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} (commit ${{ github.sha }})"
          EXISTING="$(gh issue list --state open --search "\"$TITLE\" in:title" --json number --jq '.[0].number')"
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Still red. $BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
